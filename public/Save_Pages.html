<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Vault Builder - Create Website Structure</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="Save_Pages.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-code"></i> Code Vault Builder</h1>
    </header>

    <!-- Database Unique Key Input -->
    <div class="form-section">
      <nav class="back-nav">
        <a href="Control_Excel.html" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6" />
          </svg>
          Return to Home
        </a>
        </nav>
        <label for="dbKey" class="section-label">
          <i class="fas fa-database"></i> Database Unique Key
        </label>
        <input type="text" id="dbKey" placeholder="e.g., my-website, portfolio-2024, dashboard-v2" class="db-input" />
        <small class="hint">This will be the unique identifier in Firebase</small>
    </div>

    <!-- Modern Dropdown for Code Sections -->
    <div class="form-section">
      <label class="section-label">
        <i class="fas fa-layer-group"></i> Code Sections
      </label>
      <div class="dropdown-container">
        <div class="dropdown-header" id="dropdownHeader">
          <span>Select code sections to include...</span>
          <i class="fas fa-chevron-down"></i>
        </div>
        <div class="dropdown-menu" id="dropdownMenu">
          <label class="dropdown-item">
            <input type="checkbox" value="html" class="section-checkbox" />
            <i class="fab fa-html5 html-icon"></i>
            <span>HTML</span>
            <small>Structure & Content</small>
          </label>
          <label class="dropdown-item">
            <input type="checkbox" value="css" class="section-checkbox" />
            <i class="fab fa-css3-alt css-icon"></i>
            <span>CSS</span>
            <small>Styles & Animations</small>
          </label>
          <label class="dropdown-item">
            <input type="checkbox" value="javascript" class="section-checkbox" />
            <i class="fab fa-js js-icon"></i>
            <span>JavaScript</span>
            <small>Interactivity & Logic</small>
          </label>
        </div>
      </div>
      <button id="addSectionsBtn" class="btn-add">
        <i class="fas fa-plus-circle"></i> Add Selected Sections
      </button>
    </div>

    <!-- Dynamic Textareas Container -->
    <div id="sectionsContainer" class="sections-container">
      <!-- Textareas will be added dynamically here -->
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button id="saveToDatabaseBtn" class="btn-primary">
        <i class="fas fa-save"></i> Save to Database
      </button>
      <button id="loadPageBtn" class="btn-secondary">
        <i class="fas fa-folder-open"></i> Go to Load Page
      </button>
    </div>
  </div>

  <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"
        }
      }
    </script>
  <script type="module" src="Save_Pages.js"></script>
</body>

</html>
