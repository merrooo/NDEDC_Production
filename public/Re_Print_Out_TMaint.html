<!doctype html>
<html lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>نظام صيانة العدادات</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
        font-family: "Cairo", sans-serif;
        margin: 0;
        padding: 0;
      }
      body {
        background: #f4f7f9;
        padding: 20px;
        direction: rtl;
      }

      #pdf-report-header {
        display: none;
        border-bottom: 1px solid #eee;
        margin-bottom: 5px;
      }
      .pdf-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px;
      }
      .pdf-title {
        font-size: 11pt;
        font-weight: bold;
        color: #065192;
      }
      .pdf-info-text {
        font-size: 8pt;
        color: #333;
        line-height: 1.2;
      }

      .sidebar,
      .controls-card {
        background: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      .search-filters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }
      select,
      input[type="text"],
      input[type="date"] {
        width: 100%;
        height: 38px;
        padding: 0 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        background-color: bisque;
        font-size: 13px;
      }

      .btn-group {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      button {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        color: white;
      }
      #btnexcell {
        background: #16a085;
      }
      #dlt_btn {
        background: linear-gradient(135deg, #065192, #00f2fe);
      }

      .table-wrapper {
        background: white;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #eee;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #cbd3da;
        color: #000;
        padding: 8px;
        font-size: 12px;
        border: 1px solid #eee;
      }
      td {
        padding: 6px;
        text-align: center;
        border-bottom: 1px solid #eee;
        font-size: 11px;
      }

      /* ================= إعدادات الطباعة المكثفة ================= */
      @media print {
        .hide-for-pdf {
          display: none !important;
        }
        #pdf-report-header {
          display: block !important;
        }
        body {
          background: white;
          padding: 0;
          margin: 0;
        }
        .table-wrapper {
          border: none;
        }

        table {
          width: 100% !important;
          table-layout: fixed;
          border: none !important;
        }

        th {
          background-color: #f8f9fa !important;
          font-size: 7.5px !important;
          padding: 2px !important;
          border: 0.1pt solid #eee !important;
          height: auto !important;
          -webkit-print-color-adjust: exact;
        }

        td {
          font-size: 7px !important;
          padding: 1px 2px !important;
          line-height: 1 !important;
          border: 0.1pt solid #fdfdfd !important;
          height: 12px !important; /* تقليل ارتفاع الصف */
        }

        /* تضييق المسافات بين الأعمدة */
        th:nth-child(1),
        td:nth-child(1) {
          width: 10%;
        } /* رقم العداد */
        th:nth-child(2),
        td:nth-child(2) {
          width: 8%;
        } /* النوع */
        th:nth-child(3),
        td:nth-child(3) {
          width: 7%;
        } /* توصيل */
        th:nth-child(4),
        td:nth-child(4) {
          width: 10%;
        } /* القطاع */
        th:nth-child(5),
        td:nth-child(5) {
          width: 10%;
        } /* الهندسة */
        th:nth-child(6),
        td:nth-child(6) {
          width: 10%;
        } /* التاريخ */
        th:nth-child(7),
        td:nth-child(7) {
          width: 45%;
          text-align: right;
        } /* النتيجة - المساحة الأكبر */
      }
    </style>
  </head>

  <body>
    <div id="capture-area">
      <div id="pdf-report-header">
        <div class="pdf-header-row">
          <div class="pdf-info-text">
            <strong>نظام إدارة العدادات</strong><br />
            <span id="pdf-date-out">التاريخ: </span>
          </div>
          <div class="pdf-title">تقرير تسليم صيانة العدادات</div>
          <div class="pdf-info-text" style="text-align: left">
            <span id="pdf-rec-out">المستلم: </span><br />
            <span id="pdf-id-out">رقم البطاقة: </span>
          </div>
        </div>
      </div>

      <div class="hide-for-pdf">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
          "
        >
          <input
            type="date"
            id="printtDate"
            readonly
            style="
              background: none;
              border: none;
              font-weight: bold;
              width: auto;
            "
          />
          <h2 style="color: #065192">تقرير مجمع الصيانة</h2>
        </div>

        <div class="sidebar">
          <div class="search-filters">
            <select id="mtype">
              <option value="">النوع ▾</option>
            </select>
            <select id="mconn">
              <option value="">التوصيل ▾</option>
            </select>
            <select id="keta3">
              <option value="">القطاع ▾</option>
            </select>
            <select id="handsa">
              <option value="">الهندسة ▾</option>
            </select>
          </div>
        </div>

        <div class="controls-card">
          <div class="btn-group">
            <button id="btnexcell">تصدير Excel</button>
            <button id="dlt_btn">أرشفة وتسليم + PDF</button>
          </div>
          <div
            style="
              display: flex;
              gap: 10px;
              align-items: center;
              padding-top: 10px;
              border-top: 1px solid #eee;
            "
          >
            <input type="checkbox" id="chkbx" />
            <label style="font-size: 13px">بيانات التسليم</label>
            <input
              id="reciver"
              type="text"
              placeholder="اسم المستلم"
              disabled
              style="flex: 2"
            />
            <input
              id="betaka"
              type="text"
              placeholder="رقم البطاقة"
              disabled
              style="flex: 1"
            />
          </div>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="dataTable">
          <thead>
            <tr>
              <th>رقم العداد</th>
              <th>النوع</th>
              <th>توصيل</th>
              <th>القطاع</th>
              <th>الهندسة</th>
              <th>الدخول</th>
              <th>نتيجة الصيانة</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
      import {
        getDatabase,
        ref,
        get,
        set,
        remove,
      } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAnKRhT5xJTBvsQKpW7e9w-hGSbAQJWTSo",
        authDomain: "production1-ae85.firebaseapp.com",
        projectId: "production1-ae85",
        storageBucket: "production1-ae85.firebasestorage.app",
        messagingSenderId: "490438031865",
        appId: "1:490438031865:web:a4a69335989f30cd13a528",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      let allData = [];

      async function loadData() {
        const tbody = document.querySelector("#dataTable tbody");
        tbody.innerHTML = "<tr><td colspan='7'>جاري التحميل...</td></tr>";
        try {
          const snapshot = await get(ref(db, "Archive_Maint"));
          if (snapshot.exists()) {
            allData = Object.entries(snapshot.val()).map(([key, val]) => ({
              ...val,
              MNO: val.MNO || key,
            }));
            renderTable(allData);
            populateFilters();
          } else {
            tbody.innerHTML =
              "<tr><td colspan='7'>لا توجد بيانات حالياً.</td></tr>";
          }
        } catch (err) {
          console.error(err);
        }
      }

      function renderTable(data) {
        document.querySelector("#dataTable tbody").innerHTML = data
          .map(
            (d) => `
                <tr>
                    <td>${d.MNO}</td>
                    <td>${d.Mtype || "-"}</td>
                    <td>${d.Connection || "-"}</td>
                    <td>${d.Keta3 || "-"}</td>
                    <td>${d.Handsa || "-"}</td>
                    <td>${d.Enter_Maint_Date || "-"}</td>
                    <td>${d.Mremovingfor || "تم الفحص بنجاح"}</td>
                </tr>
            `,
          )
          .join("");
      }

      function populateFilters() {
        const keys = {
          mtype: "Mtype",
          mconn: "Connection",
          keta3: "Keta3",
          handsa: "Handsa",
        };
        Object.keys(keys).forEach((id) => {
          const unique = [
            ...new Set(allData.map((i) => i[keys[id]]).filter((v) => v)),
          ];
          const el = document.getElementById(id);
          el.innerHTML =
            `<option value="">الكل ▾</option>` +
            unique.map((v) => `<option value="${v}">${v}</option>`).join("");
          el.onchange = applyFilters;
        });
      }

      function applyFilters() {
        const f = {
          Mtype: document.getElementById("mtype").value,
          Connection: document.getElementById("mconn").value,
          Keta3: document.getElementById("keta3").value,
          Handsa: document.getElementById("handsa").value,
        };
        const filtered = allData.filter(
          (i) =>
            (!f.Mtype || i.Mtype === f.Mtype) &&
            (!f.Connection || i.Connection === f.Connection) &&
            (!f.Keta3 || i.Keta3 === f.Keta3) &&
            (!f.Handsa || i.Handsa === f.Handsa),
        );
        renderTable(filtered);
      }

      document.getElementById("dlt_btn").addEventListener("click", async () => {
        const rec = document.getElementById("reciver").value.trim();
        const idNum = document.getElementById("betaka").value.trim();
        const dateVal = document.getElementById("printtDate").value;

        if (!document.getElementById("chkbx").checked || !rec)
          return alert("يرجى إدخال اسم المستلم أولاً.");

        document.getElementById("pdf-date-out").innerText =
          "التاريخ: " + dateVal;
        document.getElementById("pdf-rec-out").innerText = "المستلم: " + rec;
        document.getElementById("pdf-id-out").innerText =
          "رقم البطاقة: " + idNum;

        const hideElems = document.querySelectorAll(".hide-for-pdf");
        hideElems.forEach((el) => (el.style.display = "none"));
        document.getElementById("pdf-report-header").style.display = "block";

        const opt = {
          margin: [5, 5, 5, 5],
          filename: `Maintenance_Report_${dateVal}.pdf`,
          html2canvas: { scale: 4, useCORS: true },
          jsPDF: { unit: "mm", format: "a4", orientation: "landscape" },
        };

        try {
          await html2pdf()
            .set(opt)
            .from(document.getElementById("capture-area"))
            .save();

          // عملية الأرشفة والحذف من المصدر
          for (const item of allData) {
            // 1. إضافة للأرشيف
            await set(ref(db, `Reciever_Maint/${item.MNO}`), {
              ...item,
              Rec_Name: rec,
              Rec_ID: idNum,
              Final_Date: dateVal,
            });
            // 2. الحذف من القائمة الحالية (تأكد من صحة مسار الحذف)
            // await remove(ref(db, `Archive_Maint/${item.MNO}`));
          }

          alert("تم الأرشفة واستخراج التقرير بنجاح.");
          location.reload();
        } catch (e) {
          alert("حدث خطأ: " + e.message);
          hideElems.forEach((el) => (el.style.display = "block"));
          document.getElementById("pdf-report-header").style.display = "none";
        }
      });

      document.getElementById("chkbx").onchange = (e) => {
        document.getElementById("reciver").disabled = !e.target.checked;
        document.getElementById("betaka").disabled = !e.target.checked;
      };

      document.getElementById("btnexcell").onclick = () =>
        XLSX.writeFile(
          XLSX.utils.table_to_book(document.getElementById("dataTable")),
          "Report.xlsx",
        );
      document.getElementById("printtDate").value = new Date()
        .toISOString()
        .split("T")[0];
      loadData();
    </script>
  </body>
</html>
