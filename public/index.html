<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم تسجيل للبيانات العدادات</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

  <style>
    :root {
      --primary-green: #2ecc71;
      --dark-green: #27ae60;
      --bg-light: #f4f7f6;
      --text-main: #2c3e50;
      --text-muted: #636e72;
      --white: #ffffff;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 15px 35px rgba(46, 204, 113, 0.15);
      --radius-lg: 18px;
      --radius-md: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Cairo", sans-serif;
      background-color: var(--bg-light);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* --- Navigation --- */
    .top-nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      padding: 0.75rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.04);
      border-bottom: 2px solid var(--primary-green);
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand-logo {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
    }

    .brand-text h2 {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.2;
    }

    .brand-text .dept {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .time-chip {
      background: #e8f8f0;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      color: var(--dark-green);
      font-weight: 700;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    /* --- Container --- */
    .app-container {
      max-width: 700px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .section-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .section-header h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }

    /* --- Menu Card --- */
    .portal-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.03);
    }

    .portal-header {
      background: #fafafa;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #f1f1f1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .portal-header h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark-green);
    }

    .portal-body {
      padding: 1.5rem;
      display: grid;
      gap: 1rem;
    }

    /* --- Menu Items --- */
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.5rem;
      background: #ffffff;
      border: 1px solid #edf2f7;
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text-main);
      transition: var(--transition);
    }

    .nav-item:hover {
      background: #f0fdf4;
      border-color: var(--primary-green);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .nav-content {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .nav-icon-box {
      width: 40px;
      height: 40px;
      background: #f8faf9;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-green);
      font-size: 1.4rem;
      transition: var(--transition);
    }

    .nav-item:hover .nav-icon-box {
      background: var(--primary-green);
      color: white;
    }

    .nav-label {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .chevron {
      font-size: 1.2rem;
      color: #cbd5e0;
      transition: var(--transition);
    }

    .nav-item:hover .chevron {
      color: var(--primary-green);
      transform: translateX(-5px);
    }

    /* --- Responsive --- */
    @media (max-width: 600px) {
      .top-nav {
        flex-direction: column;
        padding: 1rem;
        gap: 1rem;
      }
      .app-container {
        margin: 1.5rem auto;
      }
    }
  </style>
</head>

<body>
  <nav class="top-nav">
    <div class="brand-section">
      <div class="brand-logo">
        <ion-icon name="analytics"></ion-icon>
      </div>
      <div class="brand-text">
        <h2>وزارة الكهرباء والطاقة المتجددة</h2>
        <p class="dept">شركة شمال الدلتا لتوزيع الكهرباء</p>
      </div>
    </div>

    <div class="time-chip">
      <ion-icon name="calendar-outline"></ion-icon>
      <span id="currentTime">...</span>
    </div>
  </nav>

  <main class="app-container">
    <div class="section-header">
      <h1>لوحة  التحكم لتسجيل البيانات والفحص</h1>
    </div>

    <div class="portal-card">
      <div class="portal-header">
        <ion-icon name="layers-outline" style="font-size: 1.5rem; color: var(--primary-green)"></ion-icon>
        <h3>العرض</h3>
      </div>
      
      <div class="portal-body">
        <a href="Ayat_Enter.html" class="nav-item">
          <div class="nav-content">
            <div class="nav-icon-box"><ion-icon name="speedometer-outline"></ion-icon></div>
            <span class="nav-label">تسجيل دخول بيانات عداد</span>
          </div>
          <ion-icon name="chevron-back-outline" class="chevron"></ion-icon>
        </a>

        <a href="Ayat.html" class="nav-item">
          <div class="nav-content">
            <div class="nav-icon-box"><ion-icon name="warning-outline"></ion-icon></div>
            <span class="nav-label">تسجيل بيانات فحص عداد</span>
          </div>
          <ion-icon name="chevron-back-outline" class="chevron"></ion-icon>
        </a>

        <a href="Main_Dashboard.html" class="nav-item">
          <div class="nav-content">
            <div class="nav-icon-box"><ion-icon name="hammer-outline"></ion-icon></div>
            <span class="nav-label"> الصيانة الفنية والتكهين</span>
          </div>
          <ion-icon name="chevron-back-outline" class="chevron"></ion-icon>
        </a>

        <a href="Munipilation_Report.html" class="nav-item">
          <div class="nav-content">
            <div class="nav-icon-box"><ion-icon name="flash-outline"></ion-icon></div>
            <span class="nav-label">قياس الأحمال - ضبطية</span>
          </div>
          <ion-icon name="chevron-back-outline" class="chevron"></ion-icon>
        </a>

        <a href="Add_Loads.html" class="nav-item">
          <div class="nav-content">
            <div class="nav-icon-box"><ion-icon name="add-circle-outline"></ion-icon></div>
            <span class="nav-label">إضافة أحمال جديدة</span>
          </div>
          <ion-icon name="chevron-back-outline" class="chevron"></ion-icon>
        </a>

        <a href="MD.html" class="nav-item">
          <div class="nav-content">
            <div class="nav-icon-box"><ion-icon name="ribbon-outline"></ion-icon></div>
            <span class="nav-label">منظومة كبار المشتركين</span>
          </div>
          <ion-icon name="chevron-back-outline" class="chevron"></ion-icon>
        </a>

        <a href="SMART_Help.html" class="nav-item" style="background: var(--primary-green);">
          <div class="nav-content">
            <div class="nav-icon-box" style="color: var(--text-muted)"><ion-icon name="help-circle-outline"></ion-icon></div>
            <span class="nav-label" style="color: var(--text-muted)">مركز المساعدة</span>
          </div>
          <ion-icon name="chevron-back-outline" class="chevron"></ion-icon>
        </a>
      </div>
    </div>
  </main>

  <script>
    function updateTime() {
      const now = new Date();
      const options = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        hour: '2-digit', 
        minute: '2-digit'
      };
      document.getElementById("currentTime").textContent = now.toLocaleDateString("ar-EG", options);
    }

    updateTime();
    setInterval(updateTime, 60000);
  </script>
</body>

</html>
