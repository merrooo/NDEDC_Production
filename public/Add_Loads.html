<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes" />
    <title>قياس الأحمال الكهربائية - نظام إدارة ومراقبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ===== All CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #0b2b40;
            --primary-dark: #06212e;
            --primary-light: #1e4a6b;
            --accent: #2c9cd4;
            --danger: #e1573c;
            --success: #2e8b57;
            --bg-page: #eef2f5;
            --card-bg: #ffffff;
            --border-light: #e2e8f0;
            --text-dark: #1a2c3e;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
            --radius-lg: 20px;
            --radius-md: 14px;
            --sidebar-width: 320px;
        }
        body {
            font-family: "Cairo", sans-serif;
            background: linear-gradient(145deg, #e9f0f5 0%, #dfe8ef 100%);
            padding: 8px;
            color: var(--text-dark);
            min-height: 100vh;
        }
        .app {
            max-width: 100%;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .logo-section {
            background: var(--primary);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 3px solid var(--accent);
        }
        .logo-section h2 {
            color: white;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo-section h2 i {
            color: var(--accent);
            font-size: 1.1rem;
        }
        .header-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            font-family: "Cairo", sans-serif;
            font-weight: 600;
            border: none;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .btn-upload-excel {
            background: #217346;
            color: white;
            padding: 4px 12px;
            border-radius: 25px;
            font-size: 0.65rem;
            font-weight: 700;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-upload-excel:hover {
            background: #1a5c38;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(33, 115, 70, 0.3);
        }
        .btn-load-standard {
            background: #6c5ce7;
            color: white;
            padding: 4px 12px;
            border-radius: 25px;
            font-size: 0.65rem;
            font-weight: 700;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-load-standard:hover {
            background: #5a4bd1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }
        .btn-save {
            background: var(--success);
            color: white;
        }
        .btn-save:hover {
            background: #3eac72;
            transform: translateY(-2px);
        }
        .btn-home {
            background: #4a5568;
            color: white;
        }
        .btn-home:hover {
            background: #2d3748;
            transform: translateY(-2px);
        }
        .btn-add-small {
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            font-size: 0.65rem;
            white-space: nowrap;
        }
        .btn-add-small:hover {
            background: #1f86b8;
        }
        .btn-refresh {
            background: var(--accent);
            color: white;
            padding: 4px 8px;
            font-size: 0.6rem;
        }
        .btn-refresh:hover {
            background: #1f86b8;
            transform: rotate(180deg);
        }
        .btn-filter {
            background: var(--primary-light);
            color: white;
            padding: 4px 8px;
            font-size: 0.6rem;
        }
        .btn-filter:hover {
            background: var(--primary);
        }
        .main-container {
            display: flex;
            gap: 0;
            min-height: 600px;
            width: 100%;
        }
        .left-sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: #f8fafc;
            border-left: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 110px);
            position: sticky;
            top: 0;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 8px 12px;
            background: var(--primary-dark);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .sidebar-header h3 {
            font-size: 0.8rem;
            font-weight: 700;
            margin: 0;
        }
        .sidebar-header h3 i {
            color: var(--accent);
            margin-left: 6px;
        }
        .search-filter {
            padding: 4px 10px;
            display: flex;
            gap: 4px;
            background: white;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .sidebar-search {
            flex: 1;
            padding: 4px 10px;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            font-size: 0.65rem;
            outline: none;
            font-family: "Cairo", sans-serif;
            min-width: 0;
        }
        .sidebar-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(44, 156, 212, 0.2);
        }
        .records-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
            background: #f8fafc;
            min-height: 200px;
        }
        .records-list::-webkit-scrollbar {
            width: 4px;
        }
        .records-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        .loading-records {
            text-align: center;
            padding: 30px 15px;
            color: #888;
            font-size: 0.8rem;
        }
        .record-item {
            background: white;
            border-radius: 10px;
            padding: 6px 8px;
            margin-bottom: 4px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .record-item:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
            transform: translateX(-2px);
        }
        .record-item.active {
            border-color: var(--accent);
            background: #f0f8ff;
            border-right: 3px solid var(--accent);
        }
        .record-item .record-name {
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--text-dark);
            padding-left: 45px;
        }
        .record-item .record-meta {
            font-size: 0.55rem;
            color: #888;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 2px;
        }
        .record-item .record-meta span {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .record-item .record-actions {
            display: flex;
            gap: 3px;
            margin-top: 3px;
            flex-wrap: wrap;
        }
        .record-item .record-actions button {
            padding: 2px 6px;
            font-size: 0.5rem;
            border-radius: 10px;
        }
        .record-item .record-badge {
            position: absolute;
            top: 4px;
            left: 6px;
            background: var(--accent);
            color: white;
            font-size: 0.45rem;
            padding: 1px 5px;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-view-record {
            background: #f4b942;
            color: white;
        }
        .btn-view-record:hover {
            background: #d49a2e;
        }
        .btn-delete-record {
            background: var(--danger);
            color: white;
        }
        .btn-delete-record:hover {
            background: #c0392b;
        }
        .right-content {
            flex: 1;
            padding: 8px;
            min-width: 0;
            overflow: hidden;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .main-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 4px;
        }
        .main-form-grid input {
            font-size: 0.7rem;
            padding: 4px 8px;
        }
        .notes-row {
            width: 100%;
            margin-bottom: 6px;
        }
        .notes-input {
            width: 100% !important;
            padding: 4px 10px;
            border: 1px solid var(--border-light);
            border-radius: 25px;
            font-family: "Cairo", sans-serif;
            font-size: 0.7rem;
            background: #fefefe;
            outline: none;
        }
        .notes-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(44, 156, 212, 0.2);
        }
        .section-title {
            background: linear-gradient(95deg, var(--primary-light), var(--primary));
            color: white;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: 700;
            margin: 4px 0 4px 0;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .section-title .editing-mode-indicator {
            background: #f4b942;
            color: white;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            display: none;
            align-items: center;
            gap: 4px;
        }
        .section-title .editing-mode-indicator.show {
            display: inline-flex;
        }
        .section-title .phase-change-indicator {
            background: #e1573c;
            color: white;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 0.55rem;
            font-weight: 700;
            display: none;
            align-items: center;
            gap: 4px;
        }
        .section-title .phase-change-indicator.show {
            display: inline-flex;
        }
        .add-load-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            margin: 3px 0 6px;
            background: #f8fafc;
            padding: 6px 8px;
            border-radius: 30px;
        }
        .add-load-row select {
            width: 120px;
            flex-shrink: 0;
            padding: 4px 6px;
            font-size: 0.65rem;
            border-radius: 20px;
        }
        .small-input {
            width: 85px !important;
            flex-shrink: 0;
            padding: 4px 6px;
            font-size: 0.7rem;
            text-align: center;
            border-radius: 20px;
        }
        .wide-input {
            flex: 1;
            min-width: 120px;
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 20px;
        }
        .btn-add-small {
            flex-shrink: 0;
            white-space: nowrap;
            padding: 4px 10px;
            font-size: 0.65rem;
        }
        .edit-image-preview {
            display: none;
            margin: 3px 0 6px;
            padding: 4px 10px;
            background: #f8fafc;
            border-radius: 20px;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
        }
        .edit-image-preview.show {
            display: flex;
        }
        .edit-image-preview .label {
            font-size: 0.65rem;
            color: #666;
        }
        .edit-image-preview .image-container {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
        }
        .edit-image-preview .image-container img {
            width: 35px;
            height: 35px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .edit-image-preview .image-container .remove-photo-btn {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #e1573c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            font-size: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .edit-image-preview .image-container .photo-wrapper {
            position: relative;
            display: inline-block;
        }
        .edit-image-preview .add-photo-btn {
            background: #2c9cd4;
            color: white;
            border: none;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 8px;
        }
        @media (max-width:1024px) {
            :root {
                --sidebar-width: 260px;
            }
            .add-load-row select {
                width: 100px;
            }
            .small-input {
                width: 70px !important;
            }
        }
        @media (max-width:768px) {
            .main-container {
                flex-direction: column;
            }
            .left-sidebar {
                width: 100%;
                min-width: 100%;
                height: 220px;
                position: relative;
                border-left: none;
                border-bottom: 1px solid var(--border-light);
            }
            .main-form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .add-load-row select {
                width: 100px;
            }
            .small-input {
                width: 65px !important;
            }
            .wide-input {
                min-width: 100px;
            }
        }
        @media (max-width:500px) {
            .main-form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .logo-section {
                flex-direction: column;
                text-align: center;
                padding: 6px 10px;
            }
            .logo-section h2 {
                font-size: 0.85rem;
            }
            .header-actions {
                width: 100%;
                justify-content: center;
            }
            .header-actions button {
                font-size: 0.55rem;
                padding: 3px 8px;
            }
            .add-load-row {
                flex-direction: column;
                align-items: stretch;
                border-radius: 16px;
                padding: 8px;
            }
            .add-load-row select,
            .small-input,
            .wide-input,
            .btn-add-small {
                width: 100% !important;
            }
            .add-load-row select {
                width: 100% !important;
            }
            .small-input {
                width: 100% !important;
            }
            .right-content {
                padding: 4px;
            }
            .table-wrapper {
                min-height: 150px;
            }
            .table-scroll {
                max-height: 300px;
                min-height: 150px;
            }
            th,
            td {
                font-size: 0.55rem;
                padding: 2px 2px;
            }
            .photo-thumb {
                width: 20px;
                height: 20px;
            }
            .section-title {
                font-size: 0.65rem;
                padding: 2px 8px;
            }
            .edit-image-preview .image-container img {
                width: 28px;
                height: 28px;
            }
            .pagination-container button {
                font-size: 0.55rem;
                padding: 2px 6px;
                min-width: 24px;
            }
            .pagination-container .page-info {
                font-size: 0.6rem;
            }
        }
        input,
        select {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--border-light);
            border-radius: 25px;
            font-family: "Cairo", sans-serif;
            font-size: 0.7rem;
            background: #fefefe;
            outline: none;
        }
        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(44, 156, 212, 0.2);
        }
        .table-wrapper {
            overflow: hidden;
            border-radius: var(--radius-md);
            margin-top: 3px;
            width: 100%;
            flex: 1;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-light);
        }
        .table-scroll {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 480px);
            min-height: 150px;
        }
        .table-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            background: white;
        }
        th {
            background: var(--primary-dark);
            color: white;
            padding: 4px 3px;
            font-weight: 700;
            font-size: 0.6rem;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 3px 3px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
            background-color: #fff;
            font-size: 0.65rem;
        }
        tr:hover td {
            background-color: #f1f9ff;
        }
        tfoot td {
            background-color: #eef2f5;
            font-weight: bold;
            font-size: 0.65rem;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
            background: #f8fafc;
            border-top: 1px solid var(--border-light);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .pagination-container button {
            padding: 2px 8px;
            font-size: 0.6rem;
            border-radius: 15px;
            min-width: 26px;
            justify-content: center;
        }
        .pagination-container button.active-page {
            background: var(--accent);
            color: white;
        }
        .pagination-container button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination-container .page-info {
            font-size: 0.65rem;
            color: #666;
            padding: 0 6px;
        }
        .photo-preview {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .photo-thumb {
            width: 24px;
            height: 24px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: transform 0.2s;
        }
        .photo-thumb:hover {
            transform: scale(1.1);
            border-color: var(--accent);
        }
        .swal2-popup {
            font-family: "Cairo", sans-serif;
            direction: rtl;
            z-index: 2000 !important;
        }
        .no-records {
            text-align: center;
            padding: 30px 15px;
            color: #aaa;
        }
        .no-records i {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 8px;
            color: #ddd;
        }
        .no-records p {
            font-size: 0.75rem;
        }
        @media (max-width:480px) {
            body {
                padding: 4px;
            }
            .left-sidebar {
                height: 180px;
            }
            .record-item .record-name {
                font-size: 0.65rem;
                padding-left: 35px;
            }
            .record-item .record-badge {
                font-size: 0.4rem;
                padding: 0 4px;
            }
            .record-item .record-meta {
                font-size: 0.5rem;
            }
            .table-scroll {
                max-height: 250px;
                min-height: 120px;
            }
            .pagination-container {
                padding: 2px 0;
                gap: 3px;
            }
            .pagination-container button {
                font-size: 0.5rem;
                padding: 1px 5px;
                min-width: 20px;
            }
            .edit-image-preview .image-container img {
                width: 24px;
                height: 24px;
            }
        }
        .btn-edit-row {
            background: #f4b942;
            color: white;
            border: none;
            padding: 2px 6px;
            border-radius: 12px;
            margin: 0 1px;
            cursor: pointer;
            font-size: 9px;
        }
        .btn-edit-row:hover {
            background: #d49a2e;
        }
        .btn-delete-row {
            background: #e1573c;
            color: white;
            border: none;
            padding: 2px 6px;
            border-radius: 12px;
            margin: 0 1px;
            cursor: pointer;
            font-size: 9px;
        }
        .btn-delete-row:hover {
            background: #c0392b;
        }
        /* Standard Loads Popup */
        .standard-load-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            cursor: pointer;
        }
        .standard-load-item:hover {
            background: #f8f9ff;
        }
        .standard-load-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .standard-load-item .load-info {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        .standard-load-item .load-name {
            font-weight: 600;
            font-size: 0.75rem;
            min-width: 120px;
        }
        .standard-load-item .load-details {
            font-size: 0.65rem;
            color: #666;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .standard-load-item .load-details span {
            background: #f0f0f0;
            padding: 0 8px;
            border-radius: 10px;
        }
        .standard-load-item .load-source {
            font-size: 0.6rem;
            color: #6c5ce7;
            background: #f0edff;
            padding: 0 8px;
            border-radius: 10px;
        }
        .loads-list-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-top: 8px;
        }
        .loads-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .loads-list-container::-webkit-scrollbar-thumb {
            background: #6c5ce7;

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.3.1/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        // ===== Firebase =====
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, get, set, remove } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyAnKRhT5xJTBvsQKpW7e9w-hGSbAQJWTSo",
            authDomain: "production1-ae85.firebaseapp.com",
            projectId: "production1-ae85",
            storageBucket: "production1-ae85.firebasestorage.app",
            messagingSenderId: "490438031865",
            appId: "1:490438031865:web:a4a69335989f30cd13a528",
            measurementId: "G-W3TZ1EKWWN",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ===== Global Variables =====
        let isLoading = false;
        let currentMeterNo = null;
        let editingRow = null;
        let editingLoadName = null;
        let allRecords = [];
        let loadPhotos = {};
        let allLoadsData = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        // ===== DOM Elements =====
        const mnameInput = document.getElementById("mname");
        const mnoInput = document.getElementById("mno");
        const mcoInput = document.getElementById("mco");
        const notesInput = document.getElementById("notes");
        const tableBody = document.getElementById("tableBody");
        const tableScroll = document.getElementById("tableScroll");
        const totalKWSpan = document.getElementById("totalKW");
        const totalHPSpan = document.getElementById("totalHP");
        const totalAmpsSpan = document.getElementById("totalAmps");
        const phaseMode = document.getElementById("phase_mode");
        const countInput = document.getElementById("count");
        const pfInput = document.getElementById("newItemPF");
        const ampInput = document.getElementById("newItemA");
        const wattInput = document.getElementById("newItemW");
        const hpInput = document.getElementById("newItemHP");
        const loadNameInput = document.getElementById("newItemName");
        const btnSave = document.getElementById("btnSave");
        const btnAddLoad = document.getElementById("btnAddLoad");
        const btnCancelEdit = document.getElementById("btnCancelEdit");
        const addBtnText = document.getElementById("addBtnText");
        const editingIndicator = document.getElementById("editingIndicator");
        const phaseChangeIndicator = document.getElementById("phaseChangeIndicator");
        const editImagePreview = document.getElementById("editImagePreview");
        const editImageContainer = document.getElementById("editImageContainer");
        const recordsList = document.getElementById("recordsList");
        const sidebarSearch = document.getElementById("sidebarSearch");
        const refreshBtn = document.getElementById("refreshBtn");
        const filterBtn = document.getElementById("filterBtn");
        const btnUploadExcel = document.getElementById("btnUploadExcel");
        const btnLoadStandard = document.getElementById("btnLoadStandard");
        const excelFileInput = document.getElementById("excelFileInput");
        const prevPageBtn = document.getElementById("prevPage");
        const nextPageBtn = document.getElementById("nextPage");
        const pageInfo = document.getElementById("pageInfo");

        // ===== Utility =====
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        function showLoading(message = "جاري المعالجة...") {
            if (isLoading) return;
            isLoading = true;
            const allButtons = [btnSave, btnAddLoad, btnUploadExcel, btnLoadStandard];
            const allInputs = [mnameInput, mnoInput, mcoInput, notesInput, phaseMode, countInput, pfInput, ampInput,
                wattInput, hpInput, loadNameInput
            ];
            allButtons.forEach(btn => { if (btn) { btn.disabled = true;
                    btn.style.opacity = "0.6"; } });
            allInputs.forEach(input => { if (input) { input.disabled = true;
                    input.style.opacity = "0.6"; } });
            Swal.fire({
                title: message,
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); },
                showConfirmButton: false,
                backdrop: true
            });
        }

        function hideLoading() {
            if (!isLoading) return;
            isLoading = false;
            const allButtons = [btnSave, btnAddLoad, btnUploadExcel, btnLoadStandard];
            const allInputs = [mnameInput, mnoInput, mcoInput, notesInput, phaseMode, countInput, pfInput, ampInput,
                wattInput, hpInput, loadNameInput
            ];
            allButtons.forEach(btn => { if (btn) { btn.disabled = false;
                    btn.style.opacity = "1"; } });
            allInputs.forEach(input => { if (input) { input.disabled = false;
                    input.style.opacity = "1"; } });
            Swal.close();
        }

        // ===== Calculations =====
        function calculateFromAmps(amps, pf = 0.92, mode = "3") {
            const V = mode === "3" ? 380 : 220;
            const factor = mode === "3" ? Math.sqrt(3) : 1;
            const watts = factor * V * amps * pf;
            const hp = watts / 746;
            return { watts, hp, amps };
        }

        function calculateFromWatts(watts, pf = 0.92, mode = "3") {
            const V = mode === "3" ? 380 : 220;
            const factor = mode === "3" ? Math.sqrt(3) : 1;
            const amps = watts / (factor * V * pf);
            const hp = watts / 746;
            return { watts, amps, hp };
        }

        function calculateFromHP(hp, pf = 0.92, mode = "3") {
            const watts = hp * 746;
            const V = mode === "3" ? 380 : 220;
            const factor = mode === "3" ? Math.sqrt(3) : 1;
            const amps = watts / (factor * V * pf);
            return { watts, amps, hp };
        }

        function calculateRowTotals(count, watts, hp, amps) {
            const totalWatts = (watts || 0) * (count || 1);
            const totalHP = (hp || 0) * (count || 1);
            const totalAmps = (amps || 0) * (count || 1);
            const totalKW = totalWatts / 1000;
            return { totalWatts, totalHP, totalAmps, totalKW };
        }

        // ===== Update Totals from ALL data =====
        function updateTotals() {
            let totalKW = 0,
                totalHP = 0,
                totalAmps = 0;
            for (const load of allLoadsData) {
                totalKW += parseFloat(load.totalKW) || 0;
                totalHP += parseFloat(load.totalHP) || 0;
                totalAmps += (parseFloat(load.amps) || 0) * (parseFloat(load.count) || 1);
            }
            totalKWSpan.innerText = totalKW.toFixed(2);
            totalHPSpan.innerText = totalHP.toFixed(2);
            totalAmpsSpan.innerText = totalAmps.toFixed(2);
        }

        // ===== Photo Functions =====
        function updatePhotoPreview(row, loadName) {
            const photos = loadPhotos[loadName] || [];
            const photoCell = row.cells[7];
            if (photos.length > 0) {
                let thumbsHtml = '<div class="photo-preview">';
                photos.forEach((photo, idx) => {
                    thumbsHtml += `
                        <img src="${photo}" class="photo-thumb" onclick="event.stopPropagation(); window.enlargeImage('${photo}')" title="صورة ${idx + 1}">
                    `;
                });
                thumbsHtml += '</div>';
                photoCell.innerHTML = thumbsHtml;
            } else {
                photoCell.innerHTML = '<span style="color:#aaa; font-size:8px;">-</span>';
            }
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        let width = img.width,
                            height = img.height;
                        const maxDimension = 600;
                        if (width > maxDimension || height > maxDimension) {
                            if (width > height) { height = (height * maxDimension) / width;
                                width = maxDimension; } else { width = (width * maxDimension) / height;
                                height = maxDimension; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0, width, height);
                        let quality = 0.7;
                        let base64 = canvas.toDataURL("image/jpeg", quality);
                        resolve(base64);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function addPhotosToLoad(loadName) {
            if (isLoading) return;
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            input.multiple = true;
            input.onchange = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                showLoading(`جاري رفع ${files.length} صورة...`);
                const newPhotos = [];
                for (const file of files) {
                    const base64 = await compressImage(file);
                    newPhotos.push(base64);
                }
                if (!loadPhotos[loadName]) loadPhotos[loadName] = [];
                loadPhotos[loadName] = [...loadPhotos[loadName], ...newPhotos];
                for (let row of tableBody.rows) {
                    if (row.cells[0].innerText === loadName) {
                        updatePhotoPreview(row, loadName);
                    }
                }
                if (editingRow && editingLoadName === loadName) {
                    showEditImagePreview(loadName);
                }
                hideLoading();
                await Swal.fire("تم الرفع", `تم إضافة ${newPhotos.length} صورة`, "success", { timer: 1500,
                    showConfirmButton: false });
            };
            input.click();
        }

        async function removePhotoFromLoad(loadName, photoIndex) {
            const result = await Swal.fire({
                title: "تأكيد الحذف",
                text: "هل أنت متأكد من حذف هذه الصورة؟",
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "نعم، حذف",
                cancelButtonText: "إلغاء"
            });
            if (result.isConfirmed) {
                if (loadPhotos[loadName]) {
                    loadPhotos[loadName].splice(photoIndex, 1);
                    if (loadPhotos[loadName].length === 0) delete loadPhotos[loadName];
                    for (let row of tableBody.rows) {
                        if (row.cells[0].innerText === loadName) {
                            updatePhotoPreview(row, loadName);
                        }
                    }
                    if (editingRow && editingLoadName === loadName) {
                        showEditImagePreview(loadName);
                    }
                    Swal.fire("تم الحذف", "تم حذف الصورة بنجاح", "success", { timer: 1000, showConfirmButton: false });
                }
            }
        }

        function showEditImagePreview(loadName) {
            const photos = loadPhotos[loadName] || [];
            editImagePreview.classList.add('show');
            editImageContainer.innerHTML = '';
            if (photos.length > 0) {
                photos.forEach((photo, idx) => {
                    const wrapper = document.createElement('span');
                    wrapper.className = 'photo-wrapper';
                    wrapper.innerHTML = `
                        <img src="${photo}" onclick="window.enlargeImage('${photo}')">
                        <button class="remove-photo-btn" data-index="${idx}">✕</button>
                    `;
                    editImageContainer.appendChild(wrapper);
                    wrapper.querySelector('.remove-photo-btn').onclick = (e) => {
                        e.stopPropagation();
                        removePhotoFromLoad(loadName, idx);
                    };
                });
            }
            const addBtn = document.createElement('button');
            addBtn.className = 'add-photo-btn';
            addBtn.innerHTML = '<i class="fas fa-plus"></i> إضافة';
            addBtn.onclick = () => addPhotosToLoad(loadName);
            editImageContainer.appendChild(addBtn);
        }

        window.enlargeImage = (imageSrc) => {
            Swal.fire({
                imageUrl: imageSrc,
                imageAlt: "الصورة",
                showCloseButton: true,
                showConfirmButton: false,
                width: "auto",
                background: "rgba(0,0,0,0.9)",
                imageWidth: "80%",
                imageHeight: "auto"
            });
        };

        // ===== Real-time Calculation for Input Fields =====
        let lastWatts = 0,
            lastHp = 0,
            lastAmps = 0;
        let isRecalculating = false;

        function updateInputsFromWatts() {
            if (isRecalculating) return;
            let watts = parseFloat(wattInput.value) || 0;
            let pf = parseFloat(pfInput.value) || 0.92;
            let mode = phaseMode.value;
            if (watts > 0) {
                const result = calculateFromWatts(watts, pf, mode);
                ampInput.value = result.amps.toFixed(2);
                hpInput.value = result.hp.toFixed(3);
                lastWatts = watts;
                lastHp = parseFloat(hpInput.value);
                lastAmps = parseFloat(ampInput.value);
                if (editingRow) phaseChangeIndicator.classList.add('show');
            } else {
                if (ampInput.value === "" || parseFloat(ampInput.value) === 0) ampInput.value = "";
                if (hpInput.value === "" || parseFloat(hpInput.value) === 0) hpInput.value = "";
            }
        }

        function updateInputsFromHP() {
            if (isRecalculating) return;
            let hp = parseFloat(hpInput.value) || 0;
            let pf = parseFloat(pfInput.value) || 0.92;
            let mode = phaseMode.value;
            if (hp > 0) {
                const result = calculateFromHP(hp, pf, mode);
                wattInput.value = result.watts.toFixed(0);
                ampInput.value = result.amps.toFixed(2);
                lastHp = hp;
                lastWatts = parseFloat(wattInput.value);
                lastAmps = parseFloat(ampInput.value);
                if (editingRow) phaseChangeIndicator.classList.add('show');
            } else {
                if (wattInput.value === "" || parseFloat(wattInput.value) === 0) wattInput.value = "";
                if (ampInput.value === "" || parseFloat(ampInput.value) === 0) ampInput.value = "";
            }
        }

        function updateInputsFromAmps() {
            if (isRecalculating) return;
            let amps = parseFloat(ampInput.value) || 0;
            let pf = parseFloat(pfInput.value) || 0.92;
            let mode = phaseMode.value;
            if (amps > 0) {
                const result = calculateFromAmps(amps, pf, mode);
                wattInput.value = result.watts.toFixed(0);
                hpInput.value = result.hp.toFixed(3);
                lastAmps = amps;
                lastWatts = parseFloat(wattInput.value);
                lastHp = parseFloat(hpInput.value);
                if (editingRow) phaseChangeIndicator.classList.add('show');
            } else {
                if (wattInput.value === "" || parseFloat(wattInput.value) === 0) wattInput.value = "";
                if (hpInput.value === "" || parseFloat(hpInput.value) === 0) hpInput.value = "";
            }
        }

        wattInput.addEventListener('input', updateInputsFromWatts);
        hpInput.addEventListener('input', updateInputsFromHP);
        ampInput.addEventListener('input', updateInputsFromAmps);

        phaseMode.addEventListener('change', () => {
            if (!editingRow) return;
            isRecalculating = true;
            if (lastWatts > 0) {
                const result = calculateFromWatts(lastWatts, parseFloat(pfInput.value) || 0.92, phaseMode.value);
                ampInput.value = result.amps.toFixed(2);
                hpInput.value = result.hp.toFixed(3);
                phaseChangeIndicator.classList.add('show');
            } else if (lastHp > 0) {
                const result = calculateFromHP(lastHp, parseFloat(pfInput.value) || 0.92, phaseMode.value);
                wattInput.value = result.watts.toFixed(0);
                ampInput.value = result.amps.toFixed(2);
                phaseChangeIndicator.classList.add('show');
            } else if (lastAmps > 0) {
                const result = calculateFromAmps(lastAmps, parseFloat(pfInput.value) || 0.92, phaseMode.value);
                wattInput.value = result.watts.toFixed(0);
                hpInput.value = result.hp.toFixed(3);
                phaseChangeIndicator.classList.add('show');
            }
            isRecalculating = false;
        });

        pfInput.addEventListener('change', () => {
            if (wattInput.value && parseFloat(wattInput.value) > 0) updateInputsFromWatts();
            else if (hpInput.value && parseFloat(hpInput.value) > 0) updateInputsFromHP();
            else if (ampInput.value && parseFloat(ampInput.value) > 0) updateInputsFromAmps();
        });

        // ===== Pagination =====
        function renderTablePage() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = allLoadsData.slice(start, end);

            tableBody.innerHTML = '';
            if (pageItems.length === 0 && allLoadsData.length === 0) {
                tableBody.innerHTML =
                    `<tr><td colspan="9" style="text-align:center; padding:20px; color:#aaa;">لا توجد أحمال</td></tr>`;
            } else if (pageItems.length === 0) {
                currentPage = Math.ceil(allLoadsData.length / itemsPerPage);
                renderTablePage();
                return;
            } else {
                pageItems.forEach(load => {
                    const row = tableBody.insertRow();
                    row.insertCell(0).innerHTML = `<strong>${escapeHtml(load.item)}</strong>`;
                    row.insertCell(1).innerHTML = load.count;
                    row.insertCell(2).innerHTML = load.watts;
                    row.insertCell(3).innerHTML = load.hp;
                    row.insertCell(4).innerHTML = load.amps;
                    row.insertCell(5).innerHTML = load.totalKW;
                    row.insertCell(6).innerHTML = load.totalHP;
                    const photoCell = row.insertCell(7);
                    photoCell.style.minWidth = "50px";
                    updatePhotoPreview(row, load.item);
                    const actionCell = row.insertCell(8);
                    actionCell.style.whiteSpace = "nowrap";
                    actionCell.innerHTML = `
                        <button class="btn-edit-row" data-load="${escapeHtml(load.item)}"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete-row" data-load="${escapeHtml(load.item)}"><i class="fas fa-trash-alt"></i></button>
                    `;
                    actionCell.querySelector('.btn-edit-row').onclick = () => {
                        const loadName = load.item;
                        for (let r of tableBody.rows) {
                            if (r.cells[0].innerText === loadName) {
                                startEditRow(r);
                                break;
                            }
                        }
                    };
                    actionCell.querySelector('.btn-delete-row').onclick = () => {
                        const loadName = load.item;
                        delete loadPhotos[loadName];
                        allLoadsData = allLoadsData.filter(l => l.item !== loadName);
                        renderTablePage();
                        updateTotals();
                        refreshSidebar();
                        if (editingRow && editingLoadName === loadName) cancelEdit();
                    };
                });
            }
            updateTotals();
            updatePaginationButtons();
        }

        function updatePaginationButtons() {
            const totalPages = Math.ceil(allLoadsData.length / itemsPerPage) || 1;
            pageInfo.textContent = `الصفحة ${currentPage} من ${totalPages}`;
            prevPageBtn.disabled = currentPage <= 1;
            nextPageBtn.disabled = currentPage >= totalPages;
        }

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) { currentPage--;
                renderTablePage(); }
        });

        nextPageBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(allLoadsData.length / itemsPerPage);
            if (currentPage < totalPages) { currentPage++;
                renderTablePage(); }
        });

        // ===== Add/Update Load =====
        function addLoadToData(description, count, wattsPerUnit, hpPerUnit, ampsPerUnit) {
            const { totalWatts, totalHP, totalAmps, totalKW } = calculateRowTotals(count, wattsPerUnit, hpPerUnit,
            ampsPerUnit);
            const loadData = {
                item: description,
                count: count,
                watts: wattsPerUnit || 0,
                hp: hpPerUnit ? hpPerUnit.toFixed(3) : 0,
                amps: totalAmps.toFixed(2),
                totalKW: totalKW.toFixed(3),
                totalHP: totalHP.toFixed(3)
            };
            allLoadsData.push(loadData);
            allLoadsData.sort((a, b) => a.item.localeCompare(b.item));
            const totalPages = Math.ceil(allLoadsData.length / itemsPerPage);
            currentPage = totalPages;
            renderTablePage();
            if (loadPhotos[description]) {
                for (let row of tableBody.rows) {
                    if (row.cells[0].innerText === description) {
                        updatePhotoPreview(row, description);
                        break;
                    }
                }
            }
            return loadData;
        }

        function startEditRow(row) {
            if (editingRow && editingRow !== row) cancelEdit();

            const description = row.cells[0].innerText;
            const count = row.cells[1].innerText;
            const watts = row.cells[2].innerText;
            const hp = row.cells[3].innerText;
            const amps = row.cells[4].innerText;

            editingRow = row;
            editingLoadName = description;

            loadNameInput.value = description;
            countInput.value = count;
            wattInput.value = watts;
            hpInput.value = hp;
            ampInput.value = amps;
            lastWatts = parseFloat(watts) || 0;
            lastHp = parseFloat(hp) || 0;
            lastAmps = parseFloat(amps) || 0;

            addBtnText.textContent = 'تحديث';
            editingIndicator.classList.add('show');
            btnCancelEdit.style.display = 'inline-flex';
            btnAddLoad.style.background = '#f4b942';
            phaseChangeIndicator.classList.remove('show');

            showEditImagePreview(description);
            document.querySelector('.section-title').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function cancelEdit() {
            editingRow = null;
            editingLoadName = null;
            addBtnText.textContent = 'إضافة';
            editingIndicator.classList.remove('show');
            btnCancelEdit.style.display = 'none';
            btnAddLoad.style.background = '';
            editImagePreview.classList.remove('show');
            editImageContainer.innerHTML = '';
            phaseChangeIndicator.classList.remove('show');
            loadNameInput.value = '';
            countInput.value = '1';
            wattInput.value = '';
            hpInput.value = '';
            ampInput.value = '';
            lastWatts = 0;
            lastHp = 0;
            lastAmps = 0;
        }

        btnCancelEdit.addEventListener('click', cancelEdit);

        btnAddLoad.onclick = () => {
            if (isLoading) return;

            const description = loadNameInput.value.trim();
            const count = parseInt(countInput.value) || 1;
            let watts = parseFloat(wattInput.value) || 0;
            let hp = parseFloat(hpInput.value) || 0;
            let amps = parseFloat(ampInput.value) || 0;
            const pf = parseFloat(pfInput.value) || 0.92;
            const mode = phaseMode.value;

            if (!description) { Swal.fire("تنبيه", "يرجى إدخال وصف الحمل", "warning"); return; }
            if (watts === 0 && amps === 0 && hp === 0) { Swal.fire("تنبيه", "أدخل الوات أو الأمبير أو الحصان", "info"); return; }

            if (watts > 0) {
                const result = calculateFromWatts(watts, pf, mode);
                amps = result.amps;
                hp = result.hp;
            } else if (hp > 0) {
                const result = calculateFromHP(hp, pf, mode);
                watts = result.watts;
                amps = result.amps;
            } else if (amps > 0) {
                const result = calculateFromAmps(amps, pf, mode);
                watts = result.watts;
                hp = result.hp;
            }

            if (editingRow && editingLoadName) {
                allLoadsData = allLoadsData.filter(l => l.item !== editingLoadName);
                if (editingLoadName !== description && loadPhotos[editingLoadName]) {
                    loadPhotos[description] = loadPhotos[editingLoadName];
                    delete loadPhotos[editingLoadName];
                }
                addLoadToData(description, count, watts, hp, amps);
                cancelEdit();
                Swal.fire("✅ تم التحديث", `تم تحديث الحمل "${description}"`, "success", { timer: 1500,
                    showConfirmButton: false });
            } else {
                addLoadToData(description, count, watts, hp, amps);
                loadNameInput.value = "";
                countInput.value = "1";
                wattInput.value = "";
                hpInput.value = "";
                ampInput.value = "";
            }

            updateTotals();
            refreshSidebar();
        };

        // ===== Save =====
        function getCurrentLoads() {
            return allLoadsData.map(load => ({
                item: load.item,
                count: load.count,
                watts: load.watts,
                hp: load.hp,
                amps: load.amps,
                totalKW: load.totalKW,
                totalHP: load.totalHP
            }));
        }

        btnSave.onclick = async () => {
            if (isLoading) return;
            const meterNo = mnoInput.value.trim();
            const name = mnameInput.value.trim();
            const code = mcoInput.value.trim();
            if (!meterNo) { await Swal.fire("خطأ", "رقم العداد مطلوب", "error"); return; }
            if (!name) { await Swal.fire("خطأ", "اسم المشترك مطلوب", "error"); return; }
            showLoading("جاري الحفظ...");
            try {
                const loads = getCurrentLoads();
                let totalKW = 0,
                    totalHP = 0,
                    totalAmps = 0;
                for (const load of loads) {
                    totalKW += parseFloat(load.totalKW) || 0;
                    totalHP += parseFloat(load.totalHP) || 0;
                    totalAmps += (parseFloat(load.amps) || 0) * (parseFloat(load.count) || 1);
                }
                const dataToSave = {
                    name,
                    meter_no: meterNo,
                    code: code || "",
                    description: notesInput.value || "",
                    loads,
                    photos: loadPhotos,
                    totalKW: totalKW.toFixed(2),
                    totalHP: totalHP.toFixed(2),
                    totalAmps: totalAmps.toFixed(2),
                    lastUpdated: new Date().toISOString(),
                };
                await set(ref(db, `Munipilation/${meterNo}`), dataToSave);
                currentMeterNo = meterNo;
                hideLoading();
                await Swal.fire({ title: "تم الحفظ", text: "تم حفظ البيانات بنجاح", icon: "success", timer: 1500,
                    showConfirmButton: false });
                refreshSidebar();
            } catch (e) {
                hideLoading();
                await Swal.fire("خطأ", e.message, "error");
            }
        };

        // ===== Reset Form =====
        function resetForm() {
            mnameInput.value = "";
            mnoInput.value = "";
            mcoInput.value = "";
            notesInput.value = "";
            allLoadsData = [];
            loadPhotos = {};
            currentMeterNo = null;
            cancelEdit();
            currentPage = 1;
            renderTablePage();
            updateTotals();
        }

        // ===== Load Data to Main Form =====
        async function loadDataToMainForm(meterNo) {
            if (!meterNo) return null;
            showLoading("جاري تحميل البيانات...");
            try {
                const snap = await get(ref(db, `Munipilation/${meterNo}`));
                const data = snap.val();
                hideLoading();
                if (data && data.meter_no === meterNo) {
                    resetForm();
                    mnameInput.value = data.name || "";
                    mnoInput.value = data.meter_no || "";
                    mcoInput.value = data.code || "";
                    notesInput.value = data.description || "";
                    if (data.loads && Array.isArray(data.loads) && data.loads.length > 0) {
                        allLoadsData = data.loads.map(load => ({
                            item: load.item,
                            count: load.count,
                            watts: load.watts,
                            hp: load.hp,
                            amps: load.amps,
                            totalKW: load.totalKW,
                            totalHP: load.totalHP
                        }));
                        allLoadsData.sort((a, b) => a.item.localeCompare(b.item));
                        currentPage = 1;
                        renderTablePage();
                    }
                    if (data.photos && typeof data.photos === 'object') {
                        loadPhotos = JSON.parse(JSON.stringify(data.photos));
                        for (let row of tableBody.rows) {
                            const loadName = row.cells[0].innerText;
                            if (loadPhotos[loadName]) updatePhotoPreview(row, loadName);
                        }
                    }
                    currentMeterNo = meterNo;
                    highlightActiveRecord(meterNo);
                    return data;
                }
                return null;
            } catch (error) {
                hideLoading();
                console.error(error);
                return null;
            }
        }

        // ===== Sidebar =====
        function renderRecords(records) {
            if (!records || records.length === 0) {
                recordsList.innerHTML =
                    `<div class="no-records"><i class="fas fa-search"></i><p>لا توجد نتائج</p></div>`;
                return;
            }
            let html = '';
            records.forEach(record => {
                const isActive = record.key === currentMeterNo;
                const loadCount = record.loads ? record.loads.length : 0;
                const totalKW = record.totalKW || '0.00';
                html += `
                    <div class="record-item ${isActive ? 'active' : ''}" data-meter="${record.key}" onclick="window.selectRecord('${record.key}')">
                        <div class="record-badge">${totalKW} ك.وات</div>
                        <div class="record-name">${escapeHtml(record.name || 'غير معروف')}</div>
                        <div class="record-meta">
                            <span><i class="fas fa-id-card"></i> ${escapeHtml(record.meter_no || '-')}</span>
                            <span><i class="fas fa-boxes"></i> ${loadCount}</span>
                            <span><i class="fas fa-clock"></i> ${record.lastUpdated ? new Date(record.lastUpdated).toLocaleDateString('ar-EG') : '-'}</span>
                        </div>
                        <div class="record-actions">
                            <button class="btn-view-record" onclick="event.stopPropagation(); window.viewFullRecord('${record.key}')"><i class="fas fa-eye"></i></button>
                            <button class="btn-delete-record" onclick="event.stopPropagation(); window.deleteRecord('${record.key}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            recordsList.innerHTML = html;
        }

        async function refreshSidebar() {
            try {
                const snapshot = await get(ref(db, "Munipilation"));
                const data = snapshot.val();
                let records = [];
                if (data) {
                    Object.entries(data).forEach(([key, val]) => {
                        records.push({ key, ...val });
                    });
                }
                allRecords = records;
                if (records.length === 0) {
                    recordsList.innerHTML =
                        `<div class="no-records"><i class="fas fa-database"></i><p>لا توجد بيانات</p></div>`;
                    return;
                }
                renderRecords(records);
            } catch (error) {
                recordsList.innerHTML =
                    `<div class="no-records"><i class="fas fa-exclamation-circle"></i><p>خطأ في التحميل</p></div>`;
            }
        }

        function highlightActiveRecord(meterNo) {
            const items = recordsList.querySelectorAll('.record-item');
            items.forEach(item => {
                item.classList.toggle('active', item.dataset.meter === meterNo);
            });
        }

        window.selectRecord = function(meterNo) {
            loadDataToMainForm(meterNo);
        };

        sidebarSearch.addEventListener('input', (e) => {
            const searchTerm = e.target.value.trim().toLowerCase();
            if (!searchTerm) { renderRecords(allRecords); return; }
            const filtered = allRecords.filter(record =>
                (record.name && record.name.toLowerCase().includes(searchTerm)) ||
                (record.meter_no && record.meter_no.toLowerCase().includes(searchTerm)) ||
                (record.code && record.code.toLowerCase().includes(searchTerm))
            );
            renderRecords(filtered);
        });

        refreshBtn.onclick = () => refreshSidebar();
        filterBtn.onclick = () => { sidebarSearch.value = '';
            renderRecords(allRecords); };

        // ===== View Full Record =====

            try {
                const snap = await get(ref(db, `Munipilation/${meterNo}`));

                </tr></tfoot></table></div>`;
                await Swal.fire({

                        <p><strong>العداد:</strong> ${escapeHtml(data.meter_no || "-")}</p>

                        </div>

                    confirmButtonText: "إغلاق",

                });
            } catch (error) {
                hideLoading();
                await Swal.fire("خطأ", "فشل تحميل البيانات", "error");
            }
        };

        window.deleteRecord = async (meterNo) => {
            const result = await Swal.fire({
                title: "تأكيد الحذف",
                text: "هل أنت متأكد من حذف هذا السجل؟",
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "نعم، حذف",
                cancelButtonText: "إلغاء",

            });
            if (result.isConfirmed) {

                    await remove(ref(db, `Munipilation/${meterNo}`));
                    hideLoading();
