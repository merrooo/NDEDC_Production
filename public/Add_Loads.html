                    if (currentMeterNo === meterNo) resetForm();
                    refreshSidebar();
                } catch (error) {
                    hideLoading();
                    await Swal.fire("خطأ", "فشل الحذف", "error");
                }
            }
        };

        window.exportToExcel = async (meterNo) => {
            showLoading("جاري التصدير...");
            try {
                const snap = await get(ref(db, `Munipilation/${meterNo}`));
                const data = snap.val();
                if (!data) { hideLoading();
                    await Swal.fire("خطأ", "لم يتم العثور على البيانات", "error"); return; }
                const rows = [
                    ["تقرير بيان الأحمال الكهربائية", "", "", "", "", "", ""],
                    [`الاسم: ${data.name || ""}`, "", "", "", "", "", ""],
                    [`العداد: ${data.meter_no || ""}`, "", "", "", "", "", ""],
                    [`الكود: ${data.code || ""}`, "", "", "", "", "", ""],
                    [`الوصف: ${data.description || ""}`, "", "", "", "", "", ""],
                    ["", "", "", "", "", "", ""],
                    ["الحمل", "العدد", "وات", "حصان", "أمبير", "ك.وات", "حصان"],
                ];
                (data.loads || []).forEach((load) => {
                    rows.push([load.item || "", load.count || "1", load.watts || "0", load.hp || "0", load.amps || "0",
                        load.totalKW || "0", load.totalHP || "0"
                    ]);
                });
                rows.push(["الإجمالي", "", "", "", "", data.totalKW || "0.00", data.totalHP || "0.00"]);
                const ws = XLSX.utils.aoa_to_sheet(rows);
                ws['!cols'] = [{ wch: 20 }, { wch: 6 }, { wch: 8 }, { wch: 8 }, { wch: 8 }, { wch: 10 }, { wch: 10 }];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "الأحمال");
                XLSX.writeFile(wb, `تقرير-${data.name || "اضافة احمال"}-${meterNo}.xlsx`);
                hideLoading();
                await Swal.fire("تم التصدير", "تم إنشاء ملف Excel", "success", { timer: 1500, showConfirmButton: false });
            } catch (error) {
                hideLoading();
                await Swal.fire("خطأ", "فشل التصدير", "error");
            }
        };

        // ===== Excel Upload =====
        function parseExcelLoads(data) {
            const loads = [];
            let headerMap = {};
            for (let i = 0; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length === 0) continue;
                const firstCell = String(row[0] || '').trim();
                if (firstCell.includes('وصف') || firstCell.includes('نوع') || firstCell.includes('الحمل')) {
                    for (let j = 0; j < row.length; j++) {
                        const cell = String(row[j] || '').trim();
                        if (cell.includes('وصف') || cell.includes('نوع') || cell.includes('الحمل')) headerMap[
                            'description'] = j;
                        else if (cell.includes('وات') || cell.includes('واط') || cell.includes('W')) headerMap['watts'] =
                            j;
                        else if (cell.includes('حصان') || cell.includes('HP')) headerMap['hp'] = j;
                        else if (cell.includes('أمبير') || cell.includes('امبير') || cell.includes('A')) headerMap[
                            'amps'] = j;
                        else if (cell.includes('نوع') || cell.includes('مصدر') || cell.includes('phase')) headerMap[
                            'type'] = j;
                        else if (cell.includes('فولت') || cell.includes('Volt') || cell.includes('V')) headerMap[
                            'voltage'] = j;
                    }
                    break;
                }
            }
            if (Object.keys(headerMap).length === 0) {
                headerMap = { 'description': 0, 'watts': 1, 'hp': 2, 'amps': 3 };
            }
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length === 0) continue;
                const description = String(row[headerMap['description']] || '').trim();
                if (!description || description === '') continue;
                let watts = parseFloat(row[headerMap['watts']]) || 0;
                let hp = parseFloat(row[headerMap['hp']]) || 0;
                let amps = parseFloat(row[headerMap['amps']]) || 0;
                const type = String(row[headerMap['type']] || '').trim();
                let mode = "3";
                if (type.includes('1') || type.includes('واحد') || type.includes('single')) mode = "1";
                const pf = 0.92;
                const V = mode === "3" ? 380 : 220;
                const factor = mode === "3" ? Math.sqrt(3) : 1;
                if (watts > 0 && amps === 0) { amps = watts / (factor * V * pf); } else if (amps > 0 && watts === 0) { watts =
                        factor * V * amps * pf; } else if (hp > 0 && watts === 0 && amps === 0) { watts = hp * 746;
                    amps = watts / (factor * V * pf); }
                if (hp === 0 && watts > 0) { hp = watts / 746; }
                if (watts > 0 || amps > 0 || hp > 0) {
                    loads.push({ description, watts, hp, amps });
                }
            }
            return loads;
        }

        btnUploadExcel.addEventListener('click', () => { excelFileInput.click(); });

        excelFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoading("جاري قراءة الملف...");
            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                const loads = parseExcelLoads(jsonData);
                if (loads.length === 0) {
                    hideLoading();
                    await Swal.fire("تنبيه", "لم يتم العثور على بيانات صالحة", "warning");
                    return;
                }
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const loadSetId = `loads_${timestamp}`;
                const formattedLoads = loads.map(load => {
                    const { totalKW, totalHP } = calculateRowTotals(1, load.watts, load.hp, load.amps);
                    return {
                        item: load.description,
                        count: 1,
                        watts: load.watts.toFixed(0),
                        hp: load.hp.toFixed(3),
                        amps: load.amps.toFixed(2),
                        totalKW: totalKW.toFixed(3),
                        totalHP: totalHP.toFixed(3)
                    };
                });
                const totalKW = loads.reduce((sum, l) => sum + l.watts / 1000, 0);
                const totalHP = loads.reduce((sum, l) => sum + l.hp, 0);
                const totalAmps = loads.reduce((sum, l) => sum + l.amps, 0);
                const loadData = {
                    name: "الأحمال المضافة",
                    meter_no: loadSetId,
                    code: "",
                    description: `رفع من ${file.name} - ${loads.length} حمل`,
                    loads: formattedLoads,
                    photos: {},
                    totalKW: totalKW.toFixed(2),
                    totalHP: totalHP.toFixed(2),
                    totalAmps: totalAmps.toFixed(2),
                    lastUpdated: new Date().toISOString(),
                    sourceFile: file.name,
                    isStandard: true
                };
                await set(ref(db, `Munipilation/${loadSetId}`), loadData);
                hideLoading();
                await Swal.fire({
                    title: "✅ تم الرفع",
                    html: `تم رفع <strong>${loads.length}</strong> حمل`,
                    icon: "success",
                    timer: 2000,
                    showConfirmButton: true
                });
                refreshSidebar();
            } catch (error) {
                hideLoading();
                await Swal.fire("خطأ", "حدث خطأ أثناء القراءة", "error");
            }
            excelFileInput.value = '';
        });

        // ===== Delete load from database =====
        async function deleteLoadFromDatabase(sourceKey, loadItem) {
            try {
                const snap = await get(ref(db, `Munipilation/${sourceKey}`));
                const data = snap.val();
                if (data && data.loads && Array.isArray(data.loads)) {
                    const updatedLoads = data.loads.filter(load => load.item !== loadItem);
                    if (updatedLoads.length !== data.loads.length) {
                        let totalKW = 0,
                            totalHP = 0,
                            totalAmps = 0;
                        for (const load of updatedLoads) {
                            totalKW += parseFloat(load.totalKW) || 0;
                            totalHP += parseFloat(load.totalHP) || 0;
                            totalAmps += (parseFloat(load.amps) || 0) * (parseFloat(load.count) || 1);
                        }
                        const updatedData = {
                            ...data,
                            loads: updatedLoads,
                            totalKW: totalKW.toFixed(2),
                            totalHP: totalHP.toFixed(2),
                            totalAmps: totalAmps.toFixed(2),
                            lastUpdated: new Date().toISOString()
                        };
                        await set(ref(db, `Munipilation/${sourceKey}`), updatedData);
                        refreshSidebar();
                    }
                }
            } catch (error) { console.error(error); }
        }

        // ===== Standard Loads Popup with Duplicate Detection =====
        btnLoadStandard.onclick = async () => {
            if (isLoading) return;
            showLoading("جاري التحميل...");
            try {
                const snapshot = await get(ref(db, "Munipilation"));
                const data = snapshot.val();
                hideLoading();
                if (!data || Object.keys(data).length === 0) {
                    await Swal.fire("تنبيه", "لا توجد أحمال محفوظة", "info");
                    return;
                }
                let allLoads = [];
                Object.entries(data).forEach(([key, val]) => {
                    if (val.loads && Array.isArray(val.loads)) {
                        val.loads.forEach(load => {
                            allLoads.push({
                                ...load,
                                sourceKey: key,
                                sourceName: val.name || 'مشترك',
                                checked: false
                            });
                        });
                    }
                });
                if (allLoads.length === 0) {
                    await Swal.fire("تنبيه", "لا توجد أحمال", "info");
                    return;
                }

                // Find duplicates
                const nameMap = {};
                allLoads.forEach((load, idx) => {
                    const name = load.item || '';
                    if (!nameMap[name]) nameMap[name] = [];
                    nameMap[name].push(idx);
                });
                const duplicateGroups = {};
                Object.entries(nameMap).forEach(([name, indices]) => {
                    if (indices.length > 1) {
                        duplicateGroups[name] = indices.map(idx => allLoads[idx]);
                    }
                });
                const hasDuplicates = Object.keys(duplicateGroups).length > 0;

                let loadsHtml = `
                    <div style="text-align:right; width:100%;">
                        <div class="loads-header">
                            <input type="text" id="loadsSearchInput" class="loads-search" placeholder="بحث في الأحمال...">
                            <span class="loads-count">إجمالي: ${allLoads.length} حمل ${hasDuplicates ? `| <span style="color:#e1573c;">🔴 ${Object.keys(duplicateGroups).length} نوع مكرر</span>` : ''}</span>
                        </div>
                        <div class="loads-list-container" id="loadsListContainer">
                `;

                allLoads.forEach((load, idx) => {
                    const watts = parseFloat(load.watts) || 0;
                    const hp = parseFloat(load.hp) || 0;
                    const amps = parseFloat(load.amps) || 0;
                    const isDuplicate = duplicateGroups[load.item] && duplicateGroups[load.item].length > 1;
                    loadsHtml += `
                        <div class="standard-load-item" data-index="${idx}" style="${isDuplicate ? 'border-right: 3px solid #e1573c; background: #fff5f5;' : ''}">
                            <input type="checkbox" class="load-checkbox" data-index="${idx}" id="load_${idx}">
                            <div class="load-info">
                                <span class="load-name">${escapeHtml(load.item)} ${isDuplicate ? '<span style="color:#e1573c; font-size:0.55rem;">🔴 مكرر</span>' : ''}</span>
                                <div class="load-details">
                                    <span>${watts.toFixed(0)} وات</span>
                                    <span>${hp.toFixed(3)} حصان</span>
                                    <span>${amps.toFixed(2)} أمبير</span>
                                </div>
                                <span class="load-source">📌 ${escapeHtml(load.sourceName)}</span>
                            </div>
                        </div>
                    `;
                });

                loadsHtml += `
                        </div>
                        <div class="loads-actions">
                            <button class="btn-select-all" id="selectAllStd"><i class="fas fa-check-double"></i> تحديد الكل</button>
                            ${hasDuplicates ? `<button class="btn-show-duplicates" id="showDuplicatesBtn"><i class="fas fa-clone"></i> إدارة المكررات (${Object.keys(duplicateGroups).length})</button>` : ''}
                            <button class="btn-add-selected" id="addSelectedStd"><i class="fas fa-plus-circle"></i> إضافة المحدد</button>
                            <button class="btn-close" onclick="Swal.close()"><i class="fas fa-times"></i> إلغاء</button>
                        </div>
                    </div>
                `;

                const result = await Swal.fire({
                    title: '📋 الأحمال المضافة',
                    html: loadsHtml,
                    width: "90%",
                    maxWidth: "700px",
                    showConfirmButton: false,
                    showCancelButton: false,
                    allowOutsideClick: false,
                    didOpen: () => {
                        // Search
                        const searchInput = document.getElementById('loadsSearchInput');
                        if (searchInput) {
                            searchInput.addEventListener('input', (e) => {
                                const search = e.target.value.trim().toLowerCase();
                                const items = document.querySelectorAll('.standard-load-item');
                                items.forEach(item => {
                                    const name = item.querySelector('.load-name')?.textContent ||
                                    '';
                                    item.style.display = name.toLowerCase().includes(search) ?
                                        'flex' : 'none';
                                });
                            });
                        }

                        // Select all
                        document.getElementById('selectAllStd')?.addEventListener('click', () => {
                            document.querySelectorAll('.load-checkbox').forEach(cb => cb.checked = true);
                        });

                        // Add selected
                        document.getElementById('addSelectedStd')?.addEventListener('click', async () => {
                            const selected = [];
                            document.querySelectorAll('.load-checkbox:checked').forEach(cb => {
                                const idx = parseInt(cb.dataset.index);
                                if (allLoads[idx]) selected.push(allLoads[idx]);
                            });
                            if (selected.length === 0) {
                                await Swal.fire("تنبيه", "اختر حمل واحد على الأقل", "warning");
                                return;
                            }
                            for (const load of selected) {
                                const count = parseInt(load.count) || 1;
                                const watts = parseFloat(load.watts) || 0;
                                const hp = parseFloat(load.hp) || 0;
                                const amps = parseFloat(load.amps) || 0;
                                addLoadToData(load.item, count, watts, hp, amps);
                            }
                            await Swal.fire("✅ تم الإضافة", `تم إضافة ${selected.length} حمل`, "success", { timer: 1500,
                                showConfirmButton: false });
                            Swal.close();
                        });

                        // Show Duplicates
                        document.getElementById('showDuplicatesBtn')?.addEventListener('click', () => {
                            showDuplicatePopup(allLoads, duplicateGroups);
                        });
                    }
                });

            } catch (error) {
                hideLoading();
                await Swal.fire("خطأ", "فشل التحميل", "error");
            }
        };

        // ===== Duplicate Popup =====
        async function showDuplicatePopup(allLoads, duplicateGroups) {
            const dupKeys = Object.keys(duplicateGroups);
            if (dupKeys.length === 0) {
                await Swal.fire("تنبيه", "لا توجد مكررات", "info");
                return;
            }

            let dupHtml = `
                <div style="text-align:right; width:100%; max-height:500px; overflow-y:auto;">
                    <div style="margin-bottom:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                        <span style="font-weight:bold; color:#e1573c;">📋 المكررات (${dupKeys.length} نوع)</span>
                        <span style="font-size:0.65rem; color:#888;">اختر المكررات التي تريد حذفها</span>
                    </div>
            `;

            let totalDupItems = 0;
            const dupIndexMap = {};
            let dupCounter = 0;

            dupKeys.forEach(name => {
                const items = duplicateGroups[name];
                dupHtml += `
                    <div class="dup-group-header">
                        <span>📌 ${escapeHtml(name)}</span>
                        <span class="dup-count">${items.length} مكرر</span>
                    </div>
                `;
                items.forEach((load, idx) => {
                    const watts = parseFloat(load.watts) || 0;
                    const hp = parseFloat(load.hp) || 0;
                    const amps = parseFloat(load.amps) || 0;
                    dupIndexMap[dupCounter] = {
                        load: load,
                        groupName: name,
                        groupIndex: idx,
                        totalInGroup: items.length
                    };
                    dupHtml += `
                        <div class="dup-checkbox-item" data-dup-index="${dupCounter}">
                            <input type="checkbox" class="dup-checkbox" data-dup-index="${dupCounter}" checked>
                            <div class="dup-info">
                                <span class="dup-name">#${idx + 1}</span>
                                <div class="dup-details">
                                    <span>${watts.toFixed(0)} وات</span>
                                    <span>${hp.toFixed(3)} حصان</span>
                                    <span>${amps.toFixed(2)} أمبير</span>
                                </div>
                                <span class="dup-source">📌 ${escapeHtml(load.sourceName)}</span>
                            </div>
                            <button class="dup-keep-btn" data-dup-index="${dupCounter}" style="background:#2e8b57; color:white; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:10px; display:flex; align-items:center; justify-content:center;" title="الاحتفاظ بهذا (إلغاء تحديده)">⭐</button>
                        </div>
                    `;
                    dupCounter++;
                    totalDupItems++;
                });
            });

            dupHtml += `
                    <div class="dup-actions">
                        <button class="btn-dup-select-all" id="dupSelectAll">تحديد الكل</button>
                        <button class="btn-dup-deselect-all" id="dupDeselectAll">إلغاء التحديد</button>
                        <button class="btn-dup-remove" id="dupRemoveSelected">🗑️ حذف المحدد (${totalDupItems})</button>
                        <button class="btn-dup-close" onclick="Swal.close()">إلغاء</button>
                    </div>
                </div>
            `;

            const dupResult = await Swal.fire({
                title: "📋 إدارة المكررات",
                html: dupHtml,
                width: "90%",
                maxWidth: "700px",
                showConfirmButton: false,
                showCancelButton: false,
                allowOutsideClick: false,
                didOpen: () => {
                    function updateDupSelected() {
                        const checked = document.querySelectorAll('.dup-checkbox:checked').length;
                        const total = document.querySelectorAll('.dup-checkbox').length;
                        const removeBtn = document.getElementById('dupRemoveSelected');
                        if (removeBtn) {
                            removeBtn.innerHTML = `🗑️ حذف المحدد (${checked})`;
                        }
                    }

                    // Select all
                    document.getElementById('dupSelectAll')?.addEventListener('click', () => {
                        document.querySelectorAll('.dup-checkbox').forEach(cb => cb.checked = true);
                        updateDupSelected();
                    });

                    // Deselect all
                    document.getElementById('dupDeselectAll')?.addEventListener('click', () => {
                        document.querySelectorAll('.dup-checkbox').forEach(cb => cb.checked = false);
                        updateDupSelected();
                    });

                    // Keep button - uncheck specific item
                    document.querySelectorAll('.dup-keep-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const index = parseInt(btn.dataset.dupIndex);
                            const cb = document.querySelector(`.dup-checkbox[data-dup-index="${index}"]`);
                            if (cb) {
                                cb.checked = false;
                                updateDupSelected();
                            }
                        });
                    });

                    // Toggle checkbox on item click
                    document.querySelectorAll('.dup-checkbox-item').forEach(item => {
                        item.addEventListener('click', (e) => {
                            if (e.target.type === 'checkbox') return;
                            if (e.target.closest('.dup-keep-btn')) return;
                            const cb = item.querySelector('.dup-checkbox');
                            if (cb) {
                                cb.checked = !cb.checked;
                                updateDupSelected();
                            }
                        });
                    });

                    // Update on checkbox change
                    document.querySelectorAll('.dup-checkbox').forEach(cb => {
                        cb.addEventListener('change', updateDupSelected);
                    });

                    // Remove selected duplicates
                    document.getElementById('dupRemoveSelected')?.addEventListener('click', async () => {
                        const checkedItems = [];
                        document.querySelectorAll('.dup-checkbox:checked').forEach(cb => {
                            const idx = parseInt(cb.dataset.dupIndex);
                            if (dupIndexMap[idx]) {
                                checkedItems.push(dupIndexMap[idx]);
                            }
                        });

                        if (checkedItems.length === 0) {
                            await Swal.fire("تنبيه", "لم يتم اختيار أي مكرر للحذف", "info");
                            return;
                        }

                        const confirmResult = await Swal.fire({
                            title: "تأكيد الحذف",
                            text: `هل أنت متأكد من حذف ${checkedItems.length} مكرر؟`,
                            icon: "warning",
                            showCancelButton: true,
                            confirmButtonText: "نعم، حذف",
                            cancelButtonText: "إلغاء",
                            confirmButtonColor: "#e1573c"
                        });

                        if (confirmResult.isConfirmed) {
                            for (const item of checkedItems) {
                                await deleteLoadFromDatabase(item.load.sourceKey, item.load.item);
                            }
                            await Swal.fire({
                                title: "✅ تم الحذف",
                                text: `تم حذف ${checkedItems.length} مكرر`,
                                icon: "success",
                                timer: 1500,
                                showConfirmButton: false
                            });
                            Swal.close();
                            // Refresh the main loads popup
                            btnLoadStandard.click();
                        }
                    });

                    updateDupSelected();
                }
            });
        }

        // ===== Init =====
        async function init() {
            await refreshSidebar();
            renderTablePage();
            console.log("✅ Application loaded!");
        }

        window.loadDataToMainForm = loadDataToMainForm;
        window.viewFullRecord = window.viewFullRecord;
        window.deleteRecord = window.deleteRecord;
        window.exportToExcel = window.exportToExcel;
        window.selectRecord = window.selectRecord;
        window.enlargeImage = window.enlargeImage;

        init();
    </script>
</body>
