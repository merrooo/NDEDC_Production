<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>إدارة الأحمال | Power Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="Add_Loads.css">
</head>

<body>
    <div class="app">
        <div class="logo-section">
            <h2><i class="fas fa-microchip"></i> اضافة احمال</h2>
            <div class="header-actions">
                <button class="btn-home" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> الرئيسية
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="section-title">
                <i class="fas fa-list"></i> البحث والأضافة
            </div>

            <div class="search-bar">
                <input type="text" id="searchLoad" class="search-input" placeholder="🔍 ابحث عن حمل... (مكيف، محرك، مضخة...)" onkeyup="window.filterLoads()">
                <button class="btn-add-load" onclick="window.showAddLoadModal()">
                    <i class="fas fa-plus-circle"></i> إضافة حمل جديد
                </button>
                <button class="btn-excel" onclick="document.getElementById('excelInput').click()">
                    <i class="fas fa-file-excel"></i> استيراد Excel
                </button>
                <button class="btn-excel" onclick="window.exportToExcel()">
                    <i class="fas fa-download"></i> تصدير Excel
                </button>
                <input type="file" id="excelInput" style="display:none" accept=".xlsx, .xls" onchange="window.importExcel(this)">
            </div>

            <div class="loads-table-container">
                <table id="loadsTable">
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>وصف الحمل</th>
                            <th>Watts (W)</th>
                            <th>HP (حصان)</th>
                            <th>Amp (A)</th>
                            <th>نوع المصدر</th>
                            <th>الفولت (V)</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="loadsTableBody">
                        <tr>
                            <td colspan="8" style="text-align: center;">لا توجد أحمال مضافة بعد</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="Add_Loads.js"></script>
</body>

</html>
