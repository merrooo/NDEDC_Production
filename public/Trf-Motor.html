<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محولات ومحركات - النظام المتكامل للحسابات الكهربائية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

  <style>
    :root {
      --primary-color: #004a99;
      --secondary-color: #0099ff;
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-light: #7f8c8d;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      --border-radius: 12px;
      --success: #27ae60;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Cairo", sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .app-wrapper {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      padding: 20px;
      width: 100%;
    }

    .top-nav {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 1rem 2rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .home-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: "Cairo", sans-serif;
    }

    .home-btn:hover {
      background: white;
      color: var(--primary-color);
    }

    .section-container {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 25px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title ion-icon {
      font-size: 1.4rem;
    }

    .subsection {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .subsection:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .subsection h4 {
      color: var(--text-main);
      margin-bottom: 15px;
      font-size: 1rem;
      font-weight: 600;
    }

    .input-dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-light);
    }

    .input-group input,
    .input-group select {
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: #f8fafc;
      transition: all 0.3s ease;
      width: 100%;
      font-family: "Cairo", sans-serif;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.1);
    }

    .input-group input[readonly] {
      background: #f9f9f9;
      border-style: dashed;
    }

    .results-dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .result-item {
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid transparent;
      background: #f8fafc;
    }

    .result-item h3 {
      font-size: 0.9rem;
      color: var(--text-main);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .val-display {
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      background: transparent;
      text-align: center;
      width: 100%;
      font-family: monospace;
    }

    .lf-border {
      border-top: 5px solid #17a2b8;
    }

    .loss-border {
      border-top: 5px solid #e83e8c;
    }

    .speed-border {
      border-top: 5px solid #fd7e14;
    }

    .torque-border {
      border-top: 5px solid #6f42c1;
    }

    .trans-border {
      border-top: 5px solid #28a745;
    }

    .trans-input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      font-family: "Cairo", sans-serif;
    }

    .btn-reset {
      background: #ff4757;
      color: white;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .scroll-buttons {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }

    .scroll-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: var(--primary-color);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }

    .scroll-btn:hover {
      transform: scale(1.1);
      background: var(--secondary-color);
    }
  </style>
</head>

<body>
  <div class="app-wrapper">
    <div class="main-content">
      <nav class="top-nav">
        <div class="nav-brand">محولات ومحركات (Transformers & Motors)</div>
        <button class="home-btn" onclick="window.location.href='Control_Calc.html'">
          <ion-icon name="arrow-up-outline"></ion-icon>
          <span>الصفحة الرئيسية</span>
        </button>
      </nav>

      <div class="section-container">
        <div class="section-header">
          <h3 class="section-title">
            <ion-icon name="construct-outline"></ion-icon> محولات ومحركات
          </h3>
          <button class="btn-reset" onclick="resetMT()">Reset All</button>
        </div>

        <!-- Load & Loss Factors -->
        <div class="subsection">
          <h4>Load & Loss Factors (معاملات الحمل والفقد)</h4>
          <div class="input-dashboard">
            <div class="input-group">
              <label>Avg Power (kW)</label>
              <input type="number" id="avg_p" value="880" oninput="calculateMT()" />
            </div>
            <div class="input-group">
              <label>Max Demand (kW)</label>
              <input type="number" id="max_d" value="978" oninput="calculateMT()" />
            </div>
          </div>
          <div class="results-dashboard">
            <div class="result-item lf-border">
              <h3>Load Factor (LF)</h3>
              <input type="text" id="lf_res" class="val-display" readonly />
            </div>
            <div class="result-item loss-border">
              <h3>Loss Factor</h3>
              <input type="text" id="loss_res" class="val-display" readonly />
            </div>
          </div>
        </div>

        <!-- Motor Mechanics -->
        <div class="subsection">
          <h4>Motor Mechanics (ميكانيكا المحرك)</h4>
          <div class="input-dashboard">
            <div class="input-group">
              <label>Frequency (Hz)</label>
              <input type="number" id="freq" value="50" oninput="calculateMT()" />
            </div>
            <div class="input-group">
              <label>No. of Poles</label>
              <input type="number" id="poles" value="4" oninput="calculateMT()" />
            </div>
            <div class="input-group">
              <label>Power (kW)</label>
              <input type="number" id="motor_kw" value="100" oninput="calculateMT()" />
            </div>
          </div>
          <div class="results-dashboard">
            <div class="result-item speed-border">
              <h3>Speed (RPM)</h3>
              <input type="text" id="speed_res" class="val-display" readonly />
            </div>
            <div class="result-item torque-border">
              <h3>Torque (N.m)</h3>
              <input type="text" id="torque_res" class="val-display" readonly />
            </div>
          </div>
        </div>

        <!-- Transformer Analysis -->
        <div class="subsection">
          <h4>Transformer Analysis (تحليل المحول)</h4>
          <div class="trans-input-grid">
            <div class="input-group">
              <label>Rating (kVA)</label>
              <input type="number" id="KVATR" value="1000" oninput="calculateMT()" />
            </div>
            <div class="input-group">
              <label>Impedance (%Z)</label>
              <input type="number" id="impd" value="5" oninput="calculateMT()" />
            </div>
            <div class="input-group">
              <label>V1 Primary (V)</label>
              <input type="number" id="VPR" value="11000" oninput="calculateMT()" />
            </div>
            <div class="input-group">
              <label>V2 FL (V)</label>
              <input type="number" id="VSECFL" value="380" oninput="calculateMT()" />
            </div>
            <div class="input-group">
              <label>V2 NL (V)</label>
              <input type="number" id="VSECNL" value="400" oninput="calculateMT()" />
            </div>
          </div>
          <div class="results-dashboard">
            <div class="result-item trans-border">
              <h3>I-Primary (A)</h3>
              <input type="text" id="IPR" class="val-display" readonly />
            </div>
            <div class="result-item trans-border">
              <h3>I-Sec (A)</h3>
              <input type="text" id="ISEC" class="val-display" readonly />
            </div>
            <div class="result-item trans-border">
              <h3>I-sc (kA)</h3>
              <input type="text" id="isc_res" class="val-display" readonly />
            </div>
            <div class="result-item trans-border">
              <h3>Turns Ratio (n)</h3>
              <input type="text" id="tr_res" class="val-display" readonly />
            </div>
            <div class="result-item trans-border">
              <h3>VR %</h3>
              <input type="text" id="vr_perc" class="val-display" readonly />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="scroll-buttons">
    <button class="scroll-btn" onclick="scrollToTop()">▲</button>
    <button class="scroll-btn" onclick="scrollToBottom()">▼</button>
  </div>

  <script>
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function calculateMT() {
      const avg = parseFloat(document.getElementById("avg_p").value) || 0;
      const max = parseFloat(document.getElementById("max_d").value) || 0;
      if (max > 0) {
        const lf = avg / max;
        document.getElementById("lf_res").value = lf.toFixed(4);
        document.getElementById("loss_res").value = (
          0.25 * lf +
          0.75 * Math.pow(lf, 2)
        ).toFixed(4);
      }

      const freq = parseFloat(document.getElementById("freq").value) || 0;
      const poles = parseFloat(document.getElementById("poles").value) || 0;
      const motorKw = parseFloat(document.getElementById("motor_kw").value) || 0;
      if (poles > 0) {
        const rpm = (freq / poles) * 120;
        document.getElementById("speed_res").value = rpm.toFixed(0);
        const torque = rpm > 0 ? (9550 * motorKw) / rpm : 0;
        document.getElementById("torque_res").value = torque.toFixed(2);
      }

      const kva = parseFloat(document.getElementById("KVATR").value) || 0;
      const v1 = parseFloat(document.getElementById("VPR").value) || 0;
      const v2fl = parseFloat(document.getElementById("VSECFL").value) || 0;
      const v2nl = parseFloat(document.getElementById("VSECNL").value) || 0;
      const z = parseFloat(document.getElementById("impd").value) || 0;

      const i1 = v1 > 0 ? (kva * 1000) / (Math.sqrt(3) * v1) : 0;
      const i2 = v2fl > 0 ? (kva * 1000) / (Math.sqrt(3) * v2fl) : 0;

      const iscVal = z > 0 && i2 > 0 ? ((i2 / z) * 100) / 1000 : 0;
      const tr = v2fl > 0 ? v1 / v2fl : 0;
      const vr = v2fl > 0 ? ((v2nl - v2fl) / v2fl) * 100 : 0;

      document.getElementById("IPR").value = i1.toFixed(2);
      document.getElementById("ISEC").value = i2.toFixed(2);
      document.getElementById("tr_res").value = tr.toFixed(2);
      document.getElementById("vr_perc").value = vr.toFixed(2) + "%";
      document.getElementById("isc_res").value = iscVal.toFixed(3);
    }

    function resetMT() {
      document.getElementById("avg_p").value = "880";
      document.getElementById("max_d").value = "978";
      document.getElementById("freq").value = "50";
      document.getElementById("poles").value = "4";
      document.getElementById("motor_kw").value = "100";
      document.getElementById("KVATR").value = "1000";
      document.getElementById("impd").value = "5";
      document.getElementById("VPR").value = "11000";
      document.getElementById("VSECFL").value = "380";
      document.getElementById("VSECNL").value = "400";
      calculateMT();
    }

    window.onload = function () {
      calculateMT();
    };
  </script>
</body>

</html>
