<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomaly Export - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        .master-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .feature-category {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            background: var(--bg-main);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .label-sm {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .compact-select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        /* Buttons */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: white;
            border-color: var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: var(--bg-main);
        }

        .btn-warning {
            background: #fffbeb;
            border-color: #fde68a;
            color: #92400e;
        }

        .btn-warning:hover {
            background: #fef3c7;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .compact-header {
            padding: 20px 32px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upload-area-compact {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .file-label {
            padding: 8px 16px;
            background: var(--bg-main);
            border: 1px dashed var(--text-muted);
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* Table Grid */
        .grid-container {
            flex: 1;
            padding: 24px 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-wrapper {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: auto;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: left;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            padding: 12px 16px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        tbody td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            white-space: nowrap;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .anomaly-row {
            background-color: #fff1f2 !important;
        }

        .anomaly-row:hover {
            background-color: #ffe4e6 !important;
        }

        .preview-badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 8px;
        }

        /* Stats Badge */
        .stats-badge {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        /* Logs */
        .log-section {
            height: 120px;
            background: #1e293b;
            color: #cbd5e1;
            padding: 12px 32px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
        }

        .log-entry {
            margin-bottom: 4px;
        }

        .log-success {
            color: var(--success);
        }

        .log-warning {
            color: var(--warning);
        }

        .log-error {
            color: var(--danger);
        }

        .back-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #2563eb;
            /* Primary Blue */
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .back-link:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px -2px rgba(37, 99, 235, 0.3);
        }

        .back-link:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="master-layout">
        <aside class="sidebar">
            <!-- Navigation Back (NOW COLOURED) -->
            <nav class="back-nav">
                <a href="Control_Excel.html" class="back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                    Return to Home
                </a>
            </nav>
            <div class="sidebar-header">
                <h2>🔍 Anomaly Export</h2>
                <p>Data quality cleaning utility</p>
            </div>

            <div class="feature-category">Detection Rules</div>
            <div class="control-group">
                <label class="label-sm">Select Column to Scan</label>
                <select id="anomalyColumnSelect" class="compact-select" disabled>
                    <option value="-1">— Scan ALL Columns —</option>
                </select>

                <label class="label-sm">Logic Gate</label>
                <select id="anomalyMode" class="compact-select">
                    <option value="any">Inclusive (OR)</option>
                    <option value="strict">Column Specific</option>
                </select>
            </div>

            <div class="feature-category">Actions</div>
            <div class="btn-stack">
                <button id="previewAnomalyBtn" class="btn-primary" disabled>👁️ Preview Issues</button>
                <button id="showAllDataBtn" class="btn-secondary" disabled>📋 Show All Data</button>
                <button id="exportAnomalyBtn" class="btn-warning" disabled>📤 Export Outliers</button>
            </div>

            <div id="anomalyStats" class="stats-badge" style="background: #e2e8f0;">
                ⚡ System Ready
            </div>
        </aside>

        <main class="main-content">
            <header class="compact-header">
                <div>
                    <h1 style="font-size: 1.1rem;">📊 Data Preview <span id="viewModeBadge" class="preview-badge"
                            style="display:none;">ANOMALY VIEW</span></h1>
                    <span id="gridStats" style="font-size: 0.75rem; color: var(--text-muted);">0 rows loaded</span>
                </div>
                <div class="upload-area-compact">
                    <label for="excelFile" class="file-label">📁 Choose File</label>
                    <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="display:none;">
                    <span id="fileNameCompact" style="font-size: 0.85rem; color: var(--text-muted);">No file...</span>
                    <button id="exportMainBtn" class="btn-primary" style="padding: 8px 12px;" disabled>💾 Save
                        View</button>
                </div>
            </header>

            <div class="grid-container">
                <div class="table-wrapper">
                    <table id="readonlyTable">
                        <thead id="tableHeader"></thead>
                        <tbody id="tableBody">
                            <tr>
                                <td style="text-align:center; padding:100px; color: #94a3b8;">Upload a dataset to begin
                                    analysis</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="log-section" id="logSection"></div>
        </main>
    </div>

    <script>
        // Logic remains largely the same as your provided script, 
        // but with integrated UI updates to match the new styles.

        let originalGridData = [];
        let currentGridData = [];
        let currentHeaders = [];
        let isPreviewMode = false;

        const fileInput = document.getElementById("excelFile");
        const fileNameSpan = document.getElementById("fileNameCompact");
        const anomalyColumnSelect = document.getElementById("anomalyColumnSelect");
        const anomalyMode = document.getElementById("anomalyMode");
        const previewAnomalyBtn = document.getElementById("previewAnomalyBtn");
        const showAllDataBtn = document.getElementById("showAllDataBtn");
        const exportAnomalyBtn = document.getElementById("exportAnomalyBtn");
        const exportMainBtn = document.getElementById("exportMainBtn");
        const logSection = document.getElementById("logSection");
        const tableHeader = document.getElementById("tableHeader");
        const tableBody = document.getElementById("tableBody");
        const viewModeBadge = document.getElementById("viewModeBadge");
        const gridStatsSpan = document.getElementById("gridStats");

        function addLog(msg, type = "info") {
            const entry = document.createElement("div");
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `> ${msg}`;
            logSection.appendChild(entry);
            logSection.scrollTop = logSection.scrollHeight;
        }

        // Logic functions (isNullOrEmptyOrZero, getAnomalyRows, etc.) 
        // remain the same as your original code to preserve functionality.
        function isNullOrEmptyOrZero(value) {
            if (value === null || value === undefined) return true;
            if (typeof value === "string" && value.trim() === "") return true;
            if (value === 0 || value === "0") return true;
            return false;
        }

        function getAnomalyRows() {
            const targetColVal = anomalyColumnSelect.value;
            const cols = targetColVal === "-1" ? currentHeaders : [targetColVal];
            const anomalies = originalGridData.filter(row => cols.some(c => isNullOrEmptyOrZero(row[c])));
            return { anomalyRows: anomalies, count: anomalies.length };
        }

        function renderTable() {
            tableHeader.innerHTML = `<tr>${currentHeaders.map(h => `<th>${h}</th>`).join('')}</tr>`;

            if (currentGridData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="${currentHeaders.length}" style="text-align:center; padding:40px;">No records found.</td></tr>`;
                return;
            }

            tableBody.innerHTML = currentGridData.map(row => `
                <tr class="${isPreviewMode ? 'anomaly-row' : ''}">
                    ${currentHeaders.map(h => `<td>${row[h] ?? ''}</td>`).join('')}
                </tr>
            `).join('');

            gridStatsSpan.innerText = `${currentGridData.length} rows × ${currentHeaders.length} columns`;
            updateAnomalyStats();
        }

        function updateAnomalyStats() {
            if (!originalGridData.length) return;
            const { count } = getAnomalyRows();
            const stats = document.getElementById("anomalyStats");
            if (count > 0) {
                stats.innerHTML = `⚠️ <b>${count}</b> anomalies detected.`;
                stats.style.background = "#fef3c7";
                stats.style.color = "#92400e";
            } else {
                stats.innerHTML = `✅ Dataset looks clean.`;
                stats.style.background = "#dcfce7";
                stats.style.color = "#166534";
            }
        }

        fileInput.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameSpan.textContent = file.name;
            addLog(`Parsing ${file.name}...`);

            const buffer = await file.arrayBuffer();
            const workbook = XLSX.read(buffer);
            const rawJson = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" });

            if (rawJson.length > 0) {
                currentHeaders = rawJson[0];
                originalGridData = rawJson.slice(1).map(row => {
                    let obj = {};
                    currentHeaders.forEach((h, i) => obj[h] = row[i]);
                    return obj;
                });
                currentGridData = [...originalGridData];

                // Enable UI
                anomalyColumnSelect.disabled = false;
                anomalyColumnSelect.innerHTML = `<option value="-1">All Columns</option>` +
                    currentHeaders.map(h => `<option value="${h}">${h}</option>`).join('');
                [previewAnomalyBtn, showAllDataBtn, exportAnomalyBtn, exportMainBtn].forEach(b => b.disabled = false);

                renderTable();
                addLog(`Successfully loaded ${originalGridData.length} rows.`, "success");
            }
        });

        previewAnomalyBtn.onclick = () => {
            const { anomalyRows } = getAnomalyRows();
            currentGridData = anomalyRows;
            isPreviewMode = true;
            viewModeBadge.style.display = "inline-block";
            renderTable();
            addLog(`Previewing ${anomalyRows.length} issues.`, "warning");
        };

        showAllDataBtn.onclick = () => {
            currentGridData = [...originalGridData];
            isPreviewMode = false;
            viewModeBadge.style.display = "none";
            renderTable();
            addLog("Viewing full dataset.");
        };

        exportAnomalyBtn.onclick = () => {
            const { anomalyRows } = getAnomalyRows();
            const ws = XLSX.utils.json_to_sheet(anomalyRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Anomalies");
            XLSX.writeFile(wb, `anomalies_${Date.now()}.xlsx`);
            addLog("Anomaly report exported.", "success");
        };

        // Initial Log
        addLog("Application initialized. Waiting for file upload...");
    </script>
</body>

</html>
