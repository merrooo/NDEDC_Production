<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>إضافة مشترك وعدادات - نظام الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .record-date-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px 25px;
            background: #eef2f7;
            border-radius: 12px;
            border: 1px dashed var(--accent);
        }

        .back-link-top {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            background: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .back-link-top:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        #record_date {
            width: 200px;
            margin-top: 5px;
        }

        .section-title {
            background: #eef2f7;
            padding: 10px;
            border-right: 5px solid var(--accent);
            margin: 20px 0 15px 0;
            font-weight: bold;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #555;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Cairo';
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .row-flex {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .row-flex .input-group {
            flex: 1;
            min-width: 200px;
        }

        .meter-card {
            background: #fff;
            border: 2px dashed #cbd5e0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            position: relative;
            transition: 0.3s;
        }

        .meter-card:hover {
            border-color: var(--accent);
            background: #fcfdfd;
        }

        .remove-meter-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-add-meter {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-submit {
            background: var(--success);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        .back-link {
            display: block;
            text-align: right;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: none;
            font-weight: bold;
        }

        .modern-dropdown {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .dropdown-btn {
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid var(--accent);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .dropdown-btn:hover {
            background: var(--accent);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 2000;
            margin-top: 5px;
            border: 1px solid #ddd;
            overflow: hidden;
        }

        .dropdown-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: 0.2s;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: #f4f7f6;
            color: var(--accent);
            padding-right: 25px;
        }

        .show {
            display: block !important;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <div class="record-date-wrapper">
            <div class="modern-dropdown">
                <button class="dropdown-btn" id="dropdownBtn">
                    <span>🚀 اختر وجهتك للانتقال</span>
                    <span id="arrow">▾</span>
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="dropdown-item" data-page="MD.html">📊 بيانات كبار المشتركين</div>
                    <div class="dropdown-item" data-page="MD_Add.html">➕ إضافة مشترك جديد</div>
                    <div class="dropdown-item" data-page="MD_Pass.html">🔍 تسجيل مرور ميداني</div>
                    <div class="dropdown-item" data-page="MD_Pass_Dashboard.html">📅 تقرير المرور العام</div>
                    <div class="dropdown-item" data-page="index.html">📅 الصفحة الرئيسية</div>
                </div>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label>📅 تاريخ تسجيل البيان</label>
                <input type="date" id="record_date" disabled>
            </div>

        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const btn = document.getElementById('dropdownBtn');
                const menu = document.getElementById('dropdownMenu');

                // 1. فتح وإغلاق القائمة عند الضغط على الزر
                btn.addEventListener('click', function (e) {
                    e.stopPropagation(); // منع انتقال الضغطة للعناصر الأب
                    menu.classList.toggle('show');
                });

                // 2. التنقل بين الصفحات عند الضغط على أي خيار
                const items = document.querySelectorAll('.dropdown-item');
                items.forEach(item => {
                    item.addEventListener('click', function () {
                        const page = this.getAttribute('data-page');
                        if (page) {
                            window.location.href = page;
                        }
                    });
                });

                // 3. إغلاق القائمة تلقائياً إذا ضغطت في أي مكان خارجها
                window.addEventListener('click', function () {
                    if (menu.classList.contains('show')) {
                        menu.classList.remove('show');
                    }
                });
            });
        </script>


        <h2>➕ تسجيل مشترك وعدادات جديدة</h2>

        <div class="section-title">👤 البيانات العامة للمشترك</div>
        <div class="input-group">
            <label>اسم المشترك الكامل</label>
            <input type="text" id="mname" placeholder="أدخل اسم المشترك">
        </div>
        <div class="row-flex">
            <div class="input-group"><label>القطاع</label><input id="keta3"></div>
            <div class="input-group"><label>الهندسة</label><input id="handsa"></div>
        </div>
        <div class="row-flex">
            <div class="input-group"><label>معامل القدرة (PF)</label><input type="number" step="0.01" id="power_factor">
            </div>
            <div class="input-group"><label>أقصى حمل</label><input type="number" id="max_load"></div>
        </div>

        <div id="meters-list">
            <div class="meter-card" id="meter-0">
                <div class="section-title">
                    <span>⚡ بيانات العداد (1)</span>
                </div>
                <div class="row-flex">
                    <div class="input-group"><label>رقم العداد</label><input type="text" class="mno"></div>
                    <div class="input-group"><label>نوع العداد</label><input class="mtype"></div>
                    <div class="input-group"><label>تاريخ التركيب</label><input type="date" class="fix_date"></div>
                    <div class="input-group"><label>تاريخ الإطلاق</label><input type="date" class="power_date"></div>
                </div>
                <div class="row-flex">
                    <div class="input-group"><label>قراءة kWh</label><input type="number" class="kwh"></div>
                    <div class="input-group"><label>قراءة kVARh</label><input type="number" class="kvarh"></div>
                    <div class="input-group"><label>الثابت</label><input type="number" class="constant" value="1"></div>
                </div>
                <div class="row-flex">
                    <div class="input-group"><label>VT Ratio</label><input class="vt" value="11000/110"></div>
                    <div class="input-group"><label>CT Ratio</label><input class="ct" value="200/5"></div>
                    <div class="input-group"><label>المكان</label><input class="loc"></div>
                </div>
                <div class="input-group"><label>ملاحظات العداد</label><textarea class="m-notes" rows="1"></textarea>
                </div>
            </div>
        </div>

        <button class="btn-add-meter" onclick="addNewMeterForm()">➕ إضافة عداد آخر لنفس المشترك</button>
        <button class="btn-submit" onclick="saveAllToFirebase()">💾 حفظ كل البيانات في القاعدة</button>
        <a href="MD.html" class="back-link">⬅️ العودة لصفحة السجلات</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTSWDR3IvFpzp8UARsClrpwbRtTwr12jA",
            databaseURL: "https://ndedc-meter-calib-default-rtdb.firebaseio.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let meterCount = 1;

        // 1. تعيين تاريخ اليوم تلقائياً
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('record_date').value = today;
        });

        // إضافة نموذج عداد جديد
        window.addNewMeterForm = function () {
            const container = document.getElementById('meters-list');
            const newMeter = document.createElement('div');
            newMeter.className = 'meter-card';
            newMeter.id = `meter-${meterCount}`;
            newMeter.innerHTML = `
                <div class="section-title">
                    <span>⚡ بيانات العداد (${meterCount + 1})</span>
                    <button class="remove-meter-btn" onclick="document.getElementById('meter-${meterCount}').remove()">حذف</button>
                </div>
                <div class="row-flex">
                    <div class="input-group"><label>رقم العداد</label><input type="text" class="mno"></div>
                    <div class="input-group"><label>نوع العداد</label><input class="mtype"></div>
                    <div class="input-group"><label>تاريخ التركيب</label><input type="date" class="fix_date"></div>
                    <div class="input-group"><label>تاريخ الإطلاق</label><input type="date" class="power_date"></div>
                </div>
                <div class="row-flex">
                    <div class="input-group"><label>قراءة kWh</label><input type="number" class="kwh"></div>
                    <div class="input-group"><label>قراءة kVARh</label><input type="number" class="kvarh"></div>
                    <div class="input-group"><label>الثابت</label><input type="number" class="constant" value="1"></div>
                </div>
                <div class="row-flex">
                    <div class="input-group"><label>VT Ratio</label><input class="vt" value="11000/110"></div>
                    <div class="input-group"><label>CT Ratio</label><input class="ct" value="200/5"></div>
                    <div class="input-group"><label>المكان</label><input class="loc"></div>
                </div>
                <div class="input-group"><label>ملاحظات العداد</label><textarea class="m-notes" rows="1"></textarea></div>
            `;
            container.appendChild(newMeter);
            meterCount++;
        }

        function sanitizeKey(key) {
            return String(key).replace(/[.#$\[\]\(\)\/\s]/g, "").trim();
        }

        // 2. دالة الحفظ مع التحقق من وجود المشترك مسبقاً
        window.saveAllToFirebase = async function () {
            const mname = document.getElementById("mname").value.trim();
            if (!mname) return Swal.fire("خطأ", "يرجى إدخال اسم المشترك", "error");

            const customerKey = sanitizeKey(mname);
            const meterCards = document.querySelectorAll('.meter-card');
            const recordDate = document.getElementById('record_date').value;

            try {
                Swal.fire({ title: 'جاري التحقق والحفظ...', didOpen: () => Swal.showLoading() });

                // التحقق من وجود المشترك
                const snapshot = await get(ref(db, `MD/customers/${customerKey}`));
                if (snapshot.exists()) {
                    return Swal.fire({
                        icon: 'warning',
                        title: 'المشترك موجود مسبقاً',
                        text: 'هذا الاسم مسجل بالفعل. لا يمكنك إضافة مشترك بنفس الاسم.',
                        confirmButtonText: 'حسناً'
                    });
                }

                // تجهيز بيانات العدادات
                let metersData = {};
                let hasError = false;

                meterCards.forEach(card => {
                    const mno = card.querySelector('.mno').value.trim();
                    if (!mno) { hasError = true; return; }

                    const mKey = sanitizeKey(mno);
                    metersData[mKey] = {
                        meternumber: mno,
                        metertype: card.querySelector('.mtype').value || "",
                        record_date: recordDate,
                        fix_date: card.querySelector('.fix_date').value || "",
                        power_date: card.querySelector('.power_date').value || "",
                        kwh_reading: card.querySelector('.kwh').value || 0,
                        kvarh_reading: card.querySelector('.kvarh').value || 0,
                        constant: card.querySelector('.constant').value || 1,
                        vt_ratio: card.querySelector('.vt')?.value || "11000/110",
                        ct_ratio: card.querySelector('.ct')?.value || "200/5",
                        location: card.querySelector('.loc').value || "",
                        meternotes: card.querySelector('.m-notes')?.value || ""
                    };
                });

                if (hasError) return Swal.fire("تنبيه", "تأكد من كتابة رقم العداد لكل العدادات", "warning");

                // تجهيز بيانات المشترك بالكامل
                const finalData = {
                    metername: mname,
                    keta3: document.getElementById("keta3").value || "-",
                    handsa: document.getElementById("handsa").value || "-",
                    power_factor: document.getElementById("power_factor").value || 0,
                    max_load: document.getElementById("max_load").value || 0,
                    meters: metersData
                };

                // الحفظ النهائي
                await set(ref(db, `MD/customers/${customerKey}`), finalData);

                Swal.fire("تم الحفظ!", "تم تسجيل المشترك والعدادات بنجاح", "success")
                    .then(() => location.reload());

            } catch (e) {
                Swal.fire("خطأ", e.message, "error");
            }
        };
    </script>
</body>

</html>
