<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeVault • CRUD Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Creating_Add_Crud.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📦 CodeVault • CRUD Builder</h1>
            <div class="project-controls">
                <select id="savedProjectsSelect">
                    <option value="">-- Load project --</option>
                </select>
                <button class="btn btn-primary" id="loadProjectBtn">Load</button>
                <button class="btn btn-success" id="saveProjectBtn">Save</button>
                <button class="btn btn-danger" id="deleteProjectBtn">Delete</button>
                <button class="btn btn-secondary" id="refreshProjectsBtn">Refresh</button>
            </div>
        </div>

        <!-- HTML Input -->
        <div class="card">
            <label>📄 HTML Structure</label>
            <textarea id="htmlInput"
                placeholder='Paste HTML with IDs... (e.g., <input id="name">, <button id="btnAdd">)'></textarea>
            <button class="btn btn-primary" onclick="analyzeHTML()">Analyze Elements</button>
            <div id="previewMsg" class="preview-msg"></div>
        </div>

        <!-- Firebase Config -->
        <div class="card">
            <label>🔥 Firebase Config</label>
            <input type="text" id="databasePathInput" placeholder="Database path (e.g., Data_1)">
            <textarea id="firebaseConfigInput" placeholder='const firebaseConfig = {
  "apiKey": "your-api-key",
  "authDomain": "your-app.firebaseapp.com",
  "databaseURL": "https://your-app.firebaseio.com",
  "projectId": "your-project-id",
  "storageBucket": "your-app.firebasestorage.app",
  "messagingSenderId": "123456789",
  "appId": "1:123456789:web:abcdef"
}'></textarea>
        </div>

        <!-- Setup Section -->
        <div id="setupSection" class="card" style="display:none;">
            <div class="section-title">⚙️ Configure Fields</div>
            <div class="two-columns">
                <div class="field-group">
                    <strong>Primary Key</strong>
                    <div id="dataFields"></div>
                </div>
                <div class="field-group">
                    <strong>Data Fields</strong>
                    <div id="actionFields"></div>
                </div>
            </div>

            <div class="section-title" style="margin-top: 20px;">🎮 Button IDs</div>
            <div class="two-columns">
                <div class="field-group">
                    <input type="text" id="addActionIdInput" placeholder="Add button ID">
                    <input type="text" id="editActionIdInput" placeholder="Edit button ID">
                    <input type="text" id="loadActionIdInput" placeholder="Load button ID">
                    <input type="text" id="deleteActionIdInput" placeholder="Delete button ID">
                </div>
                <div class="field-group">
                    <input type="text" id="deleteAllActionIdInput" placeholder="Delete all button ID">
                    <input type="text" id="fetchAllActionIdInput" placeholder="Fetch all button ID">
                    <input type="text" id="filterInputIdInput" placeholder="Search input ID">
                    <input type="text" id="tableBodySelectorInput" placeholder="Table body (e.g., #table tbody)">
                </div>
            </div>

            <div class="action-bar">
                <select id="crudAction">
                    <option value="add">➕ Add Record</option>
                    <option value="edit">✏️ Edit Record</option>
                    <option value="load">🔍 Load Record</option>
                    <option value="fetchAll">📋 Fetch All</option>
                    <option value="search">🔎 Search Filter</option>
                    <option value="delete">🗑️ Delete Record</option>
                    <option value="deleteAll">💀 Delete All</option>
                </select>
                <button class="btn btn-primary" onclick="generateFirebaseJS()">Add to Code</button>
                <button class="btn btn-warning" onclick="removeFunction()">Remove</button>
                <button class="btn btn-secondary" onclick="clearAllBlocks()">Clear All</button>
            </div>
        </div>

        <!-- Output -->
        <div class="card">
            <label>📄 Generated JavaScript</label>
            <textarea id="jsOutput" readonly></textarea>
            <button class="btn btn-primary" onclick="copyToClipboard()">Copy Code</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="Creating_Add_Crud.js"></script>
</body>

</html>
