<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إدارة تسجيل - التلاعبات</title>

    <!-- المراجع الأساسية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================================================================
           GLOBAL DESIGN SYSTEM: DARK MODE (default) & LIGHT MODE
        ================================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        body {
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: var(--bg-gradient);
            color: var(--text-primary);
        }

        /* الوضع الليلي (افتراضي) */
        :root {
            --bg-gradient: radial-gradient(circle at 25% 20%, #0a0f1c 0%, #03060c 100%);
            --glass-bg: rgba(12, 20, 35, 0.6);
            --glass-border: rgba(56, 139, 253, 0.15);
            --neon-blue: #58a6ff;
            --neon-green: #3fb950;
            --neon-red: #f85149;
            --neon-purple: #ab7df6;
            --text-primary: #adbac7;
            --text-heading: #f0f6fc;
            --input-bg: rgba(22, 27, 34, 0.8);
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            --border-light: rgba(48, 54, 61, 0.8);
            --btn-hover-glow: 0 0 12px rgba(88, 166, 255, 0.4);
            --table-header: #161b22;
            --table-hover: rgba(56, 139, 253, 0.05);
            --toast-bg: rgba(13, 24, 41, 0.95);
        }

        /* الوضع النهاري */
        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #f4f7fa 0%, #e6eff9 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.08);
            --neon-blue: #0969da;
            --neon-green: #1a7f37;
            --neon-red: #cf222e;
            --neon-purple: #8250df;
            --text-primary: #57606a;
            --text-heading: #24292f;
            --input-bg: #f6f8fa;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --border-light: #d0d7de;
            --btn-hover-glow: 0 0 10px rgba(9, 105, 218, 0.15);
            --table-header: #f6f8fa;
            --table-hover: rgba(9, 105, 218, 0.04);
            --toast-bg: #ffffff;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .dashboard-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        .control-header {
            text-align: right;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 15px;
        }

        .header-title h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-heading);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-toggle-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 12px;
            gap: 8px;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            color: var(--text-primary);
        }

        .theme-toggle-btn:hover {
            color: var(--neon-blue);
            box-shadow: var(--btn-hover-glow);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 12.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        input, select, textarea {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-heading);
            font-size: 13.5px;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: none;
            color: white;
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-save { background: var(--neon-green); }
        .btn-import { background: var(--neon-purple); }
        .btn-view { background: var(--input-bg); border: 1px solid var(--border-light); color: var(--text-heading); }
        
        /* ================================================================
           OPTIMIZED MODERN TABLE & ARCHIVE SYSTEM
        ================================================================ */
        .archive-section {
            display: none;
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .archive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
        }

        .btn-excel-export { 
            background: #238636; 
            color: white; 
            border-radius: 6px; 
            padding: 8px 16px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 12.5px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
        }
        .btn-excel-export:hover { background: #2ea043; }

        .modal-table-wrapper {
            max-height: 55vh;
            overflow-x: auto;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }

        .custom-archive-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: right;
        }

        .custom-archive-table th {
            background: var(--table-header);
            padding: 12px 14px;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 700;
            color: var(--text-heading);
            border-bottom: 1px solid var(--border-light);
            box-shadow: inset 0 -1px 0 var(--border-light);
        }

        .custom-archive-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
            color: var(--text-primary);
        }

        .custom-archive-table tbody tr:hover {
            background: var(--table-hover);
        }

        /* حقول التصفية المدمجة الرشيقة */
        .filter-input {
            width: 100%;
            padding: 5px 8px;
            font-size: 11.5px;
            border-radius: 4px;
            margin-top: 6px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            font-weight: normal;
        }

        /* منسق الأرقام والكواد لمنع التداخل */
        .numeric-field { 
            font-feature-settings: "tnum"; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: 0.5px;
        }

        /* نظام كروت الحالة (Badges) المبسط للنتائج */
        .badge-status {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-status.تلاعب { background: rgba(248, 81, 73, 0.12); color: var(--neon-red); }
        .badge-status.سليم { background: rgba(63, 185, 80, 0.12); color: var(--neon-green); }
        .badge-status.مديونية { background: rgba(88, 166, 255, 0.12); color: var(--neon-blue); }
        .badge-status.تالف { background: rgba(171, 125, 246, 0.12); color: var(--neon-purple); }

        .btn-page {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-heading);
        }

        .btn-page:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination-cluster {
            display: flex;
            gap: 6px;
            direction: ltr;
        }

        #excelFileInput { display: none; }

        /* نظام الإشعارات السريعة (Toasts) */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--toast-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            color: var(--text-heading);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 280px;
            transform: translateX(-150%);
            animation: slideIn 0.25s ease forwards;
            font-weight: 600;
            font-size: 13.5px;
        }

        @keyframes slideIn { to { transform: translateX(0); } }

        .toast.success { border-left: 4px solid var(--neon-green); }
        .toast.error { border-left: 4px solid var(--neon-red); }
        .toast.warning { border-left: 4px solid var(--neon-blue); }
        .toast.loading { border-left: 4px solid var(--neon-purple); }

        @media (max-width: 768px) {
            .dashboard-container { padding: 20px; }
            .btn { width: 100%; justify-content: center; }
            .archive-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <!-- لوحة التحكم الرئيسية والمدخلات -->
        <div class="dashboard-container">
            <div class="control-header">
                <div class="header-title">
                    <h1><i class="fa-solid fa-bolt-lightning" style="color:var(--neon-blue)"></i> تسجيل بيانات عداد - التلاعبات</h1>
                </div>
                <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="تبديل الوضع">
                    <i class="fa-solid fa-moon"></i> <span>وضع نهاري</span>
                </button>
            </div>

            <!-- نموذج الإدخال -->
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fa-solid fa-map-location-dot"></i> القطاع</label>
                    <select id="keta3">
                        <option value="">اختر القطاع</option>
                        <option>دمياط</option>
                        <option>شمال الدقهلية</option>
                        <option>جنوب الدقهلية</option>
                        <option>كفر الشيخ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-building-shield"></i> الهندسة / الفرع</label>
                    <select id="handsa">
                        <option value="">اختر الهندسة</option>
                        <option>هندسة شمال دمياط</option>
                        <option>هندسة جنوب دمياط</option>
                        <option>هندسة عزبة البرج</option>
                        <option>هندسة كفر سعد</option>
                        <option>هندسة كفر البطيخ</option>
                        <option>هندسة دمياط الجديدة</option>
                        <option>هندسة المنصورة</option>
                        <option>هندسة دكرنس</option>
                        <option>هندسة ميت غمر</option>
                        <option>هندسة كفر الشيخ</option>
                        <option>هندسة دسوق</option>
                        <option>هندسة بيلا</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-industry"></i> نوع النشاط الحركي</label>
                    <select id="nashattype">
                        <option value="">-- اختر النشاط --</option>
                        <option>منزلي</option>
                        <option>تجاري</option>
                        <option>قوى محركة</option>
                        <option>كودي مخالف</option>
                        <option>ري</option>
                        <option>مزارع</option>
                        <option>مساجد</option>
                        <option>استثمار صناعة</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-bolt-lightning"></i> طراز العداد</label>
                    <select id="mtype">
                        <option value="">-- اختر الطراز --</option>
                        <option>سويدى ثلاثى مباشر</option>
                        <option>سويدي احادي</option>
                        <option>اسكرا احادي</option>
                        <option>جلوبال ثلاثى مباشر</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-hashtag"></i> رقم العداد (الشاسيه)</label>
                    <input type="text" id="mno" class="numeric-field" placeholder="مثال: 23055630">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-check"></i> تاريخ الفحص المعملي</label>
                    <input type="date" id="calib_date">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-plus"></i> تاريخ التسجيل</label>
                    <input type="date" id="enter_date">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-user-gear"></i> اسم المشترك</label>
                    <input type="text" id="mname" placeholder="اسم المشترك">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-barcode"></i> كود المشترك (MCO)</label>
                    <input type="text" id="mco" class="numeric-field" placeholder="رقم الكود">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-square-poll-vertical"></i> نتيجة الفحص</label>
                    <select id="munip">
                        <option value="">-- النتيجة --</option>
                        <option>تلاعب</option>
                        <option>سليم</option>
                        <option>مديونية</option>
                        <option>تكهين</option>
                        <option>تالف</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label><i class="fa-solid fa-comment-medical"></i> ملاحظات فنية</label>
                    <textarea id="notes" placeholder="تفاصيل الفحص والتقرير..."></textarea>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-save" onclick="window.quickSave()"><i class="fa-solid fa-cloud-arrow-up"></i> حفظ السجل المعملي</button>
                <button class="btn btn-import" onclick="document.getElementById('excelFileInput').click()"><i class="fa-solid fa-file-import"></i> استيراد Excel ذكي</button>
                <input type="file" id="excelFileInput" accept=".xlsx, .xls" onchange="window.handleBulkExcelUpload(event)">
                <button class="btn btn-view" onclick="window.toggleArchive()"><i class="fa-solid fa-database"></i> استعراض وقفل الأرشيف</button>
            </div>
        </div>

        <!-- قسم الأرشيف المطور والمبسط بالكامل -->
        <div class="dashboard-container archive-section" id="archiveContainer">
            <div class="archive-header">
                <span style="color:var(--text-heading); font-weight: 600; font-size: 14px;">
                    <i class="fa-solid fa-box-archive" style="color:var(--neon-blue)"></i> سجلات المستودع المخزنة: 
                    <strong id="rowCount" style="color:var(--neon-green)">0</strong>
                </span>
                <button class="btn-excel-export" onclick="window.exportExcel()">
                    <i class="fa-regular fa-file-excel"></i> تصدير التقرير الفوري (Excel)
                </button>
            </div>
            
            <div class="modal-table-wrapper">
                <table class="custom-archive-table" id="excelTargetTable">
                    <thead>
                        <tr>
                            <th>م</th>
                            <th>القطاع</th>
                            <th>الهندسة</th>
                            <th>تاريخ الفحص</th>
                            <th>تاريخ التسجيل</th>
                            <th>اسم المشترك</th>
                            <th>كود المشترك</th>
                            <th>النشاط</th>
                            <th>نوع العداد</th>
                            <th>رقم العداد</th>
                            <th>النتيجة</th>
                            <th>ملاحظات</th>
                            <th style="text-align: center;">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="modalBody"></tbody>
                </table>
            </div>

            <div class="modal-footer-controls" style="display:flex; justify-content:space-between; margin-top:15px; align-items: center; flex-wrap: wrap; gap: 15px;">
                <button class="btn-page" style="background:transparent; border:1px solid var(--neon-red); color:var(--neon-red);" onclick="window.clearFilters()">
                    <i class="fa-solid fa-trash-can"></i> تصفير فلاتر البحث
                </button>
                <div class="pagination-cluster">
                    <button id="prevBtn" class="btn-page" onclick="window.prevPage()">السابق</button>
                    <span id="pageInfo" style="align-self:center; font-size:13px; font-weight: 600; color: var(--text-primary);">صفحة 1</span>
                    <button id="nextBtn" class="btn-page" onclick="window.nextPage()">التالي</button>
                </div>
            </div>
        </div>
    </div>

    <!-- حاوية الإشعارات السريعة -->
    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAnKRhT5xJTBvsQKpW7e9w-hGSbAQJWTSo",
            authDomain: "production1-ae85.firebaseapp.com",
            projectId: "production1-ae85",
            databaseURL: "https://production1-ae85-default-rtdb.firebaseio.com",
            storageBucket: "production1-ae85.firebasestorage.app",
            messagingSenderId: "490438031865",
            appId: "1:490438031865:web:a4a69335989f30cd13a528"
        };
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Global state
        window.allData = [];
        window.existingMcoCache = new Set();
        window.existingMeterNumbersCache = new Set();
        window.modalFilteredData = [];
        window.modalCurrentPage = 1; 
        window.modalRowsPerPage = 10;

        // دالة لعرض التنبيهات المخصصة السريعة المودرن
        window.showToast = function(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '<i class="fa-solid fa-circle-check" style="color:var(--neon-green)"></i>';
            if(type === 'error') icon = '<i class="fa-solid fa-circle-xmark" style="color:var(--neon-red)"></i>';
            if(type === 'warning') icon = '<i class="fa-solid fa-triangle-exclamation" style="color:var(--neon-blue)"></i>';
            if(type === 'loading') icon = '<i class="fa-solid fa-spinner fa-spin" style="color:var(--neon-purple)"></i>';

            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);

            if(type !== 'loading') {
                setTimeout(() => {
                    toast.style.animation = 'fadeIn 0.2s ease reverse forwards';
                    setTimeout(() => toast.remove(), 200);
                }, duration);
            }
            return toast;
        };

        // المزامنة الحية مع فايربيس وقراءة البيانات الفورية
        const meterDataRef = ref(database, "Ayat/meterdata");
        onValue(meterDataRef, (snapshot) => {
            const newArr = [];
            const mcoSet = new Set();
            const meterSet = new Set();
            if (snapshot.exists()) {
                const raw = snapshot.val();
                const process = (item, key) => {
                    if (item && typeof item === 'object') {
                        const cleanMco = cleanNumericString(item.metercode);
                        const cleanMeter = cleanNumericString(item.meternumber);
                        if (cleanMco) mcoSet.add(cleanMco);
                        if (cleanMeter) meterSet.add(cleanMeter);
                        newArr.push({ ...item, __firebaseKey: String(key) });
                    }
                };
                if (Array.isArray(raw)) raw.forEach((item, idx) => process(item, idx));
                else Object.keys(raw).forEach(k => process(raw[k], k));
            }
            window.allData = newArr;
            window.existingMcoCache = mcoSet;
            window.existingMeterNumbersCache = meterSet;
            
            window.filterTable();
        });

        function cleanNumericString(val) { if (!val && val !== 0) return ""; return String(val).trim().replace(/['"`\s]/g, ""); }
        function formatDateToDDMMYYYY(dateStr) { if (!dateStr) return ""; const parts = dateStr.split("-"); if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`; return dateStr; }

        window.toggleArchive = function() {
            const archive = document.getElementById('archiveContainer');
            if (archive.style.display === 'block') {
                archive.style.display = 'none';
            } else {
                archive.style.display = 'block';
                window.filterTable();
            }
        };

        // حفظ سجل فردي فوري
        window.quickSave = async function () {
            const keta3 = document.getElementById("keta3").value.trim();
            const handsa = document.getElementById("handsa").value.trim();
            const nashattype = document.getElementById("nashattype").value.trim();
            const metertype = document.getElementById("mtype").value.trim();
            const meternumber = cleanNumericString(document.getElementById("mno").value);
            const metercode = cleanNumericString(document.getElementById("mco").value);
            
            if (!meternumber || !keta3 || !handsa) {
                return window.showToast("رقم العداد، القطاع والهندسة حقول إجبارية!", "warning");
            }
            if (window.existingMeterNumbersCache.has(meternumber) || (metercode && window.existingMcoCache.has(metercode))) {
                return window.showToast("سجل مكرر! رقم العداد أو كود المشترك موجود مسبقاً بالفروع.", "error");
            }

            const newRecord = {
                keta3, handsa, nashattype, metertype, meternumber,
                calibrationdate: formatDateToDDMMYYYY(document.getElementById("calib_date").value),
                enterdate: formatDateToDDMMYYYY(document.getElementById("enter_date").value) || formatDateToDDMMYYYY(new Date().toISOString().split('T')[0]),
                metername: document.getElementById("mname").value.trim(),
                metercode, result: document.getElementById("munip").value.trim(),
                notes: document.getElementById("notes").value.trim()
            };

            const loadToast = window.showToast("جاري حفظ السجل سحابياً...", "loading");
            try {
                let nextIndex = window.allData.length;
                const numericKeys = window.allData.map(d => parseInt(d.__firebaseKey)).filter(k => !isNaN(k));
                if (numericKeys.length) nextIndex = Math.max(...numericKeys) + 1;
                
                await update(ref(database), { [`Ayat/meterdata/${nextIndex}`]: newRecord });
                loadToast.remove();
                window.showToast("تم الحفظ بنجاح", "success");
                
                document.getElementById("mno").value = ""; 
                document.getElementById("mco").value = ""; 
                document.getElementById("notes").value = "";
                document.getElementById("mname").value = "";
            } catch { 
                loadToast.remove();
                window.showToast("فشل في معالجة الحفظ السحابي", "error"); 
            }
        };

        // معالجة ورفع ملفات الإكسيل مجمعاً
        window.handleBulkExcelUpload = async function (event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const loadToast = window.showToast("جاري رفع وتحليل ملف Excel...", "loading");
                try {
                    const workbook = XLSX.read(e.target.result, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                    if (!rows.length) {
                        loadToast.remove();
                        return window.showToast("ملف Excel فارغ من السجلات", "warning");
                    }

                    let nextIndex = 0;
                    const numericKeys = window.allData.map(d => parseInt(d.__firebaseKey)).filter(k => !isNaN(k));
                    nextIndex = numericKeys.length ? Math.max(...numericKeys) + 1 : window.allData.length;
                    const batch = {};
                    let duplicates = 0, added = 0;

                    for (const row of rows) {
                        const mcoVal = cleanNumericString(row["كود المشترك"] || row["metercode"] || row["الكود الموحد"] || row["MCO"]);
                        const meterNum = cleanNumericString(row["الشاسيه"] || row["meternumber"] || row["رقم العداد"]);
                        if (!meterNum && !mcoVal) continue;
                        if ((meterNum && window.existingMeterNumbersCache.has(meterNum)) || (mcoVal && window.existingMcoCache.has(mcoVal))) { duplicates++; continue; }

                        const record = {
                            keta3: String(row["القطاع"] || row["keta3"] || ""),
                            handsa: String(row["الهندسة"] || row["handsa"] || ""),
                            nashattype: String(row["النشاط"] || row["nashattype"] || ""),
                            metertype: String(row["نوع العداد"] || row["metertype"] || ""),
                            meternumber: meterNum,
                            calibrationdate: String(row["تاريخ الفحص"] || row["calibrationdate"] || ""),
                            enterdate: String(row["تاريخ التسجيل"] || row["enterdate"] || new Date().toISOString().split('T')[0]),
                            metername: String(row["اسم المشترك"] || row["metername"] || ""),
                            metercode: mcoVal,
                            result: String(row["نتيجة الفحص"] || row["result"] || ""),
                            notes: String(row["ملاحظات"] || row["notes"] || "")
                        };
                        batch[`Ayat/meterdata/${nextIndex}`] = record;
                        if (meterNum) window.existingMeterNumbersCache.add(meterNum);
                        if (mcoVal) window.existingMcoCache.add(mcoVal);
                        nextIndex++; added++;
                    }
                    loadToast.remove();
                    if (added > 0) {
                        await update(ref(database), batch);
                        window.showToast(`تم إضافة ${added} سجل جديد بنجاح.`, "success");
                    } else {
                        window.showToast("جميع محتويات الملف مكررة وموجودة مسبقاً.", "warning");
                    }
                } catch (err) { 
                    loadToast.remove();
                    window.showToast("حدث خطأ في معالجة الملف واستخراج الصفوف", "error"); 
                }
                document.getElementById('excelFileInput').value = "";
            };
            reader.readAsArrayBuffer(file);
        };

        // معالجة بناء وبناء خلايا الجدول المحسن
        window.renderTableBody = function() {
            const tbody = document.getElementById("modalBody"); 
            if (!tbody) return;
            
            const total = window.modalFilteredData.length;
            document.getElementById("rowCount").innerText = total;
            
            const start = (window.modalCurrentPage - 1) * window.modalRowsPerPage;
            const end = Math.min(start + window.modalRowsPerPage, total);
            const pageRows = window.modalFilteredData.slice(start, end);
            
            if (!pageRows.length && total) { 
                window.modalCurrentPage = Math.ceil(total / window.modalRowsPerPage); 
                return window.renderTableBody(); 
            }
            
            tbody.innerHTML = pageRows.map((item, idx) => `
                <tr>
                    <td>${start + idx + 1}</td>
                    <td>${item.keta3 || ''}</td>
                    <td>${item.handsa || ''}</td>
                    <td class="numeric-field">${item.calibrationdate || ''}</td>
                    <td class="numeric-field">${item.enterdate || ''}</td>
                    <td>${item.metername || ''}</td>
                    <td class="numeric-field" style="font-weight:600;">${item.metercode || ''}</td>
                    <td>${item.nashattype || ''}</td>
                    <td>${item.metertype || ''}</td>
                    <td class="numeric-field" style="color:var(--neon-blue); font-weight:600;">${item.meternumber || ''}</td>
                    <td><span class="badge-status ${item.result || ''}">${item.result || 'معلق'}</span></td>
                    <td style="max-width:150px; white-space:normal; font-size:12px; opacity:0.8;">${item.notes || ''}</td>
                    <td style="text-align: center;">
                        <button onclick="window.deleteRowFromServer('${item.__firebaseKey}')" style="background:transparent; border:none; color:var(--neon-red); cursor:pointer;" title="حذف">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            
            const totalPages = Math.ceil(total / window.modalRowsPerPage) || 1;
            document.getElementById("pageInfo").innerHTML = `صفحة <strong>${window.modalCurrentPage}</strong> من <strong>${totalPages}</strong>`;
            document.getElementById("prevBtn").disabled = (window.modalCurrentPage === 1);
            document.getElementById("nextBtn").disabled = (window.modalCurrentPage === totalPages);
        };

        window.filterTable = function () {
            const filters = {
                f0: (document.getElementById("f0")?.value || "").toLowerCase(),
                f1: (document.getElementById("f1")?.value || "").toLowerCase(),
                f2: (document.getElementById("f2")?.value || "").toLowerCase(),
                f3: (document.getElementById("f3")?.value || "").toLowerCase(),
                f4: (document.getElementById("f4")?.value || "").toLowerCase(),
                f5: (document.getElementById("f5")?.value || "").toLowerCase(),
                f6: (document.getElementById("f6")?.value || "").toLowerCase(),
                f7: (document.getElementById("f7")?.value || "").toLowerCase(),
                f8: (document.getElementById("f8")?.value || "").toLowerCase(),
                f9: (document.getElementById("f9")?.value || "").toLowerCase(),
                f10: (document.getElementById("f10")?.value || "").toLowerCase()
            };
            
            window.modalFilteredData = window.allData.filter(item =>
                (!filters.f0 || (item.keta3 || "").toLowerCase().includes(filters.f0)) &&
                (!filters.f1 || (item.handsa || "").toLowerCase().includes(filters.f1)) &&
                (!filters.f2 || (item.calibrationdate || "").toLowerCase().includes(filters.f2)) &&
                (!filters.f3 || (item.enterdate || "").toLowerCase().includes(filters.f3)) &&
                (!filters.f4 || (item.metername || "").toLowerCase().includes(filters.f4)) &&
                (!filters.f5 || (item.metercode || "").toLowerCase().includes(filters.f5)) &&
                (!filters.f6 || (item.nashattype || "").toLowerCase().includes(filters.f6)) &&
                (!filters.f7 || (item.metertype || "").toLowerCase().includes(filters.f7)) &&
                (!filters.f8 || (item.meternumber || "").toLowerCase().includes(filters.f8)) &&
                (!filters.f9 || (item.result || "").toLowerCase().includes(filters.f9)) &&
                (!filters.f10 || (item.notes || "").toLowerCase().includes(filters.f10))
            );
            window.modalCurrentPage = 1; 
            window.renderTableBody();
        };

        // بناء حقول فلاتر البحث الرشيقة أسفل الرأس
        const headerRow = document.querySelector("#excelTargetTable thead tr");
        if (headerRow) {
            const ths = headerRow.children;
            for (let i = 1; i < ths.length - 1; i++) { 
                const filterId = `f${i-1}`;
                const th = ths[i];
                const input = document.createElement("input");
                input.placeholder = `فلترة...`;
                input.className = "filter-input";
                input.id = filterId;
                input.addEventListener("input", () => window.filterTable());
                th.appendChild(input);
            }
        }

        window.nextPage = () => { const max = Math.ceil(window.modalFilteredData.length / window.modalRowsPerPage); if (window.modalCurrentPage < max) { window.modalCurrentPage++; window.renderTableBody(); } };
        window.prevPage = () => { if (window.modalCurrentPage > 1) { window.modalCurrentPage--; window.renderTableBody(); } };
        window.clearFilters = () => { for (let i = 0; i <= 10; i++) { const el = document.getElementById(`f${i}`); if (el) el.value = ""; } window.filterTable(); window.showToast("تم تصفير الفلاتر", "warning");};

        window.deleteRowFromServer = async function(key) {
            if(confirm("هل تريد حذف هذا السجل نهائياً؟")) {
                try {
                    await remove(ref(database, `Ayat/meterdata/${key}`));
                    window.showToast("تم حذف السجل من الخادم سحابياً", "success");
                } catch {
                    window.showToast("فشلت عملية الحذف", "error");
                }
            }
        };

        window.exportExcel = function() {
            if(!window.modalFilteredData.length) return window.showToast("لا توجد بيانات متاحة حالياً للتصدير", "warning");
            
            const dataToExport = window.modalFilteredData.map((item, index) => ({
                "م": index + 1,
                "القطاع": item.keta3 || "",
                "الهندسة": item.handsa || "",
                "تاريخ الفحص": item.calibrationdate || "",
                "تاريخ التسجيل": item.enterdate || "",
                "اسم المشترك": item.metername || "",
                "كود المشترك": item.metercode || "",
                "نوع النشاط": item.nashattype || "",
                "طراز العداد": item.metertype || "",
                "رقم العداد": item.meternumber || "",
                "نتيجة الفحص": item.result || "",
                "الملاحظات": item.notes || ""
            }));

            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "التقرير المستخرج");
            XLSX.writeFile(workbook, `تقرير_الفحص_المعملي_${new Date().toISOString().split('T')[0]}.xlsx`);
            window.showToast("تم تحميل ملف Excel المحسن بنجاح", "success");
        };

        // تبديل الأنماط
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        themeToggleBtn.addEventListener("click", () => {
            document.body.classList.toggle("light-mode");
            const isLight = document.body.classList.contains("light-mode");
            themeToggleBtn.innerHTML = isLight ? 
                `<i class="fa-solid fa-sun"></i> <span>وضع ليلي</span>` : 
                `<i class="fa-solid fa-moon"></i> <span>وضع نهاري</span>`;
        });
    </script>
</body>

</html>
