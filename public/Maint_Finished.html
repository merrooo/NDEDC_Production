<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>نظام عدادات شمال الدلتا - استيراد بيانات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Ayat.css" />
  <style>
    .table-container table td {
      font-size: 11px;
      padding: 6px 4px;
      border-bottom: 1px solid #eee;
    }

    .table-container table th {
      font-size: 12px;
      padding: 10px 5px;
      background-color: #f1f5f9;
      color: #0f766e;
      white-space: nowrap;
    }

    .search-row input {
      font-size: 10px;
      padding: 4px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      width: 95%;
    }

    .entry-card {
      margin: 10px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .btn-import {
      background-color: #f59e0b;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    .action-btns button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    /* لإخفاء مدخل الملف الافتراضي */
    #excelInput {
      display: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <label class="dark-toggle" onclick="document.body.classList.toggle('dark-mode')">
    <span class="icon">🌙</span>
    <div class="switch"></div>
    <span class="icon">☀️</span>
  </label>

  <div class="entry-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h2 style="font-size: 1.2rem;">إدارة بيانات عدادات شمال الدلتا</h2>
      <button class="btn-view" onclick="window.location.href='index.html'"
        style="background: #64748b; color:white; border:none; padding: 6px 15px; border-radius: 6px; cursor:pointer;">الرئيسية</button>
    </div>

    <div id="totalSummary" style="margin-bottom:10px; font-size:12px; font-weight:600; color:#0f766e;">
      جاري تحميل البيانات...
    </div>

    <div class="table-controls" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
      <div>
        <button class="btn-refresh" onclick="refreshDatabase()"
          style="padding: 6px 12px; border-radius: 6px; cursor:pointer;">🔄 تحديث</button>
        <button onclick="addNewRow()"
          style="padding: 6px 12px; border-radius: 6px; background:#0f766e; color:white; border:none; cursor:pointer; margin-right: 5px;">➕
          إضافة يدوي</button>

        <input type="file" id="excelInput" accept=".xlsx, .xls, .csv" />
        <button class="btn-import" onclick="document.getElementById('excelInput').click()">📥 استيراد من Excel</button>
      </div>
      <button class="btn-excel" onclick="exportExcel()"
        style="padding: 6px 12px; border-radius: 6px; background:#1e293b; color:white; border:none; cursor:pointer;">📊
        تصدير Excel</button>
    </div>

    <div class="table-container" style="overflow-x: auto;">
      <table id="dataTable" style="width: 100%; border-collapse: collapse; text-align: center;">
        <thead>
          <tr>
            <th>رقم العداد</th>
            <th>الاستهلاك الكلي</th>
            <th>الاستهلاك الحالي</th>
            <th>المتبقي بالجنية</th>
            <th>اقصي حمل أمبير</th>
            <th>المديونية</th>
            <th>غطاء الروزاتة</th>
            <th>غطاء العداد</th>
            <th>الرجوع عكس</th>
            <th>ملاحظات</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="comparisonTableBody"></tbody>
      </table>
    </div>

    <div class="pagination-controls" style="margin-top: 15px; text-align: center;">
      <button id="prevBtn" onclick="window.prevPage()">السابق</button>
      <span id="pageInfo" style="margin: 0 10px; font-size: 12px;"></span>
      <button id="nextBtn" onclick="window.nextPage()">التالي</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAnKRhT5xJTBvsQKpW7e9w-hGSbAQJWTSo",
      authDomain: "production1-ae85.firebaseapp.com",
      projectId: "production1-ae85",
      storageBucket: "production1-ae85.firebasestorage.app",
      messagingSenderId: "490438031865",
      appId: "1:490438031865:web:a4a69335989f30cd13a528"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allData = [];
    let itemsPerPage = 15;
    let currentPage = 1;

    // دالة تحميل البيانات
    async function loadData() {
      const snapshot = await get(ref(db, 'Delta_Meters_Data'));
      allData = snapshot.exists() ? Object.values(snapshot.val()) : [];
      renderPage();
    }

    function renderPage() {
      const tbody = document.getElementById('comparisonTableBody');
      tbody.innerHTML = '';
      const start = (currentPage - 1) * itemsPerPage;
      const pageItems = allData.slice(start, start + itemsPerPage);

      pageItems.forEach(item => {
        const tr = tbody.insertRow();
        tr.setAttribute('data-key', item.m_no);
        tr.innerHTML = `
                    <td>${item.m_no}</td>
                    <td>${item.m_total || ''}</td>
                    <td>${item.m_curr || ''}</td>
                    <td>${item.m_rem || ''}</td>
                    <td>${item.m_max || ''}</td>
                    <td>${item.m_debt || ''}</td>
                    <td>${item.m_term_cov || ''}</td>
                    <td>${item.m_meter_cov || ''}</td>
                    <td>${item.m_reverse || ''}</td>
                    <td>${item.m_notes || ''}</td>
                    <td>
                        <div class="action-btns">
                            <button onclick="window.deleteRow(this)">🗑️</button>
                        </div>
                    </td>
                `;
      });
      updatePaginationInfo();
    }

    // --- منطق استيراد ملف Excel ---
    document.getElementById('excelInput').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function (e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheetName];
        const jsonData = XLSX.utils.sheet_to_json(worksheet);

        if (jsonData.length === 0) return Swal.fire("خطأ", "الملف فارغ", "error");

        Swal.fire({
          title: 'جاري رفع البيانات...',
          html: 'يرجى الانتظار بينما يتم تحديث قاعدة البيانات',
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); }
        });

        let count = 0;
        for (const row of jsonData) {
          // تنظيف مفاتيح الـ Excel (إزالة المسافات الزائدة)
          const cleanRow = {};
          Object.keys(row).forEach(key => {
            cleanRow[key.trim()] = row[key];
          });

          // الربط بين عناوين ملفك وكود البرمجة
          const meterNo = cleanRow['رقم العداد'] || cleanRow['رقم العداد '];
          if (!meterNo) continue;

          const meterData = {
            m_no: meterNo.toString(),
            m_total: cleanRow['الاستهلاك الكلي'] || cleanRow['الاستهلاك الكلي '] || '',
            m_curr: cleanRow['الاستهلاك الحالي'] || cleanRow['الاستهلاك الحالي '] || '',
            m_rem: cleanRow['المتبقي بالجنية'] || cleanRow['المتبقي بالجنية '] || '',
            m_max: cleanRow['اقصي حمل أمبير'] || cleanRow['اقصي حمل أمبير '] || '',
            m_debt: cleanRow['المديونية'] || cleanRow['المديونية  '] || '',
            m_term_cov: cleanRow['غطاء الروزاتة'] || cleanRow['غطاء الروزاتة '] || '',
            m_meter_cov: cleanRow['غطاء العداد'] || cleanRow['غطاء العداد '] || '',
            m_reverse: cleanRow['الرجوع عكس'] || cleanRow['الرجوع عكس '] || '',
            m_notes: cleanRow['ملاحظات'] || cleanRow['ملاحظات '] || ''
          };

          await set(ref(db, `Delta_Meters_Data/${meterData.m_no}`), meterData);
          count++;
        }

        Swal.fire("نجاح", `تم استيراد ${count} سجل بنجاح`, "success");
        loadData();
        document.getElementById('excelInput').value = ''; // تصفير المدخل
      };
      reader.readAsArrayBuffer(file);
    });

    // دوال مساعدة
    window.deleteRow = (btn) => {
      const key = btn.closest('tr').getAttribute('data-key');
      Swal.fire({
        title: 'حذف؟',
        text: "سيتم حذف العداد " + key,
        icon: 'warning',
        showCancelButton: true
      }).then(async (res) => {
        if (res.isConfirmed) {
          await remove(ref(db, `Delta_Meters_Data/${key}`));
          loadData();
        }
      });
    };

    function updatePaginationInfo() {
      const totalPages = Math.ceil(allData.length / itemsPerPage) || 1;
      document.getElementById('pageInfo').innerText = `الصفحة ${currentPage} من ${totalPages}`;
      document.getElementById('totalSummary').innerText = `إجمالي العدادات المسجلة: ${allData.length}`;
      document.getElementById('prevBtn').disabled = currentPage === 1;
      document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    window.nextPage = () => { currentPage++; renderPage(); };
    window.prevPage = () => { currentPage--; renderPage(); };
    window.refreshDatabase = () => loadData();
    window.onload = loadData;
  </script>
</body>

</html>
