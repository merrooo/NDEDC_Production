                    <p>The eddy current method is based on the principle of generating circular electrical currents (eddy currents) in a conductive material. This is achieved by the use of a coil connected to an alternating current generator driving an alternating magnetic field (primary field). The current flow induced by this primary field within the conductive material will itself produce a magnetic field (secondary field) in opposition to the primary field according to Lenz's law.<br>This reaction can be measured as a change of the impedance of the coil/sample arrangement (change in amplitude and phase of the voltage related to the generator current driving the coil). A coil in air is not influenced by eddy currents, but moving the coil towards an electrical conductive sample results in a signal, which can be used for distance measurement, e.g. measurement of non-conductive coating thickness on electrical conductive material.<br><br>The eddy currents will always go the easiest way, and if cracks exist in the material, the current will go around the crack. This change of eddy current flow also can be detected by monitoring the impedance of the coil and is mainly used for detection of cracks.<br><br>Eddy currents are flowing beneath the surface of the material with the highest density close to the surface. The depth of penetration of the eddy currents depends on the conductivity and permeability of the material and the frequency of the alternating field. At high frequencies the eddy currents concentrate at the surface, while with lower frequencies deeper regions within the material are penetrated. By utilizing this on e.g. a sheet of aluminum, both, cracks on top of the sheet and on the other side can be detected. It is also applicable to detect subsurface corrosion and to determine the thickness of conductive sheets. This effect is used mainly for non-ferromagnetic material. Due to the high permeability of ferromagnetic material the standard eddy current method here is limited to the region close to the surface.</p>

                    <strong>Lag Adjustment In Energy Meters:</strong> The energy meter will register correct energy only if the shunt magnet flux lags the voltage exactly by 90°. This requires that the pressure coil should be highly inductive. If the angle is not 90°, it is to be adjusted by shading bands provided on the central limb of the shunt magnet. This is known as lag adjustment. Sometimes it is also called as "low power factor"/Quadrature or Reductive load adjustment. The adjustment is done by moving the shading bands along the axis of the central limb. As the bands are moved up the limb they embrace more flux. This results in greater induced emf and current produced by the bands therefore, the value of "lag" angle increases. When the shading bands are moved down, the limb induced emf and current decreases and the "lag angle" also decreases. The adjustment is done in such a way that the angle of lag is exactly 90 i.e., is brought exact in quadrature with the voltage.</p>

                <span class="page-indicator">الصفحة ${currentPage + 1} من ${total}</span>
                <button id="nextPageBtn" ${currentPage === total - 1 ? 'disabled' : ''}>◀️ التالي</button>
                <button id="lastPageBtn" ${currentPage === total - 1 ? 'disabled' : ''}>⏭️ الأخيرة</button>
            </div>
        `;

        const fullHtml = `
            <div class="sheet-container">
                <div class="sheet-header">${pageData.title}</div>
                ${pageData.content}
            </div>
            ${paginationHtml}
        `;
        document.getElementById('dynamicRender').innerHTML = fullHtml;

        document.getElementById('firstPageBtn')?.addEventListener('click', () => { currentPage = 0; renderActiveSheet(); });
        document.getElementById('prevPageBtn')?.addEventListener('click', () => { if (currentPage > 0) { currentPage--; renderActiveSheet(); } });
        document.getElementById('nextPageBtn')?.addEventListener('click', () => { if (currentPage < total - 1) { currentPage++; renderActiveSheet(); } });
        document.getElementById('lastPageBtn')?.addEventListener('click', () => { currentPage = total - 1; renderActiveSheet(); });
    }

    function setActiveSheetAndRender(sheetId) {
        activeSheet = sheetId;
        currentPage = 0;
        renderActiveSheet();
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if (sheetId === 'mechanical') document.getElementById('btnMechanical').classList.add('active');
        if (sheetId === 'prepaid') document.getElementById('btnPrepaid').classList.add('active');
        if (sheetId === 'digital') document.getElementById('btnDigital').classList.add('active');
    }

    document.getElementById('btnMechanical').addEventListener('click', () => setActiveSheetAndRender('mechanical'));
    document.getElementById('btnPrepaid').addEventListener('click', () => setActiveSheetAndRender('prepaid'));
    document.getElementById('btnDigital').addEventListener('click', () => setActiveSheetAndRender('digital'));

    // initial load
    setActiveSheetAndRender('mechanical');
</script>
</body>
</html>
