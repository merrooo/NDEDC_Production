<!DOCTYPE html>
<html lang="ar" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Admin - Modern Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --danger: #ef4444;
            --danger-dark: #b91c1c;
            --primary: #3b82f6;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-card {
            background: var(--surface);
            width: 100%;
            max-width: 700px;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .icon-wrapper {
            background: #fff1f2;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .header i {
            color: var(--danger);
            font-size: 1.8rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f172a;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .warning-box {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            border-right: 5px solid var(--danger);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: #991b1b;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
        }

        textarea,
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.85rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        textarea:focus,
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-destructive {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--danger);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.4);
        }

        .btn-destructive:hover:not(:disabled) {
            background: var(--danger-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.5);
        }

        .btn-destructive:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-destructive:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Terminal Style Console */
        .console-wrapper {
            margin-top: 2rem;
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .console-header {
            background: #1e293b;
            padding: 8px 15px;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.red {
            background: #ff5f56;
        }

        .dot.yellow {
            background: #ffbd2e;
        }

        .dot.green {
            background: #27c93f;
        }

        #logConsole {
            padding: 15px;
            color: #38bdf8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            max-height: 180px;
            overflow-y: auto;
            direction: ltr;
            line-height: 1.6;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        ::placeholder {
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="admin-card">
        <div class="header">
            <div class="icon-wrapper">
                <i class="fas fa-fire-alt"></i>
            </div>
            <h1>مدير بيانات Firebase</h1>
            <p>لوحة التحكم المتقدمة لحذف مسارات Realtime Database</p>
        </div>

        <div class="warning-box">
            <i class="fas fa-exclamation-triangle"></i>
            <div>
                <strong>تنبيه أمني:</strong> تأكد من ضبط القواعد على <code>".write": true</code> مؤقتاً لتنفيذ العملية.
            </div>
        </div>

        <div class="form-group">
            <div class="form-group">
                <label><i class="fas fa-code-branch"></i> إعدادات المشروع (JSON Config)</label>
                <textarea id="firebaseConfigInput" rows="8" placeholder='const firebaseConfig = {
  "apiKey": "your-api-key",
  "authDomain": "your-app.firebaseapp.com",
  "databaseURL": "https://your-app.firebaseio.com",
  "projectId": "your-project-id",
  "storageBucket": "your-app.firebasestorage.app",
  "messagingSenderId": "123456789",
  "appId": "1:123456789:web:abcdef"
}'></textarea>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label><i class="fas fa-folder-open"></i> المسار المستهدف</label>
                <input type="text" id="targetPath" value="/" placeholder="/users/data">
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> تأكيد الهوية</label>
                <input type="text" id="confirmText" placeholder="اكتب DELETE للتفعيل">
            </div>
        </div>

        <button class="btn-destructive" id="startAction" disabled>
            <span class="loader" id="loader"></span>
            <span id="btnText">تنفيذ المسح النهائي</span>
            <i class="fas fa-trash-alt"></i>
        </button>

        <div class="console-wrapper">
            <div class="console-header">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
                <span
                    style="color: #94a3b8; font-size: 0.7rem; margin-left: 10px; font-family: sans-serif;">Terminal</span>
            </div>
            <div id="logConsole">
                <div id="logContent">> النظام جاهز... في انتظار الأوامر</div>
            </div>
        </div>
    </div>

    <!-- Scripts remain largely the same, just keeping the IDs as they were -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const btn = document.getElementById('startAction');
        const confirmInput = document.getElementById('confirmText');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const logContent = document.getElementById('logContent');

        confirmInput.addEventListener('input', (e) => {
            btn.disabled = e.target.value.trim().toUpperCase() !== 'DELETE';
        });

        function log(msg, type = 'info') {
            const colors = { info: '#38bdf8', error: '#f87171', warn: '#fbbf24' };
            const div = document.createElement('div');
            div.style.color = colors[type];
            div.innerHTML = `<span style="color: #64748b">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            logContent.appendChild(div);
            logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
        }

        async function executePurge() {
            const configText = document.getElementById('firebaseConfigInput').value; // الجديد
            const path = document.getElementById('targetPath').value.trim() || "/";

            btn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.innerText = "جاري الحذف...";

            try {
                const jsonMatch = configText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("لم يتم العثور على صيغة JSON صحيحة");

                const config = new Function(`return ${jsonMatch[0]}`)();

                if (firebase.apps.length) await firebase.app().delete();
                firebase.initializeApp(config);

                log(`بدء الاتصال... المسار المحدد: [${path}]`, 'warn');

                await firebase.database().ref(path).remove();

                log("✅ تم مسح البيانات بنجاح من الخادم.", "info");
                confirmInput.value = "";
                btnText.innerText = "اكتملت المهمة";

            } catch (err) {
                log("🛑 خطأ: " + err.message, "error");
                btnText.innerText = "فشل العملية";
            } finally {
                loader.style.display = 'none';
            }
        }

        btn.onclick = executePurge;
    </script>

</body>

</html>
