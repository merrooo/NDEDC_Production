  <style>
    * {
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f0f9ff;
      position: relative;
      overflow-x: hidden;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Enhanced Ambient Glows */
    .ambient-glow-1 {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(56, 189, 248, 0.05) 40%, transparent 70%);
      top: -10%;
      right: -10%;
      z-index: 0;
      pointer-events: none;
      filter: blur(60px);
    }

    .ambient-glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(130, 174, 195, 0.12) 0%, rgba(14, 165, 233, 0.03) 40%, transparent 70%);
      bottom: -10%;
      left: -10%;
      z-index: 0;
      pointer-events: none;
      filter: blur(50px);
    }

    .ambient-glow-3 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(186, 230, 253, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
      filter: blur(80px);
    }

    /* Premium Glass Panel */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(201, 214, 219, 0.2);
      box-shadow:
        0 25px 70px -10px rgba(14, 165, 233, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      position: relative;
      z-index: 1;
    }

    /* Stylish Light Blue Card */
    .glass-card {
      background: linear-gradient(145deg, #ffffff 0%, #f0f9ff 50%, #e0f2fe 100%);
      border: 1px solid rgba(56, 189, 248, 0.25);
      box-shadow:
        0 8px 32px rgba(255, 255, 255, 0.08),
        0 2px 8px rgba(14, 165, 233, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 50%);
      pointer-events: none;
    }

    .glass-card:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow:
        0 20px 60px rgba(14, 165, 233, 0.15),
        0 4px 16px rgba(14, 165, 233, 0.08);
    }

    /* Navigation button styling */
    .btn-nav-glass {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .btn-nav-glass:hover,
    .btn-nav-glass.active {
      background: rgba(248, 249, 249, 0.15);
      border-color: #38bdf8;
      color: #ffffff;
    }

    .btn-nav-primary {
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      color: #ffffff;
      border-radius: 8px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(14, 165, 233, 0.25);
      transition: all 0.2s ease;
    }

    .btn-nav-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 25px rgba(14, 165, 233, 0.4);
    }

    /* Stylish Card Image Container */
    .card-image-container {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
    }

    .card-image-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(56, 189, 248, 0.02) 50%,
          rgba(56, 189, 248, 0.1) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* Slide transitions */
    .slide {
      transition: opacity 1s ease-in-out;
    }

    /* Enhanced Badge */
    .industrial-badge {
      background: linear-gradient(135deg, #38bdf8 0%, #0284c7 50%, #0369a1 100%);
      clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
      padding: 4px 20px 4px 16px;
      position: relative;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
      letter-spacing: 0.1em;
    }

    .industrial-badge::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg,
          rgba(255, 255, 255, 0.2) 0%,
          transparent 50%,
          rgba(255, 255, 255, 0.1) 100%);
      clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
      pointer-events: none;
    }

    /* Title with Gradient */
    .title-gradient {
      background: linear-gradient(135deg, #0c4a6e 0%, #0284c7 50%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtitle with Light Blue */
    .subtitle-light {
      color: #0284c7;
      position: relative;
      display: inline-block;
    }

    .subtitle-light::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #38bdf8, transparent);
      opacity: 0.3;
    }

    /* Decorative Elements */
    .decorative-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #38bdf8;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,
      100% {
        opacity: 0.4;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* Dot active state */
    .dot-active {
      background: white !important;
      width: 12px !important;
    }

    /* Slideshow container for main content */
    .main-slideshow-container {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      min-height: 200px;
    }

    .main-slideshow-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg,
          rgba(56, 189, 248, 0.03) 0%,
          rgba(56, 189, 248, 0.01) 50%,
          rgba(56, 189, 248, 0.08) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* Right column slideshow */
    .right-slideshow-container {
      position: relative;

      background: linear-gradient(135deg, #e0f2fe, #bae6fd);

          rgba(56, 189, 248, 0.01) 50%,
          rgba(56, 189, 248, 0.08) 100%);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>

              <i class="fas fa-chevron-left"></i>
            </button>
            <button class="right-next-btn absolute right-1 top-1/2 -translate-y-1/2 z-20 w-6 h-6 rounded-full bg-black/30 backdrop-blur-sm text-white hover:bg-black/50 transition-all duration-300 flex items-center justify-center text-xs border border-white/20 opacity-0 hover:opacity-100">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
          
          <p class="text-slate-600 text-xs leading-relaxed">
            PARAGRAPH-5.
          </p>
          <div class="bg-sky-50 border-l-2 border-[#0284c7] rounded-r p-3.5 mt-4">
            <div class="text-xs font-bold text-slate-900 flex items-center gap-1.5 mb-1">
              <i class="fas fa-check-circle text-[#0284c7]"></i> TITLE-6
            </div>
            <p class="text-slate-600 text-[11px] leading-relaxed">
              PARAGRAPHE-6.
            </p>
          </div>
        </div>

        <div class="space-y-1 border-t border-sky-100 pt-4">
          <button onclick="handleServiceClick('Consulting Services')" class="w-full flex items-center justify-between text-xs font-medium text-slate-600 hover:text-[#0284c7] hover:bg-sky-50 p-2 rounded transition-all duration-200 text-left group">
            <span>Consulting Services</span>
            <i class="fas fa-chevron-right text-[#0284c7] text-[10px] opacity-0 transition-all duration-200 group-hover:opacity-100 group-hover:translate-x-0.5"></i>
          </button>
          <button onclick="handleServiceClick('Strategic Planning')" class="w-full flex items-center justify-between text-xs font-medium text-slate-600 hover:text-[#0284c7] hover:bg-sky-50 p-2 rounded transition-all duration-200 text-left group">
            <span>Strategic Planning</span>
            <i class="fas fa-chevron-right text-[#0284c7] text-[10px] opacity-0 transition-all duration-200 group-hover:opacity-100 group-hover:translate-x-0.5"></i>
          </button>
          <button onclick="handleServiceClick('Market Intelligence')" class="w-full flex items-center justify-between text-xs font-medium text-slate-600 hover:text-[#0284c7] hover:bg-sky-50 p-2 rounded transition-all duration-200 text-left group">
            <span>Market Intelligence</span>
            <i class="fas fa-chevron-right text-[#0284c7] text-[10px] opacity-0 transition-all duration-200 group-hover:opacity-100 group-hover:translate-x-0.5"></i>
          </button>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <footer class="flex flex-wrap items-center justify-between gap-3 px-6 md:px-8 py-4 bg-[#141724] border-t border-white/5 text-[11px] text-slate-400 font-medium">
      <div class="flex items-center gap-4">
        <span class="flex items-center gap-1.5"><i class="fas fa-check-circle text-emerald-500 text-xs"></i> TITLE-FOOTER-1</span>
        <span class="flex items-center gap-1.5"><i class="fas fa-map-pin text-[#38bdf8]"></i> TITLE-FOOTER-2</span>
      </div>
      <div class="flex items-center gap-1 bg-white/5 px-3 py-1 rounded border border-white/10 shadow-sm text-slate-200">
        <i class="fas fa-calendar-alt text-[#38bdf8]"></i> Sync Check: <span id="currentYear">2026</span>
      </div>
    </footer>

  </div>

  <script>
    // Main Slideshow
    document.addEventListener('DOMContentLoaded', function() {
      // --- Main Card Slideshow (Top) ---
      const slides = document.querySelectorAll('.card-image-container .slide');
      const dots = document.querySelectorAll('.card-image-container .dot');
      const prevBtn = document.querySelector('.card-image-container .prev-btn');
      const nextBtn = document.querySelector('.card-image-container .next-btn');
      let currentSlide = 0;
      let slideInterval;

      function showSlide(index) {
        slides.forEach(slide => slide.style.opacity = '0');
        dots.forEach(dot => dot.classList.remove('dot-active'));
        slides[index].style.opacity = '1';
        dots[index].classList.add('dot-active');
        currentSlide = index;
      }

      function nextSlide() {
        let next = (currentSlide + 1) % slides.length;
        showSlide(next);
      }

      function prevSlide() {
        let prev = (currentSlide - 1 + slides.length) % slides.length;
        showSlide(prev);
      }

      function startSlideshow() {
        if (slideInterval) clearInterval(slideInterval);
        slideInterval = setInterval(nextSlide, 3000);
      }

      function stopSlideshow() {
        if (slideInterval) {
          clearInterval(slideInterval);
          slideInterval = null;
        }
      }

      dots.forEach((dot, index) => {
        dot.addEventListener('click', function() {
          stopSlideshow();
          showSlide(index);
          startSlideshow();
        });
      });

      if (prevBtn) {
        prevBtn.addEventListener('click', function() {
          stopSlideshow();
          prevSlide();
          startSlideshow();
        });
      }

      if (nextBtn) {
        nextBtn.addEventListener('click', function() {
          stopSlideshow();
          nextSlide();
          startSlideshow();
        });
      }

      const container = document.querySelector('.card-image-container');
      if (container) {
        container.addEventListener('mouseenter', stopSlideshow);
        container.addEventListener('mouseleave', startSlideshow);
        container.addEventListener('mouseenter', function() {
          document.querySelector('.card-image-container .prev-btn').style.opacity = '1';
          document.querySelector('.card-image-container .next-btn').style.opacity = '1';
        });
        container.addEventListener('mouseleave', function() {
          document.querySelector('.card-image-container .prev-btn').style.opacity = '0';
          document.querySelector('.card-image-container .next-btn').style.opacity = '0';
        });
      }

      showSlide(0);
      startSlideshow();

      // --- Main Content Slideshow ---
      const mainSlides = document.querySelectorAll('.main-slide');
      const mainDots = document.querySelectorAll('.main-dot');
      const mainPrevBtn = document.querySelector('.main-prev-btn');
      const mainNextBtn = document.querySelector('.main-next-btn');
      let mainCurrentSlide = 0;
      let mainSlideInterval;

      function showMainSlide(index) {
        mainSlides.forEach(slide => slide.style.opacity = '0');
        mainDots.forEach(dot => dot.classList.remove('dot-active'));
        mainSlides[index].style.opacity = '1';
        mainDots[index].classList.add('dot-active');
        mainCurrentSlide = index;
      }

      function nextMainSlide() {
        let next = (mainCurrentSlide + 1) % mainSlides.length;
        showMainSlide(next);
      }

      function prevMainSlide() {
        let prev = (mainCurrentSlide - 1 + mainSlides.length) % mainSlides.length;
        showMainSlide(prev);
      }

      function startMainSlideshow() {
        if (mainSlideInterval) clearInterval(mainSlideInterval);
        mainSlideInterval = setInterval(nextMainSlide, 3000);
      }

      function stopMainSlideshow() {
        if (mainSlideInterval) {
          clearInterval(mainSlideInterval);
          mainSlideInterval = null;
        }
      }

      mainDots.forEach((dot, index) => {
        dot.addEventListener('click', function() {
          stopMainSlideshow();
          showMainSlide(index);
          startMainSlideshow();
        });
      });

      if (mainPrevBtn) {
        mainPrevBtn.addEventListener('click', function() {
          stopMainSlideshow();
          prevMainSlide();
          startMainSlideshow();
        });
      }

      if (mainNextBtn) {
        mainNextBtn.addEventListener('click', function() {
          stopMainSlideshow();
          nextMainSlide();
          startMainSlideshow();
        });
      }

      const mainContainer = document.querySelector('.main-slideshow-container');
      if (mainContainer) {
        mainContainer.addEventListener('mouseenter', stopMainSlideshow);
        mainContainer.addEventListener('mouseleave', startMainSlideshow);
        mainContainer.addEventListener('mouseenter', function() {
          document.querySelector('.main-prev-btn').style.opacity = '1';
          document.querySelector('.main-next-btn').style.opacity = '1';
        });
        mainContainer.addEventListener('mouseleave', function() {
          document.querySelector('.main-prev-btn').style.opacity = '0';
          document.querySelector('.main-next-btn').style.opacity = '0';
        });
      }

      showMainSlide(0);
      startMainSlideshow();

      // --- Right Column Slideshow ---
      const rightSlides = document.querySelectorAll('.right-slide');
      const rightDots = document.querySelectorAll('.right-dot');
      const rightPrevBtn = document.querySelector('.right-prev-btn');
      const rightNextBtn = document.querySelector('.right-next-btn');
      let rightCurrentSlide = 0;
      let rightSlideInterval;

      function showRightSlide(index) {
        rightSlides.forEach(slide => slide.style.opacity = '0');
        rightDots.forEach(dot => dot.classList.remove('dot-active'));
        rightSlides[index].style.opacity = '1';
        rightDots[index].classList.add('dot-active');
        rightCurrentSlide = index;
      }

      function nextRightSlide() {
        let next = (rightCurrentSlide + 1) % rightSlides.length;
        showRightSlide(next);
      }

      function prevRightSlide() {
        let prev = (rightCurrentSlide - 1 + rightSlides.length) % rightSlides.length;
        showRightSlide(prev);
      }

      function startRightSlideshow() {
        if (rightSlideInterval) clearInterval(rightSlideInterval);
        rightSlideInterval = setInterval(nextRightSlide, 3000);
      }

      function stopRightSlideshow() {
        if (rightSlideInterval) {
          clearInterval(rightSlideInterval);
          rightSlideInterval = null;
        }
      }

      rightDots.forEach((dot, index) => {
        dot.addEventListener('click', function() {
          stopRightSlideshow();
          showRightSlide(index);
          startRightSlideshow();
        });
      });

      if (rightPrevBtn) {
        rightPrevBtn.addEventListener('click', function() {
          stopRightSlideshow();
          prevRightSlide();
          startRightSlideshow();
        });
      }

      if (rightNextBtn) {
        rightNextBtn.addEventListener('click', function() {
          stopRightSlideshow();
          nextRightSlide();
          startRightSlideshow();
        });
      }

      const rightContainer = document.querySelector('.right-slideshow-container');
      if (rightContainer) {
        rightContainer.addEventListener('mouseenter', stopRightSlideshow);
        rightContainer.addEventListener('mouseleave', startRightSlideshow);
        rightContainer.addEventListener('mouseenter', function() {
          document.querySelector('.right-prev-btn').style.opacity = '1';
          document.querySelector('.right-next-btn').style.opacity = '1';
        });
        rightContainer.addEventListener('mouseleave', function() {
          document.querySelector('.right-prev-btn').style.opacity = '0';
          document.querySelector('.right-next-btn').style.opacity = '0';
        });
      }

      showRightSlide(0);
      startRightSlideshow();
    });

    // Navigation functions
    function returnToDashboard() {
      const parentDashboard = 'Deploy_Loggin_Dashboard.html';
      if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.href = parentDashboard + '?redirect=dashboard';
      } else {
        window.location.href = parentDashboard;
      }
    }

    function handleServiceClick(serviceName) {
      console.log("Service selected: " + serviceName);
    }

    // Update footer year
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('currentYear').textContent = new Date().getFullYear();
    });
  </script>

</body>
