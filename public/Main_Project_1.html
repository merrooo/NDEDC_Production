<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Company Profile · BTN-HEADER-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #ffffff; /* Deep solid modern black background */
      position: relative;
      overflow-x: hidden;
    }

    /* Sharp targeted background glows for subtle lighting */
    .ambient-glow-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, rgba(14, 165, 233, 0) 70%);
      top: -5%;
      right: -5%;
      z-index: 0;
      pointer-events: none;
    }

    .ambient-glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
      bottom: -5%;
      left: -5%;
      z-index: 0;
      pointer-events: none;
    }

    /* Solid Outer Panel */
    .glass-panel {
      background: #11131e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 70px -10px rgba(0, 0, 0, 0.7);
    }

    /* Modern Light Blue & White Card Variant */
    .glass-card {
      background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%); /* Premium white to light blue */
      border: 1px solid #e0f2fe;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 100%);
      transform: translateY(-2px);
      border-color: #bae6fd;
      box-shadow: 0 15px 35px rgba(14, 165, 233, 0.15);
    }

    /* Navigation button styling based on White & Light Blue Accents */
    .btn-nav-glass {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .btn-nav-glass:hover,
    .btn-nav-glass.active {
      background: rgba(14, 165, 233, 0.15);
      border-color: #38bdf8;
      color: #ffffff;
    }

    .btn-nav-primary {
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      color: #ffffff;
      border-radius: 8px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(14, 165, 233, 0.25);
      transition: all 0.2s ease;
    }

    .btn-nav-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 25px rgba(14, 165, 233, 0.4);
    }

    .industrial-badge {
      background: linear-gradient(90deg, #38bdf8 0%, #0284c7 100%);
      clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
    }
  </style>
</head>

<body class="p-4 md:p-8 flex items-center justify-center">

  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <div class="w-full max-w-6xl glass-panel rounded-2xl overflow-hidden flex flex-col justify-between min-h-[90vh] relative z-10">

    <header class="flex flex-wrap items-center justify-between gap-4 p-5 md:px-8 border-b border-white/5 bg-[#141724]">
      <div class="flex items-center gap-3 cursor-pointer">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-[#38bdf8] to-[#0284c7] flex items-center justify-center shadow-lg shadow-sky-500/10">
          <i class="fas fa-cubes text-lg text-white"></i>
        </div>
        <span class="text-xl font-bold text-white tracking-wide">BTN-HEADER-1</span>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <button class="btn-nav-glass px-4 py-2 text-xs font-semibold" onclick="returnToDashboard()"><i class="fas fa-home mr-1"></i>Loggin</button>
        <button class="btn-nav-glass px-4 py-2 text-xs font-semibold"><i class="fas fa-chart-pie mr-1"></i> BTN-HEADER-2</button>
        <button class="btn-nav-primary px-5 py-2 text-xs font-bold"><i class="fas fa-building mr-1"></i>BTN-HEADER-3</button>
      </div>

      <div class="text-white font-semibold text-xs bg-white/5 border border-white/10 px-4 py-2 rounded-lg flex items-center gap-2 shadow-sm">
        <i class="fas fa-phone-alt text-[#38bdf8]"></i> +123 4567-890
      </div>
    </header>

    <div class="relative w-full h-[160px] md:h-[200px] overflow-hidden flex items-center px-6 md:px-12 border-b border-white/5 bg-[#131622]">
      <div class="relative z-10">
        <span class="text-[10px] uppercase font-extrabold tracking-widest text-white industrial-badge px-5 py-1.5 rounded-l shadow-sm">SPAN-2</span>
        <h2 class="text-4xl md:text-5xl font-black text-white mt-3 mb-1 tracking-tight">H-2</h2>
        <p class="text-xs md:text-sm font-semibold text-[#38bdf8] uppercase tracking-wider">P-2</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 px-6 md:px-12 py-8 flex-grow bg-[#0f111a]">

      <div class="lg:col-span-2 flex flex-col justify-between gap-6 glass-card rounded-xl p-6 md:p-8 relative overflow-hidden">

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-center">
          <div class="md:col-span-12 space-y-4">
            <div class="flex items-center gap-3 flex-wrap">
              <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">BTN-HEADER-1 Solutions</h1>
              <span class="text-[10px] font-bold text-[#0284c7] border border-sky-300 bg-sky-100 px-2.5 py-0.5 rounded">Since 2012</span>
            </div>
            <div class="flex items-center gap-2 text-xs text-[#0284c7] font-bold uppercase tracking-wider">
              <i class="fas fa-bolt"></i>
              <span class="text-slate-700">SPAN-3</span>
            </div>
            <p class="text-slate-600 leading-relaxed text-xs md:text-sm font-normal">
              PARAGRAPH TEXT HERE.
            </p>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mt-6 pt-6 border-t border-sky-100">
          <div class="bg-white border border-sky-100 rounded-lg p-4 text-center hover:border-sky-300 transition-all shadow-sm">
            <div class="w-8 h-8 rounded-full bg-sky-50 flex items-center justify-center mx-auto mb-2">
              <i class="fas fa-users text-[#0284c7] text-xs"></i>
            </div>
            <div class="text-xs font-bold text-slate-800 uppercase tracking-wide">TITLE-7</div>
          </div>
          <div class="bg-white border border-sky-100 rounded-lg p-4 text-center hover:border-sky-300 transition-all shadow-sm">
            <div class="w-8 h-8 rounded-full bg-sky-50 flex items-center justify-center mx-auto mb-2">
              <i class="fas fa-globe text-[#0284c7] text-xs"></i>
            </div>
            <div class="text-xs font-bold text-slate-800 uppercase tracking-wide">TITLE-8</div>
          </div>
          <div class="bg-white border border-sky-100 rounded-lg p-4 text-center hover:border-sky-300 transition-all shadow-sm">
            <div class="w-8 h-8 rounded-full bg-sky-50 flex items-center justify-center mx-auto mb-2">
              <i class="fas fa-trophy text-[#0284c7] text-xs"></i>
            </div>
            <div class="text-xs font-bold text-slate-800 uppercase tracking-wide">TITLE-9</div>
          </div>
        </div>
      </div>

      <div class="glass-card rounded-xl p-6 flex flex-col justify-between gap-6">
        <div>
          <h3 class="text-xs uppercase font-extrabold tracking-wider text-[#0284c7] flex items-center gap-2 mb-3">
            <i class="fas fa-bullhorn"></i> TITLE-5
          </h3>
          <p class="text-slate-600 text-xs leading-relaxed">
            PARAGRAPH-5.
          </p>
          <div class="bg-sky-50 border-l-2 border-[#0284c7] rounded-r p-3.5 mt-4">
            <div class="text-xs font-bold text-slate-900 flex items-center gap-1.5 mb-1">
              <i class="fas fa-check-circle text-[#0284c7]"></i> TITLE-6
            </div>
            <p class="text-slate-600 text-[11px] leading-relaxed">
              PARAGRAPHE-6.
            </p>
          </div>
        </div>
        
        <div class="space-y-1 border-t border-sky-100 pt-4">
          <button onclick="handleServiceClick('Consulting Services')" class="w-full flex items-center justify-between text-xs font-medium text-slate-600 hover:text-[#0284c7] hover:bg-sky-50 p-2 rounded transition-all duration-200 text-left group">
            <span>Consulting Services</span>
            <i class="fas fa-chevron-right text-[#0284c7] text-[10px] opacity-0 transition-all duration-200 group-hover:opacity-100 group-hover:translate-x-0.5"></i>
          </button>
          <button onclick="handleServiceClick('Strategic Planning')" class="w-full flex items-center justify-between text-xs font-medium text-slate-600 hover:text-[#0284c7] hover:bg-sky-50 p-2 rounded transition-all duration-200 text-left group">
            <span>Strategic Planning</span>
            <i class="fas fa-chevron-right text-[#0284c7] text-[10px] opacity-0 transition-all duration-200 group-hover:opacity-100 group-hover:translate-x-0.5"></i>
          </button>
          <button onclick="handleServiceClick('Market Intelligence')" class="w-full flex items-center justify-between text-xs font-medium text-slate-600 hover:text-[#0284c7] hover:bg-sky-50 p-2 rounded transition-all duration-200 text-left group">
            <span>Market Intelligence</span>
            <i class="fas fa-chevron-right text-[#0284c7] text-[10px] opacity-0 transition-all duration-200 group-hover:opacity-100 group-hover:translate-x-0.5"></i>
          </button>
        </div>
      </div>

    </div>

    <footer class="flex flex-wrap items-center justify-between gap-3 px-6 md:px-8 py-4 bg-[#141724] border-t border-white/5 text-[11px] text-slate-400 font-medium">
      <div class="flex items-center gap-4">
        <span class="flex items-center gap-1.5"><i class="fas fa-check-circle text-emerald-500 text-xs"></i> TITLE-FOOTER-1</span>
        <span class="flex items-center gap-1.5"><i class="fas fa-map-pin text-[#38bdf8]"></i> TITLE-FOOTER-2</span>
      </div>
      <div class="flex items-center gap-1 bg-white/5 px-3 py-1 rounded border border-white/10 shadow-sm text-slate-200">
        <i class="fas fa-calendar-alt text-[#38bdf8]"></i> Sync Check: <span id="currentYear">2026</span>
      </div>
    </footer>

  </div>

  <script>
    function returnToDashboard() {
      const parentDashboard = 'Deploy_Loggin_Dashboard.html';
      if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.href = parentDashboard + '?redirect=dashboard';
      } else {
        window.location.href = parentDashboard;
      }
    }

    function handleServiceClick(serviceName) {
      console.log("Service selected: " + serviceName);
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('currentYear').textContent = new Date().getFullYear();
    });
  </script>
</body>

</html>
