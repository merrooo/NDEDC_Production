<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Data Joiner - Add Word to Column (Preserves Spaces)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-blue: #2563eb;
            --bg-light: #f8fafc;
            --card-white: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --success-green: #059669;
            --purple-accent: #7c3aed;
            --orange-accent: #ea580c;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            padding: 2rem 0;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card {
            background: var(--card-white);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            padding: 2rem;
            transition: all 0.2s ease;
        }

        .btn-home {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2563eb;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-home:hover {
            background: #1d4ed8;
            transform: translateX(-5px);
        }

        .btn-process {
            background-color: #059669;
            border: none;
            color: white;
            font-weight: 700;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn-process:hover {
            background-color: #047857;
            transform: translateY(-2px);
        }

        .btn-word-add {
            background-color: #ea580c;
            border: none;
            color: white;
            font-weight: 700;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn-word-add:hover {
            background-color: #c2410c;
            transform: translateY(-2px);
        }

        .btn-export {
            background-color: #7c3aed;
            border: none;
            color: white;
            font-weight: 700;
            padding: 0.8rem 2.5rem;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn-export:hover {
            background-color: #6d28d9;
            transform: translateY(-2px);
        }

        .input-group-text {
            font-size: 0.75rem;
            font-weight: 800;
            background: #f8fafc;
            min-width: 90px;
            color: var(--primary-blue);
        }

        .form-label-custom {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            color: #0f172a;
        }

        .radio-group {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 0.3rem;
        }

        .radio-group label {
            font-weight: normal;
            cursor: pointer;
            margin-left: 0.3rem;
            margin-right: 1rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid px-5">
        <div class="nav-header">
            <h2 class="fw-800 mb-0"><i class="fas fa-link me-2 text-primary"></i> Excel Data Joiner</h2>
            <a href="Control_Excel.html" class="btn-home"><i class="fas fa-home"></i> Return to Home</a>
        </div>

        <!-- MAIN JOIN CARD -->
        <div class="card mb-4">
            <h5 class="fw-bold mb-3"><i class="fas fa-code-branch me-2"></i> Core Join Operation (Prefix + Serial)</h5>
            <div class="row g-4">
                <div class="col-md-12">
                    <label class="fw-bold mb-2">1. Load Excel File</label>
                    <input type="file" id="excelInput" class="form-control" accept=".xlsx, .xls, .csv">
                </div>

                <div class="col-md-4">
                    <label class="fw-bold mb-2">Prefix (Column A / Fixed Text)</label>
                    <div class="input-group mb-2">
                        <span class="input-group-text">FIXED TEXT</span>
                        <input type="text" id="prefixText" class="form-control" placeholder="e.g. CLE2510">
                    </div>
                    <div class="input-group">
                        <span class="input-group-text">FROM COL</span>
                        <select id="colA" class="form-select" disabled>
                            <option>Select Column...</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="fw-bold mb-2">Serial (Column B)</label>
                    <div class="input-group" style="height: 80px;">
                        <span class="input-group-text">FROM COL</span>
                        <select id="colB" class="form-select" disabled>
                            <option>Select Column...</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="fw-bold mb-2">Target (Output Column)</label>
                    <div class="input-group mb-2">
                        <span class="input-group-text">NEW NAME</span>
                        <input type="text" id="targetText" class="form-control" placeholder="Type new header...">
                    </div>
                    <div class="input-group">
                        <span class="input-group-text">UPDATE COL</span>
                        <select id="targetCol" class="form-select" disabled>
                            <option>Select Column...</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-center d-flex justify-content-center gap-3 flex-wrap">
                <button class="btn btn-process" id="processBtn" onclick="processData()" disabled>
                    <i class="fas fa-magic me-2"></i> Join Data
                </button>
                <button class="btn btn-export" id="exportBtn" onclick="triggerExport()" disabled>
                    <i class="fas fa-file-excel me-2"></i> Export to Excel
                </button>
            </div>
        </div>

        <!-- CARD: ADD WORD TO COLUMN - PRESERVES SPACES (No message box) -->
        <div class="card mb-4">
            <h5 class="fw-bold mb-3"><i class="fas fa-i-cursor me-2" style="color:#ea580c;"></i> Add Word to Cell Content <span class="badge bg-warning text-dark ms-2"></span></h5>
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label-custom">Select Column to Update</label>
                    <select id="wordColumnSelect" class="form-select" disabled>
                        <option value="">-- Choose Column --</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label-custom">Word / Text to Insert</label>
                    <input type="text" id="wordToAdd" class="form-control" placeholder="e.g., NEW, FINAL, 'Hello ' (with space)">
                </div>
                <div class="col-md-3">
                    <label class="form-label-custom">Position</label>
                    <div class="radio-group">
                        <input type="radio" name="position" id="posLeft" value="left" checked>
                        <label for="posLeft"><i class="fas fa-arrow-left"></i> Left (Prefix)</label>
                        <input type="radio" name="position" id="posRight" value="right">
                        <label for="posRight"><i class="fas fa-arrow-right"></i> Right (Suffix)</label>
                    </div>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-word-add w-100" id="applyWordBtn" onclick="addWordToColumn()" disabled>
                        <i class="fas fa-pen-alt me-2"></i> Update Column (In-Place)
                    </button>
                </div>
            </div>
        </div>

        <!-- DATA PREVIEW -->
        <div class="card">
            <h5 class="fw-bold mb-3">Data Preview</h5>
            <table id="previewTable" class="table table-hover w-100"><table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

    <script>
        let excelData = [];
        let tableInstance = null;

        function superClean(val) {
            if (val === undefined || val === null || val === "") return "";
            let s = String(val);
            s = s.replace(/[\u200B-\u200D\uFEFF]/g, "");
            if (typeof val === 'number' && val > 1e14) return val.toFixed(0);
            return s;
        }

        function getCellValue(row, colName) {
            if (!colName) return "";
            let val = row[colName];
            if (val === undefined || val === null) return "";
            return superClean(val);
        }

        function updateWordColumnDropdown() {
            const select = document.getElementById('wordColumnSelect');
            if (!excelData.length) {
                select.innerHTML = '<option value="">-- No Data --</option>';
                select.disabled = true;
                document.getElementById('applyWordBtn').disabled = true;
                return;
            }
            const headers = Object.keys(excelData[0]);
            select.innerHTML = '<option value="">-- Choose Column --</option>';
            headers.forEach(h => {
                select.innerHTML += `<option value="${h.replace(/"/g, '&quot;')}">${h}</option>`;
            });
            select.disabled = false;
            
            const applyBtn = document.getElementById('applyWordBtn');
            const wordInput = document.getElementById('wordToAdd').value;
            if (select.value && wordInput !== undefined && excelData.length) {
                applyBtn.disabled = false;
            } else {
                applyBtn.disabled = true;
            }
        }

        function renderTable(data) {
            if (!data || data.length === 0) {
                if ($.fn.DataTable.isDataTable('#previewTable')) $('#previewTable').DataTable().destroy();
                $('#previewTable').empty();
                $('#previewTable').html('<tr><td colspan="10" class="text-center">No data to display</td></tr>');
                return;
            }
            
            if ($.fn.DataTable.isDataTable('#previewTable')) {
                $('#previewTable').DataTable().destroy();
            }
            $('#previewTable').empty();

            const columnsDef = Object.keys(data[0]).map(k => ({ title: k, data: k }));
            tableInstance = $('#previewTable').DataTable({
                data: data,
                columns: columnsDef,
                scrollX: true,
                dom: 'Bfrtip',
                buttons: [{
                    extend: 'excelHtml5',
                    title: 'Excel_Data_Export',
                    className: 'd-none',
                    exportOptions: {
                        format: {
                            body: function (v) {
                                if (typeof v === 'string' && /^\d{15,}$/.test(v)) return '\u200C' + v;
                                return v;
                            }
                        }
                    }
                }]
            });
        }

        function refreshJoinSelects() {
            if (!excelData.length) return;
            const headers = Object.keys(excelData[0]);
            const selects = [document.getElementById('colA'), document.getElementById('colB'), document.getElementById('targetCol')];
            selects.forEach(sel => {
                const currentVal = sel.value;
                sel.innerHTML = '<option value="">-- Choose Column --</option>';
                headers.forEach(h => sel.innerHTML += `<option value="${h}">${h}</option>`);
                if (currentVal && headers.includes(currentVal)) sel.value = currentVal;
                sel.disabled = false;
            });
        }

        document.getElementById('excelInput').onchange = function (e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                
                if (json.length > 0) {
                    excelData = json.map(row => {
                        const newRow = {};
                        Object.keys(row).forEach(key => {
                            let val = row[key];
                            if (val === undefined || val === null) {
                                newRow[key] = "";
                            } else if (typeof val === 'string') {
                                newRow[key] = val.replace(/[\u200B-\u200D\uFEFF]/g, "");
                            } else if (typeof val === 'number' && val > 1e14) {
                                newRow[key] = val.toFixed(0);
                            } else {
                                newRow[key] = val;
                            }
                        });
                        return newRow;
                    });
                    
                    refreshJoinSelects();
                    document.getElementById('processBtn').disabled = false;
                    updateWordColumnDropdown();
                    renderTable(excelData);
                    document.getElementById('exportBtn').disabled = false;
                } else {
                    alert("File is empty or not properly formatted.");
                }
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        function processData() {
            if (!excelData.length) {
                alert("Please load an Excel file first.");
                return;
            }
            
            const prefixTxt = document.getElementById('prefixText').value;
            const prefixCol = document.getElementById('colA').value;
            const serialCol = document.getElementById('colB').value;
            const targetTxt = document.getElementById('targetText').value.trim();
            const targetCol = document.getElementById('targetCol').value;

            if (!serialCol) { 
                alert("Please select a Serial Column (B)."); 
                return; 
            }
            
            let finalTargetName = targetTxt !== "" ? targetTxt : targetCol;
            if (!finalTargetName) { 
                alert("Please define a Target Name."); 
                return; 
            }

            const existingHeaders = Object.keys(excelData[0]);
            if (existingHeaders.includes(finalTargetName)) {
                if (!confirm(`Column "${finalTargetName}" already exists. Overwrite?`)) {
                    return;
                }
            }

            excelData = excelData.map(row => {
                let prefixValue = "";
                if (prefixTxt !== "") {
                    prefixValue = prefixTxt;
                } else if (prefixCol) {
                    prefixValue = getCellValue(row, prefixCol);
                } else {
                    prefixValue = "";
                }
                
                let serialValue = getCellValue(row, serialCol);
                let suffix = "";
                if (serialValue.length > 1) {
                    suffix = serialValue.substring(1);
                } else if (serialValue.length === 1) {
                    suffix = "";
                } else {
                    suffix = "";
                }
                
                let joinedResult = prefixValue + "38" + suffix;
                row[finalTargetName] = joinedResult;
                return row;
            });

            renderTable(excelData);
            refreshJoinSelects();
            updateWordColumnDropdown();
            alert(`Join complete! Column "${finalTargetName}" created/updated.`);
        }

        function addWordToColumn() {
            if (!excelData.length) {
                alert("Please load an Excel file first.");
                return;
            }
            
            const selectedColumn = document.getElementById('wordColumnSelect').value;
            let wordToInsert = document.getElementById('wordToAdd').value;
            const positionLeft = document.getElementById('posLeft').checked;
            
            if (!selectedColumn) {
                alert("Please select a column to update.");
                return;
            }
            
            if (wordToInsert === "") {
                alert("Please enter a word or text to add. You can use spaces.");
                return;
            }
            
            if (!excelData[0].hasOwnProperty(selectedColumn)) {
                alert(`Column "${selectedColumn}" not found.`);
                return;
            }
            
            let sampleOld = excelData.length > 0 ? getCellValue(excelData[0], selectedColumn) : "";
            let sampleNew = "";
            if (positionLeft) {
                sampleNew = wordToInsert + sampleOld;
            } else {
                sampleNew = sampleOld + wordToInsert;
            }
            
            const confirmMsg = `WARNING: This will update column "${selectedColumn}" by adding:\n\n` +
                `[${wordToInsert}]\n\nto the ${positionLeft ? 'LEFT' : 'RIGHT'} of every cell.\n\n` +
                `Preview (first row):\nOriginal: "${sampleOld}"\nNew:      "${sampleNew}"\n\n` +
                `Continue?`;
            
            if (!confirm(confirmMsg)) {
                return;
            }
            
            let emptyCellsCount = 0;
            let modifiedCount = 0;
            
            excelData = excelData.map(row => {
                let originalValue = getCellValue(row, selectedColumn);
                let modifiedValue = "";
                
                if (originalValue === "") {
                    emptyCellsCount++;
                    modifiedValue = wordToInsert;
                } else {
                    if (positionLeft) {
                        modifiedValue = wordToInsert + originalValue;
                    } else {
                        modifiedValue = originalValue + wordToInsert;
                    }
                    modifiedCount++;
                }
                
                row[selectedColumn] = modifiedValue;
                return row;
            });
            
            renderTable(excelData);
            refreshJoinSelects();
            updateWordColumnDropdown();
            
            let positionText = positionLeft ? "LEFT" : "RIGHT";
            let details = `Added "${wordToInsert}" to the ${positionText} of ${modifiedCount} non-empty cells.`;
            if (emptyCellsCount > 0) {
                details += ` ${emptyCellsCount} empty cells were set to "${wordToInsert}".`;
            }
            alert(`Success! Column "${selectedColumn}" updated.\n\n${details}`);
        }
        
        function triggerExport() {
            if (!excelData.length) {
                alert("No data to export.");
                return;
            }
            if (typeof $('.buttons-excel').click === 'function') {
                $('.buttons-excel').click();
            } else {
                try {
                    const ws = XLSX.utils.json_to_sheet(excelData);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
                    XLSX.writeFile(wb, `excel_export_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
                    alert("Export completed.");
                } catch(e) {
                    alert("Export failed: " + e.message);
                }
            }
        }
        
        function updateApplyButtonState() {
            const applyBtn = document.getElementById('applyWordBtn');
            const columnSelect = document.getElementById('wordColumnSelect');
            const wordInput = document.getElementById('wordToAdd');
            if (columnSelect.value && wordInput.value !== undefined && excelData.length) {
                applyBtn.disabled = false;
            } else {
                applyBtn.disabled = true;
            }
        }
        
        document.getElementById('wordColumnSelect').addEventListener('change', updateApplyButtonState);
        document.getElementById('wordToAdd').addEventListener('input', updateApplyButtonState);
        
        document.getElementById('exportBtn').disabled = true;
    </script>
</body>
</html>
