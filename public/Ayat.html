<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title> تسجيل فحص بيانات عداد المعمل الهندسي </title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #f0f7f4;
      padding: 20px;
      transition: all 0.3s ease;
    }

    body.dark-mode {
      background: #0f172a;
    }

    /* Main Layout */
    .main-wrapper {
      display: flex;
      gap: 24px;
      max-width: 1800px;
      margin: 0 auto;
      align-items: flex-start;
    }

    /* Cards */
    .entry-card {
      flex: 1.5;
      background: white;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      transition: all 0.3s;
    }

    .left-sidebar-panel {
      width: 620px;
      background: white;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      position: sticky;
      top: 20px;
      transition: all 0.3s;
    }

    body.dark-mode .entry-card,
    body.dark-mode .left-sidebar-panel {
      background: #1e293b;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    /* Headers */
    .entry-card h2 {
      text-align: center;
      margin-bottom: 24px;
      font-weight: 800;
      font-size: 1.6rem;
      background: linear-gradient(135deg, #0f766e, #0d9488);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    body.dark-mode .entry-card h2 {
      background: linear-gradient(135deg, #5ee0da, #38bdf8);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .left-sidebar-panel h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0f766e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e2e8f0;
    }

    body.dark-mode .left-sidebar-panel h3 {
      color: #5ee0da;
      border-bottom-color: #334155;
    }

    /* Header Actions */
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
      background: #f8fafc;
      padding: 12px 20px;
      border-radius: 60px;
    }

    body.dark-mode .header-actions {
      background: #0f172a;
    }

    /* Dark Toggle */
    .dark-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #e2e8f0;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }

    body.dark-mode .dark-toggle {
      background: #334155;
    }

    .switch {
      width: 44px;
      height: 22px;
      background: #cbd5e1;
      border-radius: 30px;
      position: relative;
      transition: 0.2s;
    }

    body.dark-mode .switch {
      background: #0ea5e9;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 3px;
      transition: 0.2s;
    }

    body.dark-mode .switch::after {
      transform: translateX(20px);
    }

    /* Buttons */
    button {
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      padding: 10px 20px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      transition: all 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(0.97);
    }

    .btn-save {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-view {
      background: linear-gradient(135deg, #0f766e, #0d9488);
      color: white;
    }

    .btn-excel {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .btn-refresh {
      background: #e2e8f0;
      color: #475569;
    }

    body.dark-mode .btn-refresh {
      background: #334155;
      color: #cbd5e1;
    }

    .btn-clear-filters {
      background: #fee2e2;
      color: #dc2626;
    }

    body.dark-mode .btn-clear-filters {
      background: #7f1d1d;
      color: #fecaca;
    }

    .btn-pagination {
      background: #e2e8f0;
      color: #0f766e;
    }

    body.dark-mode .btn-pagination {
      background: #334155;
      color: #5ee0da;
    }

    .btn-update-sidebar {
      background: linear-gradient(135deg, #0f766e, #0d9488);
      color: white;
      padding: 6px 16px;
      font-size: 0.75rem;
    }

    .btn-edit {
      background: #fef3c7;
      color: #d97706;
      padding: 5px 12px;
      font-size: 0.7rem;
    }

    body.dark-mode .btn-edit {
      background: #78350f;
      color: #fbbf24;
    }

    .btn-del {
      background: #fee2e2;
      color: #dc2626;
      padding: 5px 12px;
      font-size: 0.7rem;
    }

    body.dark-mode .btn-del {
      background: #7f1d1d;
      color: #fecaca;
    }

    .btn-clear-notes-filter {
      background: #e2e8f0;
      color: #475569;
      padding: 8px 14px;
      font-size: 0.7rem;
    }

    body.dark-mode .btn-clear-notes-filter {
      background: #334155;
      color: #cbd5e1;
    }

    /* Form Grid */
    .inputs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .input-with-label {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-with-label label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #0f766e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    body.dark-mode .input-with-label label {
      color: #5ee0da;
    }

    .input-with-label input,
    .input-with-label select,
    .input-with-label textarea,
    .filter-select,
    .filter-input,
    .sidebar-search,
    .sidebar-filter-select {
      width: 100%;
      padding: 10px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      transition: all 0.2s;
      outline: none;
    }

    body.dark-mode .input-with-label input,
    body.dark-mode .input-with-label select,
    body.dark-mode .input-with-label textarea,
    body.dark-mode .filter-select,
    body.dark-mode .filter-input,
    body.dark-mode .sidebar-search,
    body.dark-mode .sidebar-filter-select {
      background: #0f172a;
      border-color: #334155;
      color: #e2e8f0;
    }

    .input-with-label input:focus,
    .input-with-label select:focus,
    .input-with-label textarea:focus {
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
    }

    .full-width-container {
      grid-column: 1 / -1;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    /* Sidebar */
    .sidebar-filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .sidebar-search {
      flex: 2;
    }

    .sidebar-filter-select {
      flex: 1.2;
    }

    .sidebar-table-container {
      overflow-x: auto;
      max-height: 55vh;
      overflow-y: auto;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
    }

    body.dark-mode .sidebar-table-container {
      border-color: #334155;
    }

    #sidebarTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    #sidebarTable th {
      background: #f8fafc;
      padding: 12px;
      position: sticky;
      top: 0;
      font-weight: 700;
      color: #0f766e;
    }

    body.dark-mode #sidebarTable th {
      background: #0f172a;
      color: #5ee0da;
    }

    #sidebarTable td {
      padding: 10px 12px;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
    }

    body.dark-mode #sidebarTable td {
      border-bottom-color: #334155;
    }

    #sidebarTable tbody tr {
      cursor: pointer;
      transition: 0.2s;
    }

    #sidebarTable tbody tr:hover {
      background: #f1f5f9;
    }

    body.dark-mode #sidebarTable tbody tr:hover {
      background: #1e293b;
    }

    /* Modal Table */
    .data-modal-container {
      width: 100%;
    }

    .table-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }

    .table-container {
      overflow-x: auto;
      max-height: 60vh;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
    }

    body.dark-mode .table-container {
      border-color: #334155;
    }

    #dataTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      min-width: 1300px;
    }

    #dataTable th {
      background: #f8fafc;
      padding: 12px 10px;
      font-weight: 700;
      color: #0f766e;
      position: sticky;
      top: 0;
      border-bottom: 2px solid #e2e8f0;
    }

    body.dark-mode #dataTable th {
      background: #0f172a;
      color: #5ee0da;
      border-bottom-color: #334155;
    }

    #dataTable td {
      padding: 10px 10px;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
    }

    body.dark-mode #dataTable td {
      border-bottom-color: #334155;
    }

    #dataTable tbody tr:hover td {
      background: #f8fafc;
    }

    body.dark-mode #dataTable tbody tr:hover td {
      background: #1e293b;
    }

    .filter-row th {
      background: #ffffff !important;
      padding: 10px 6px !important;
    }

    body.dark-mode .filter-row th {
      background: #1e293b !important;
    }

    .filter-row th input,
    .filter-row th select {
      width: 100%;
      padding: 6px 8px;
      font-size: 0.7rem;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      background: white;
    }

    body.dark-mode .filter-row th input,
    body.dark-mode .filter-row th select {
      background: #0f172a;
      border-color: #334155;
      color: #e2e8f0;
    }

    .date-filter-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Pagination */
    .pagination-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 24px;
      padding: 16px 0;
    }

    .page-info {
      font-weight: 600;
      font-size: 0.85rem;
      background: #e2e8f0;
      padding: 6px 18px;
      border-radius: 40px;
      color: #0f766e;
    }

    body.dark-mode .page-info {
      background: #334155;
      color: #5ee0da;
    }

    /* Form Actions */
    .form-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 10px;
    }

    /* Stats */
    .stats-bar {
      background: #e6f7f5;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #0f766e;
      text-align: center;
    }

    body.dark-mode .stats-bar {
      background: #0f172a;
      color: #5ee0da;
    }

    /* SweetAlert */
    .swal-large-popup {
      width: 95% !important;
      max-width: 1550px !important;
      border-radius: 32px !important;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .main-wrapper {
        flex-direction: column;
      }

      .left-sidebar-panel {
        width: 100%;
        position: static;
      }

      .inputs-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .inputs-grid {
        grid-template-columns: 1fr;
      }

      .header-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .table-controls {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>

<body>

  <div class="main-wrapper">
    <!-- Main Form Panel -->
    <div class="entry-card">
      <h2> تسجيل بيانات عداد - التلاعبات</h2>

      <div class="header-actions">
        <label class="dark-toggle" onclick="document.body.classList.toggle('dark-mode')">
          <span>🌙</span>
          <div class="switch"></div>
          <span>☀️</span>
        </label>
        <button class="btn-view" onclick="window.location.href='index.html'">⬅️ الرئيسية</button>
        <button class="btn-excel" onclick="window.promptPassword()">📥 رفع Excel</button>
        <div style="min-width: 170px;">
          <input type="date" id="enter_date"
            style="padding: 8px 12px; border-radius: 40px; border: 1.5px solid #e2e8f0; width: 100%; background: white;" />
        </div>
      </div>

      <div class="inputs-grid">
        <div class="input-with-label"><label>📍 القطاع</label><select id="keta3">
            <option value="">اختر القطاع</option>
            <option>دمياط</option>
            <option>شمال الدقهلية</option>
            <option>جنوب الدقهلية</option>
            <option>كفر الشيخ</option>
          </select></div>
        <div class="input-with-label"><label>🏗️ الهندسة</label><select id="handsa">
            <option value="">اختر الهندسة</option>
          </select></div>
        <div class="input-with-label"><label>📋 نوع النشاط</label><select id="nashattype"
            onchange="window.checkNewOption(this)">
            <option value="">اختر نوع النشاط</option>
            <option>منزلي</option>
            <option>تجاري</option>
            <option>قوى محركة</option>
            <option>كودي مخالف</option>
            <option>ري</option>
            <option>مزارع</option>
            <option>مساجد</option>
            <option>استثمار صناعة</option>
            <option>كبار</option>
            <option>مصالح حكومية</option>
            <option>مصالح حكوميه اخري</option>
            <option value="ADD_NEW" style="color:#10b981;">➕ إضافة جديد</option>
          </select></div>
        <div class="input-with-label"><label>⚙️ نوع العداد</label><select id="mtype"
            onchange="window.checkNewOption(this)">
            <option value="">اختر نوع العداد</option>
            <option>سويدى ثلاثى مباشر</option>
            <option>سويدي احادي</option>
            <option>اسكرا احادي</option>
            <option>المصريه احادي</option>
            <option>جلوبال ثلاثى مباشر</option>
            <option>جلوبال احادي</option>
            <option>جلوبال ثلاثى غير مباشر</option>
            <option value="ADD_NEW" style="color:#10b981;">➕ إضافة جديد</option>
          </select></div>
        <div class="input-with-label"><label>🔢 رقم العداد</label><input id="mno" placeholder="رقم العداد" />
        </div>
        <div class="input-with-label"><label>📅 تاريخ الفحص</label><input type="date" id="calib_date" /></div>
        <div class="input-with-label"><label>👤 اسم المشترك</label><input id="mname" placeholder="اسم المشترك" /></div>
        <div class="input-with-label"><label>🆔 كود المشترك</label><input id="mco" placeholder="كود المشترك" />
        </div>
        <div class="input-with-label"><label>🎯 نتيجة الفحص</label><select id="munip"
            onchange="window.checkNewOption(this)">
            <option value="">اختر نتيجة الفحص</option>
            <option>تلاعب</option>
            <option>سليم</option>
            <option>مديونية</option>
            <option>تكهين</option>
            <option>تالف</option>
            <option>محترق</option>
            <option>صيانة</option>
            <option>عاطل</option>
            <option value="ADD_NEW" style="color:#10b981;">➕ إضافة جديد</option>
          </select></div>
        <div class="input-with-label full-width-container"><label>📝 ملاحظات الفحص</label><textarea id="notes"
            placeholder="ملاحظات الفحص"></textarea></div>
      </div>

      <div class="form-actions">
        <button class="btn-save" id="saveBtn" onclick="window.quickSave()">💾 حفظ البيانات</button>
        <button class="btn-view" onclick="window.showData()">👁 عرض الجدول الرئيسي</button>
      </div>
    </div>

    <!-- Sidebar - المعمل -->
    <div class="left-sidebar-panel">
      <h3>
        📥 العدادات المستلمة بالمعمل
        <button class="btn-update-sidebar" onclick="window.refreshAyatEnterData()">🔄 تحديث</button>
      </h3>
      <div class="sidebar-filter-row">
        <input type="text" id="sidebarSearchInput" class="sidebar-search" placeholder="🔍 ابحث برقم العداد" />
        <select id="sidebarNotesFilter" class="sidebar-filter-select">
          <option value="">كل الملاحظات</option>
        </select>
        <button class="btn-clear-notes-filter" onclick="window.clearSidebarNotesFilter()">🗑️ مسح</button>
      </div>
      <div class="sidebar-table-container">
        <table id="sidebarTable">
          <thead>
            <tr>
              <th>رقم العداد</th>
              <th>ملاحظات</th>
            </tr>
          </thead>
          <tbody id="sidebarTableBody">
            <tr>
              <td colspan="2" style="text-align:center; padding:30px;">جاري التحميل...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Template for main table modal -->
  <template id="tableTemplate">
    <div dir="rtl" class="data-modal-container">
      <div class="table-controls">
        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
          <span class="stats-bar">📊 إجمالي السجلات: <b id="rowCount"
              style="color:#0d9488; font-size:1.1rem;">0</b></span>
          <select id="duplicateReferenceSelect" onchange="window.setDuplicateReferenceMode(this.value)"
            style="padding: 6px 12px; border-radius: 40px; border: 1.5px solid #e2e8f0; background: white;">
            <option value="metercode">حسب كود المشترك</option>
            <option value="meternumber">حسب رقم العداد</option>
          </select>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button class="btn-excel" onclick="window.exportExcel()">📊 تصدير Excel</button>
          <button class="btn-refresh" onclick="window.loadDataForModal()">🔄 تحديث الجدول</button>
          <button class="btn-clear-filters" onclick="window.clearFilters()">❌ مسح الفلاتر</button>
        </div>
      </div>
      <div class="table-container">
        <table id="dataTable">
          <thead>
            <tr>
              <th>م</th>
              <th>القطاع</th>
              <th>الهندسة</th>
              <th>تاريخ الفحص</th>
              <th>تاريخ التسجيل</th>
              <th>اسم المشترك</th>
              <th>كود المشترك</th>
              <th>النشاط</th>
              <th>نوع العداد</th>
              <th>رقم العداد</th>
              <th>نتيجة الفحص</th>
              <th>ملاحظات</th>
              <th>إجراء</th>
            </tr>
            <tr class="filter-row">
              <th>-</th>
              <th><select id="f0" class="filter-select" onchange="window.filterTable()">
                  <option value="">الكل</option>
                  <option>دمياط</option>
                  <option>شمال الدقهلية</option>
                  <option>جنوب الدقهلية</option>
                  <option>كفر الشيخ</option>
                </select></th>
              <th><select id="f1" class="filter-select" onchange="window.filterTable()">
                  <option value="">الكل</option>
                </select></th>
              <th>
                <div class="date-filter-container"><input type="date" id="f2" placeholder="من"
                    onchange="window.filterTable()" /><input type="date" id="f3" placeholder="إلى"
                    onchange="window.filterTable()" /></div>
              </th>
              <th>
                <div class="date-filter-container"><input type="date" id="f11" placeholder="من"
                    onchange="window.filterTable()" /><input type="date" id="f12" placeholder="إلى"
                    onchange="window.filterTable()" /></div>
              </th>
              <th><input type="text" id="f4" placeholder="🔍" oninput="window.filterTable()" /></th>
              <th><input type="text" id="f5" placeholder="🔍" oninput="window.filterTable()" /></th>
              <th><input type="text" id="f6" placeholder="🔍" oninput="window.filterTable()" /></th>
              <th><input type="text" id="f7" placeholder="🔍" oninput="window.filterTable()" /></th>
              <th><input type="text" id="f8" placeholder="🔍" oninput="window.filterTable()" /></th>
              <th><input type="text" id="f9" placeholder="🔍" oninput="window.filterTable()" /></th>
              <th><input type="text" id="f10" placeholder="🔍" oninput="window.filterTable()" /></th>
              <th>-</th>
            </tr>
          </thead>
          <tbody id="modalBody"></tbody>
        </table>
      </div>
      <div class="pagination-controls">
        <button id="prevBtn" class="btn-pagination" onclick="window.prevPage()" disabled>⬅️ السابق</button>
        <span id="pageInfo" class="page-info">الصفحة 1 من 1</span>
        <button id="nextBtn" class="btn-pagination" onclick="window.nextPage()">التالي ➡️</button>
      </div>
    </div>
  </template>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAnKRhT5xJTBvsQKpW7e9w-hGSbAQJWTSo",
      authDomain: "production1-ae85.firebaseapp.com",
      projectId: "production1-ae85",
      storageBucket: "production1-ae85.firebasestorage.app",
      messagingSenderId: "490438031865",
      appId: "1:490438031865:web:a4a69335989f30cd13a528"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allData = [], filteredData = [], ayatEnterData = [];
    let currentPage = 1, currentEditIndex = null;
    const ITEMS_PER_PAGE = 20;

    function cleanNumber(v) { return v ? String(v).replace(/\D/g, '').trim() : ""; }
    function normalizeCode(v) { return v ? String(v).replace(/\s/g, '').trim() : ""; }
    function escapeHtml(s) { if (!s) return ""; return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function formatDate(d) { if (!d) return "—"; try { let dt = new Date(d); if (!isNaN(dt)) return `${String(dt.getDate()).padStart(2, '0')}-${String(dt.getMonth() + 1).padStart(2, '0')}-${dt.getFullYear()}`; } catch (e) { } return d; }

    // Save dark mode preference
    if (localStorage.getItem('darkMode') === 'enabled') {
      document.body.classList.add('dark-mode');
    }

    document.querySelector('.dark-toggle')?.addEventListener('click', () => {
      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('darkMode', 'disabled');
      } else {
        localStorage.setItem('darkMode', 'enabled');
      }
    });

    // ========== SIDEBAR ==========
    async function loadAyatEnter() {
      try {
        const snap = await get(ref(db, 'Ayat_Enter'));
        ayatEnterData = [];
        if (snap.exists()) {
          const data = snap.val();
          Object.keys(data).forEach(k => { if (data[k]) ayatEnterData.push(data[k]); });
          ayatEnterData.sort((a, b) => (b.enter_date || '').localeCompare(a.enter_date || ''));
        }
        updateNotesDropdown();
        applySidebarFilter();
      } catch (e) { console.error(e); }
    }

    window.refreshAyatEnterData = async () => {
      Swal.fire({ title: 'تحديث...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      await loadAyatEnter();
      Swal.close();
      Swal.fire({ icon: 'success', title: 'تم التحديث', toast: true, timer: 1800, showConfirmButton: false });
    };

    function updateNotesDropdown() {
      let dropdown = document.getElementById("sidebarNotesFilter");
      if (!dropdown) return;
      let notes = new Set();
      ayatEnterData.forEach(i => { if (i.notes?.trim()) notes.add(i.notes.trim()); });
      dropdown.innerHTML = '<option value="">كل الملاحظات</option>' + Array.from(notes).sort().map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
    }

    function applySidebarFilter() {
      let filtered = [...ayatEnterData];
      let search = document.getElementById("sidebarSearchInput")?.value.trim().toLowerCase() || "";
      if (search) filtered = filtered.filter(i => String(i.mno || "").toLowerCase().includes(search));
      let note = document.getElementById("sidebarNotesFilter")?.value || "";
      if (note) filtered = filtered.filter(i => (i.notes || "") === note);
      renderSidebar(filtered);
    }

    function renderSidebar(items) {
      let tbody = document.getElementById("sidebarTableBody");
      if (!tbody) return;
      if (items.length === 0) { tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding:25px;">📭 لا توجد بيانات</td></tr>'; return; }
      tbody.innerHTML = items.map(i => `<tr onclick="window.fillForm('${escapeHtml(i.mno || '')}')"><td><strong>${escapeHtml(i.mno || '—')}</strong></td><td style="color:#0d9488;">${escapeHtml(i.notes || '—')}</td></tr>`).join('');
    }

    window.fillForm = (mno) => {
      let rec = ayatEnterData.find(r => r.mno === mno);
      if (rec) {
        document.getElementById("mno").value = rec.mno || "";
        if (rec.keta3) document.getElementById("keta3").value = rec.keta3;
        if (rec.handsa) document.getElementById("handsa").value = rec.handsa;
        if (rec.nashattype) document.getElementById("nashattype").value = rec.nashattype;
        if (rec.mtype) document.getElementById("mtype").value = rec.mtype;
        Swal.fire({ toast: true, icon: 'success', title: 'تم جلب البيانات', timer: 1800, showConfirmButton: false });
      }
    };

    window.clearSidebarNotesFilter = () => {
      document.getElementById("sidebarNotesFilter").value = "";
      document.getElementById("sidebarSearchInput").value = "";
      applySidebarFilter();
    };

    document.getElementById("sidebarSearchInput")?.addEventListener("input", () => applySidebarFilter());
    document.getElementById("sidebarNotesFilter")?.addEventListener("change", () => applySidebarFilter());

    // ========== SAVE ==========
    window.quickSave = async () => {
      let record = {
        keta3: document.getElementById("keta3").value,
        handsa: document.getElementById("handsa").value,
        calibrationdate: document.getElementById("calib_date").value,
        enterdate: document.getElementById("enter_date").value,
        metername: document.getElementById("mname").value.trim(),
        metercode: normalizeCode(document.getElementById("mco").value),
        nashattype: document.getElementById("nashattype").value,
        metertype: document.getElementById("mtype").value,
        meternumber: cleanNumber(document.getElementById("mno").value),
        result: document.getElementById("munip").value,
        notes: document.getElementById("notes").value.trim()
      };
      if (!record.meternumber || !record.keta3 || !record.handsa || !record.result) {
        return Swal.fire("تنبيه", "يرجى ملء الحقول الأساسية", "warning");
      }
      let btn = document.getElementById("saveBtn");
      if (btn) btn.disabled = true;
      try {
        let snap = await get(ref(db, "Ayat/meterdata"));
        let list = snap.exists() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())) : [];
        if (currentEditIndex !== null) {
          list[currentEditIndex] = record;
          await set(ref(db, "Ayat/meterdata"), list);
          Swal.fire("تم التحديث", "", "success");
          currentEditIndex = null;
        } else {
          list.push(record);
          await set(ref(db, "Ayat/meterdata"), list);
          Swal.fire("تم الحفظ", "", "success");
        }
        document.getElementById("saveBtn").innerHTML = "💾 حفظ البيانات";
        ["keta3", "handsa", "calib_date", "mname", "mco", "nashattype", "mtype", "mno", "munip", "notes"].forEach(id => {
          if (document.getElementById(id)) document.getElementById(id).value = "";
        });
        document.getElementById("enter_date").value = new Date().toISOString().split('T')[0];
        await loadAyatEnter();
      } catch (e) { Swal.fire("خطأ", "فشل الحفظ", "error"); }
      finally { if (btn) btn.disabled = false; }
    };

    window.checkNewOption = async (selectEl) => {
      if (selectEl.value === "ADD_NEW") {
        let { value: newVal } = await Swal.fire({ title: "إضافة خيار جديد", input: "text", showCancelButton: true });
        if (newVal && newVal.trim()) {
          selectEl.add(new Option(newVal.trim(), newVal.trim()), selectEl.options[selectEl.options.length - 1]);
          selectEl.value = newVal.trim();
        } else selectEl.value = "";
      }
    };

    // ========== MAIN TABLE ==========
    window.showData = async () => {
      Swal.fire({ title: 'جاري التحميل...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
      try {
        let snap = await get(ref(db, "Ayat/meterdata"));
        allData = snap.exists() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())).filter(v => v) : [];
        Swal.fire({
          title: '📋 سجل البيانات',
          html: document.getElementById("tableTemplate").innerHTML,
          customClass: { popup: 'swal-large-popup' },
          showCloseButton: true,
          showConfirmButton: false,
          didOpen: () => {
            loadEngineeringFilter();
            loadDataForModal();
          }
        });
      } catch (e) { Swal.fire("خطأ", "فشل التحميل", "error"); }
    };

    window.loadDataForModal = async () => {
      let snap = await get(ref(db, "Ayat/meterdata"));
      allData = snap.exists() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())).filter(v => v) : [];
      filterTable();
    };

    window.filterTable = () => {
      if (!document.getElementById("modalBody")) return;
      let f = (id) => document.getElementById(id)?.value || "";
      let f4 = f("f4").toLowerCase(), f5 = f("f5").toLowerCase(), f6 = f("f6").toLowerCase();
      let f7 = f("f7").toLowerCase(), f8 = f("f8").toLowerCase(), f9 = f("f9").toLowerCase(), f10 = f("f10").toLowerCase();

      filteredData = allData.filter(item => {
        if (f("f0") && item.keta3 !== f("f0")) return false;
        if (f("f1") && item.handsa !== f("f1")) return false;
        if (f("f2") && item.calibrationdate && item.calibrationdate < f("f2")) return false;
        if (f("f3") && item.calibrationdate && item.calibrationdate > f("f3")) return false;
        if (f("f11") && item.enterdate && item.enterdate < f("f11")) return false;
        if (f("f12") && item.enterdate && item.enterdate > f("f12")) return false;
        if (f4 && !(item.metername || "").toLowerCase().includes(f4)) return false;
        if (f5 && !(item.metercode || "").toLowerCase().includes(f5)) return false;
        if (f6 && !(item.nashattype || "").toLowerCase().includes(f6)) return false;
        if (f7 && !(item.metertype || "").toLowerCase().includes(f7)) return false;
        if (f8 && !(item.meternumber || "").toLowerCase().includes(f8)) return false;
        if (f9 && !(item.result || "").toLowerCase().includes(f9)) return false;
        if (f10 && !(item.notes || "").toLowerCase().includes(f10)) return false;
        return true;
      });
      currentPage = 1;
      renderModalTable();
    };

    function renderModalTable() {
      let tbody = document.getElementById("modalBody");
      if (!tbody) return;
      let start = (currentPage - 1) * ITEMS_PER_PAGE;
      let pageData = filteredData.slice(start, start + ITEMS_PER_PAGE);

      tbody.innerHTML = pageData.map((item, idx) => `
            <tr>
                <td>${start + idx + 1}</td>
                <td>${escapeHtml(item.keta3 || '—')}</td>
                <td>${escapeHtml(item.handsa || '—')}</td>
                <td>${formatDate(item.calibrationdate)}</td>
                <td>${formatDate(item.enterdate)}</td>
                <td>${escapeHtml(item.metername || '—')}</td>
                <td>${escapeHtml(item.metercode || '—')}</td>
                <td>${escapeHtml(item.nashattype || '—')}</td>
                <td>${escapeHtml(item.metertype || '—')}</td>
                <td>${escapeHtml(item.meternumber || '—')}</td>
                <td>${escapeHtml(item.result || '—')}</td>
                <td>${escapeHtml(item.notes || '—')}</td>
                <td><div class="action-buttons"><button class="btn-edit" onclick="window.editRecord(${start + idx})">✏️ تعديل</button><button class="btn-del" onclick="window.deleteRecord(${start + idx})">🗑️ حذف</button></div></td>
            </tr>
        `).join("");

      document.getElementById("rowCount").innerText = filteredData.length;
      let total = Math.ceil(filteredData.length / ITEMS_PER_PAGE) || 1;
      document.getElementById("pageInfo").innerText = `الصفحة ${currentPage} من ${total}`;
      document.getElementById("prevBtn").disabled = currentPage === 1;
      document.getElementById("nextBtn").disabled = currentPage === total;
    }

    window.prevPage = () => { if (currentPage > 1) { currentPage--; renderModalTable(); } };
    window.nextPage = () => { let total = Math.ceil(filteredData.length / ITEMS_PER_PAGE); if (currentPage < total) { currentPage++; renderModalTable(); } };
    window.clearFilters = () => { for (let i = 0; i <= 12; i++) { let el = document.getElementById(`f${i}`); if (el) el.value = ""; } filterTable(); };
    window.setDuplicateReferenceMode = (v) => { };

    window.exportExcel = () => {
      if (!filteredData.length) return Swal.fire("لا توجد بيانات", "", "warning");
      let ws = XLSX.utils.json_to_sheet(filteredData.map((d, i) => ({ "م": i + 1, "القطاع": d.keta3, "الهندسة": d.handsa, "تاريخ الفحص": d.calibrationdate, "تاريخ التسجيل": d.enterdate, "اسم المشترك": d.metername, "كود المشترك": d.metercode, "النشاط": d.nashattype, "نوع العداد": d.metertype, "رقم العداد": d.meternumber, "نتيجة الفحص": d.result, "ملاحظات": d.notes })));
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "البيانات");
      XLSX.writeFile(wb, `تقرير_التلاعبات_${new Date().toISOString().slice(0, 10)}.xlsx`);
    };

    window.editRecord = (idx) => {
      let rec = filteredData[idx];
      let masterIdx = allData.findIndex(d => d.metercode === rec.metercode && d.meternumber === rec.meternumber);
      if (masterIdx !== -1) {
        currentEditIndex = masterIdx;
        document.getElementById("keta3").value = rec.keta3 || "";
        document.getElementById("handsa").value = rec.handsa || "";
        document.getElementById("calib_date").value = rec.calibrationdate || "";
        document.getElementById("mname").value = rec.metername || "";
        document.getElementById("mco").value = rec.metercode || "";
        document.getElementById("nashattype").value = rec.nashattype || "";
        document.getElementById("mtype").value = rec.metertype || "";
        document.getElementById("mno").value = rec.meternumber || "";
        document.getElementById("munip").value = rec.result || "";
        document.getElementById("notes").value = rec.notes || "";
        document.getElementById("saveBtn").innerHTML = "✏️ تحديث البيانات";
        Swal.fire("وضع التعديل", "قم بالتعديل ثم حفظ", "info");
        Swal.close();
      }
    };

    window.deleteRecord = async (idx) => {
      let rec = filteredData[idx];
      let confirm = await Swal.fire({ title: "تأكيد الحذف", text: `حذف العداد ${rec.meternumber}؟`, icon: "warning", showCancelButton: true });
      if (confirm.isConfirmed) {
        let masterIdx = allData.findIndex(d => d.metercode === rec.metercode && d.meternumber === rec.meternumber);
        if (masterIdx !== -1) {
          allData.splice(masterIdx, 1);
          await set(ref(db, "Ayat/meterdata"), allData);
          await loadDataForModal();
          Swal.fire("تم الحذف", "", "success");
        }
      }
    };

    function loadEngineeringFilter() {
      let engFilter = document.getElementById("f1");
      if (engFilter && document.getElementById("handsa")) {
        let options = document.getElementById("handsa").options;
        engFilter.innerHTML = '<option value="">الكل</option>';
        for (let i = 1; i < options.length; i++) engFilter.add(new Option(options[i].value, options[i].value));
      }
    }

    // Excel upload
    window.promptPassword = () => {
      Swal.fire({ title: "كلمة المرور", input: "password", showCancelButton: true }).then(res => {
        if (res.isConfirmed && res.value === "1") {
          let inp = document.createElement("input");
          inp.type = "file";
          inp.accept = ".xlsx, .xls";
          inp.onchange = async (e) => {
            let file = e.target.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = async (ev) => {
              let wb = XLSX.read(ev.target.result, { type: 'array' });
              let rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
              if (rows.length) {
                let snap = await get(ref(db, "Ayat/meterdata"));
                let list = snap.exists() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())) : [];
                for (let row of rows) {
                  let mco = normalizeCode(row["كود المشترك"] || row["كود"] || row["metercode"] || "");
                  let mno = cleanNumber(row["رقم العداد"] || row["meternumber"] || "");
                  if (!mco || !mno) continue;
                  let newRec = {
                    keta3: row["القطاع"] || row["keta3"] || "",
                    handsa: row["الهندسة"] || row["handsa"] || "",
                    calibrationdate: row["تاريخ الفحص"] || "",
                    enterdate: row["تاريخ الإدخال"] || new Date().toISOString().split('T')[0],
                    metername: row["اسم المشترك"] || "",
                    metercode: mco,
                    nashattype: row["النشاط"] || "",
                    metertype: row["نوع العداد"] || "",
                    meternumber: mno,
                    result: row["نتيجة الفحص"] || "",
                    notes: row["ملاحظات"] || ""
                  };
                  let existIdx = list.findIndex(i => normalizeCode(i.metercode) === mco && cleanNumber(i.meternumber) === mno);
                  if (existIdx >= 0) list[existIdx] = { ...list[existIdx], ...newRec };
                  else list.push(newRec);
                }
                await set(ref(db, "Ayat/meterdata"), list);
                Swal.fire("تم الرفع", "تم تحديث البيانات", "success");
              }
            };
            reader.readAsArrayBuffer(file);
          };
          inp.click();
        }
      });
    };

    // Initialize engineering dropdown
    const engineeringList = ["هندسة شمال دمياط", "هندسة جنوب دمياط", "هندسة عزبة البرج", "هندسة كفر سعد", "هندسة كفر البطيخ", "هندسة راس البر", "هندسة دمياط الجديدة", "هندسة الزرقا", "هندسة فارسكور", "هندسة الروضة", "هندسة الشعراء", "هندسة مدينة شربين", "هندسة قري شربين", "هندسة دكرنس", "هندسة جمصة", "هندسة قري بلقاس", "هندسة مدينة بلقاس", "هندسة الستاموني", "هندسة بني عبيد", "هندسة منية النصر", "هندسة ميت سلسيل", "هندسة الجمالية", "هندسة قري المنزلة", "هندسة مدينة المنزلة", "هندسة المطرية", "هندسة شرق المنصورة", "هندسة غرب المنصورة", "هندسة طلخا", "هندسة نبروه", "هندسة قري المنصورة 1", "هندسة قري المنصورة 2", "هندسة اجا", "هندسة مدينة السنبلاوين", "هندسة قري السنبلاوين", "هندسة تمي الامديد", "هندسة مدينة ميت غمر", "هندسة قري ميت غمر", "هندسة كوم النور", "هندسة مدينة كفر الشيخ", "هندسة غرب كفر الشيخ", "هندسة شرق كفر الشيخ", "هندسة قلين", "هندسة قرى سيدي سالم", "هندسة مدينة سيدي سالم", "هندسة الرياض", "هندسة مدينة دسوق", "هندسة قرى شمال دسوق", "هندسة قرى جنوب دسوق", "هندسة فوه", "هندسة مطوبس", "هندسة مدينة الحامول", "هندسة قرى الحامول", "هندسة بيلا", "هندسة بلطيم", "هندسة برج البرلس"];
    let handsaSelect = document.getElementById("handsa");
    if (handsaSelect) { engineeringList.forEach(e => handsaSelect.add(new Option(e, e))); handsaSelect.value = ""; }

    document.getElementById("enter_date").value = new Date().toISOString().split('T')[0];
    loadAyatEnter();
  </script>
</body>
