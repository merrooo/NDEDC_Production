<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title> إدارة تسجيل - التلاعبات</title>
  <link rel="stylesheet" href="Ayat.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

  <div class="entry-card">
    <h2>⚡ تسجيل بيانات عداد - التلاعبات</h2>

    <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px;">
      <label class="dark-toggle" onclick="document.body.classList.toggle('dark-mode')">
        <span class="icon">🌙</span>
        <div class="switch"></div>
        <span class="icon">☀️</span>
      </label>

      <button class="btn-view" onclick="window.location.href='index.html'">
        ⬅️ الصفحة الرئيسية
      </button>

      <button class="btn-excel" id="uploadBtn" onclick="window.promptPassword && window.promptPassword()">
        📥 رفع Excel
      </button>

      <div class="input-with-label" style="min-width: 180px; margin: 0;">
        <input type="date" id="enter_date" style="padding: 6px 10px;" />
      </div>

      <input type="file" id="excelFile" accept=".xls,.xlsx" hidden />
    </div>

    <div class="inputs-grid">
      <div class="input-with-label">
        <label>📍 القطاع</label>
        <select id="keta3" aria-label="القطاع">
          <option value="">اختر القطاع</option>
          <option>دمياط</option>
          <option>شمال الدقهلية</option>
          <option>جنوب الدقهلية</option>
          <option>كفر الشيخ</option>
        </select>
      </div>

      <div class="input-with-label">
        <label>🏗️ الهندسة</label>
        <select id="handsa" aria-label="الهندسة">
          <option value="">اختر الهندسة</option>
          <option value="">اختر الهندسة</option>
          <option>هندسة شمال دمياط</option>
          <option>هندسة جنوب دمياط</option>
          <option>هندسة عزبة البرج</option>
          <option>هندسة كفر سعد</option>
          <option>هندسة كفر البطيخ</option>
          <option>هندسة راس البر</option>
          <option>هندسة دمياط الجديدة</option>
          <option>هندسة الزرقا</option>
          <option>هندسة فارسكور</option>
          <option>هندسة الروضة</option>
          <option>هندسة الشعراء</option>
          <option>هندسة مدينة شربين</option>
          <option>هندسة قري شربين</option>
          <option>هندسة دكرنس</option>
          <option>هندسة جمصة</option>
          <option>هندسة قري بلقاس</option>
          <option>هندسة مدينة بلقاس</option>
          <option>هندسة الستاموني</option>
          <option>هندسة بني عبيد</option>
          <option>هندسة منية النصر</option>
          <option>هندسة ميت سلسيل</option>
          <option>هندسة الجمالية</option>
          <option>هندسة قري المنزلة</option>
          <option>هندسة مدينة المنزلة</option>
          <option>هندسة المطرية</option>
          <option>هندسة شرق المنصورة</option>
          <option>هندسة غرب المنصورة</option>
          <option>هندسة طلخا</option>
          <option>هندسة نبروه</option>
          <option>هندسة قري المنصورة 1</option>
          <option>هندسة قري المنصورة 2</option>
          <option>هندسة اجا</option>
          <option>هندسة مدينة السنبلاوين</option>
          <option>هندسة قري السنبلاوين</option>
          <option>هندسة تمي الامديد</option>
          <option>هندسة مدينة ميت غمر</option>
          <option>هندسة قري ميت غمر</option>
          <option>هندسة كوم النور</option>
          <option>هندسة مدينة كفر الشيخ</option>
          <option>هندسة غرب كفر الشيخ</option>
          <option>هندسة شرق كفر الشيخ</option>
          <option>هندسة قلين</option>
          <option>هندسة قرى سيدي سالم</option>
          <option>هندسة مدينة سيدي سالم</option>
          <option>هندسة الرياض</option>
          <option>هندسة مدينة دسوق</option>
          <option>هندسة قرى شمال دسوق</option>
          <option>هندسة قرى جنوب دسوق</option>
          <option>هندسة فوه</option>
          <option>هندسة مطوبس</option>
          <option>هندسة مدينة الحامول</option>
          <option>هندسة قرى الحامول</option>
          <option>هندسة بيلا</option>
          <option>هندسة بلطيم</option>
          <option>هندسة برج البرلس</option>
        </select>
      </div>

      <div class="input-with-label">
        <label>📋 نوع النشاط</label>
        <select id="nashattype" onchange="window.checkNewOption && window.checkNewOption(this)">
          <option value="">اختر نوع النشاط</option>
          <option>منزلي</option>
          <option>تجاري</option>
          <option>قوى محركة</option>
          <option>كودي مخالف</option>
          <option>ري</option>
          <option>مزارع</option>
          <option>مساجد</option>
          <option>استثمار صناعة</option>
          <option>كبار</option>
          <option>مصالح حكومية</option>
          <option>مصالح حكوميه اخري</option>
          <option value="ADD_NEW" class="add-new-option">➕ إضافة نوع جديد...</option>
        </select>
      </div>

      <div class="input-with-label">
        <label>⚙️ نوع العداد</label>
        <select id="mtype" onchange="window.checkNewOption && window.checkNewOption(this)">
          <option value="">اختر نوع العداد</option>
          <option>سويدى ثلاثى مباشر</option>
          <option>سويدي احادي</option>
          <option>اسكرا احادي</option>
          <option>المصريه احادي</option>
          <option>جلوبال ثلاثى مباشر</option>
          <option>جلوبال احادي</option>
          <option>جلوبال ثلاثى غير مباشر</option>
          <option value="ADD_NEW" class="add-new-option">➕ إضافة نوع جديد...</option>
        </select>
      </div>

      <div class="input-with-label">
        <label>🔢 رقم العداد</label>
        <input id="mno" placeholder="رقم العداد" />
      </div>

      <div class="input-with-label">
        <label>📅 تاريخ الفحص</label>
        <input type="date" id="calib_date" />
      </div>

      <div class="input-with-label">
        <label>👤 اسم المشترك</label>
        <input id="mname" placeholder="اسم المشترك" />
      </div>

      <div class="input-with-label">
        <label>🆔 كود المشترك</label>
        <input id="mco" placeholder="كود المشترك" />
      </div>

      <div class="input-with-label">
        <label>📍 نتيجة الفحص</label>
        <select id="munip" aria-label="نتيجة الفحص" onchange="window.checkNewOption && window.checkNewOption(this)">
          <option value="">اختر نتيجة الفحص</option>
          <option>تلاعب</option>
          <option>سليم</option>
          <option>مديونية</option>
          <option>تكهين</option>
          <option>تالف</option>
          <option>محترق</option>
          <option>صيانة</option>
          <option>عاطل</option>
          <option value="ADD_NEW" class="add-new-option">➕ إضافة نتيجة جديدة...</option>
        </select>
      </div>

      <div class="input-with-label full-width-container">
        <label>📝 ملاحظات الفحص</label>
        <textarea id="notes" class="full-width-container" placeholder="ملاحظات الفحص"></textarea>
      </div>
    </div>
  </div>

  <br />
  <div style="display: flex; gap: 12px; justify-content: center;">
    <button class="btn-save" id="saveBtn" onclick="window.quickSave && window.quickSave()">💾 حفظ</button>
    <button class="btn-view" id="viewBtn" onclick="window.showData && window.showData()">👁 عرض</button>
  </div>

  <template id="tableTemplate">
    <div dir="rtl" class="data-modal-container">
      <div class="table-controls">
        <div class="controls-left">
          <span>إجمالي السجلات: <b id="rowCount">0</b></span>
          <span id="duplicateCount" style="color: #dc3545; margin-right: 20px; display: none;">
            🔴 <b id="duplicateNum">0</b> أرقام مكررة
          </span>
          <button id="showDuplicatesBtn" class="btn-warning"
            onclick="window.showDuplicateNumbers && window.showDuplicateNumbers()"
            style="display: none; background: #fd7e14; color: white; border: none; padding: 4px 8px; border-radius: 4px; margin-right: 10px;">
            عرض الأرقام المكررة
          </button>
        </div>
        <div class="controls-right">
          <button class="btn-excel" onclick="window.exportExcel && window.exportExcel()">📊 تصدير Excel</button>
          <button class="btn-refresh" onclick="window.loadDataForModal && window.loadDataForModal()">🔄 تحديث</button>
          <button class="btn-clear-filters" onclick="window.clearFilters && window.clearFilters()">❌ مسح
            الفلاتر</button>
        </div>
      </div>

      <div class="table-container">
        <table id="dataTable">
          <thead>
            <tr>
              <th>م</th>
              <th>القطاع</th>
              <th>الهندسة</th>
              <th>تاريخ الفحص</th>
              <th>تاريخ التسجيل</th>
              <th>اسم المشترك</th>
              <th>كود المشترك</th>
              <th>النشاط</th>
              <th>نوع العداد</th>
              <th>رقم العداد</th>
              <th>نتيجة الفحص</th>
              <th>ملاحظات</th>
              <th>إجراء</th>
            </tr>
            <tr class="filter-row">
              <th>-</th>
              <th>
                <select id="f0" class="filter-select" onchange="window.filterTable && window.filterTable()">
                  <option value="">الكل</option>
                  <option>دمياط</option>
                  <option>شمال الدقهلية</option>
                  <option>جنوب الدقهلية</option>
                  <option>كفر الشيخ</option>
                </select>
              </th>
              <th>
                <select id="f1" class="filter-select" onchange="window.filterTable && window.filterTable()">
                  <option value="">الكل</option>
                  <option value="">اختر الهندسة</option>
                  <option>هندسة شمال دمياط</option>
                  <option>هندسة جنوب دمياط</option>
                  <option>هندسة عزبة البرج</option>
                  <option>هندسة كفر سعد</option>
                  <option>هندسة كفر البطيخ</option>
                  <option>هندسة راس البر</option>
                  <option>هندسة دمياط الجديدة</option>
                  <option>هندسة الزرقا</option>
                  <option>هندسة فارسكور</option>
                  <option>هندسة الروضة</option>
                  <option>هندسة الشعراء</option>
                  <option>هندسة مدينة شربين</option>
                  <option>هندسة قري شربين</option>
                  <option>هندسة دكرنس</option>
                  <option>هندسة جمصة</option>
                  <option>هندسة قري بلقاس</option>
                  <option>هندسة مدينة بلقاس</option>
                  <option>هندسة الستاموني</option>
                  <option>هندسة بني عبيد</option>
                  <option>هندسة منية النصر</option>
                  <option>هندسة ميت سلسيل</option>
                  <option>هندسة الجمالية</option>
                  <option>هندسة قري المنزلة</option>
                  <option>هندسة مدينة المنزلة</option>
                  <option>هندسة المطرية</option>
                  <option>هندسة شرق المنصورة</option>
                  <option>هندسة غرب المنصورة</option>
                  <option>هندسة طلخا</option>
                  <option>هندسة نبروه</option>
                  <option>هندسة قري المنصورة 1</option>
                  <option>هندسة قري المنصورة 2</option>
                  <option>هندسة اجا</option>

                  <option>هندسة قري السنبلاوين</option>
                  <option>هندسة تمي الامديد</option>
                  <option>هندسة مدينة ميت غمر</option>
                  <option>هندسة قري ميت غمر</option>
                  <option>هندسة كوم النور</option>
                  <option>هندسة مدينة كفر الشيخ</option>
                  <option>هندسة غرب كفر الشيخ</option>
                  <option>هندسة شرق كفر الشيخ</option>
                  <option>هندسة قلين</option>
                  <option>هندسة قرى سيدي سالم</option>
                  <option>هندسة مدينة سيدي سالم</option>
                  <option>هندسة الرياض</option>
                  <option>هندسة مدينة دسوق</option>
                  <option>هندسة قرى شمال دسوق</option>
                  <option>هندسة قرى جنوب دسوق</option>
                  <option>هندسة فوه</option>
                  <option>هندسة مطوبس</option>
                  <option>هندسة مدينة الحامول</option>
                  <option>هندسة قرى الحامول</option>
                  <option>هندسة بيلا</option>
                  <option>هندسة بلطيم</option>
                  <option>هندسة برج البرلس</option>
                </select>
              </th>
              <th class="filter-date-col">
                <div class="date-filter-container">
                  <input type="date" id="f2" class="filter-input" placeholder="من"
                    onchange="window.filterTable && window.filterTable()" />
                  <input type="date" id="f3" class="filter-input" placeholder="إلى"
                    onchange="window.filterTable && window.filterTable()" />
                </div>
              </th>
              <th class="filter-date-col">
                <div class="date-filter-container">
                  <input type="date" id="f11" class="filter-input" placeholder="من"
                    onchange="window.filterTable && window.filterTable()" />

                    onchange="window.filterTable && window.filterTable()" />
                </div>
              </th>
              <th>
                <input type="text" id="f4" class="filter-input" placeholder="🔍"
                  onkeyup="window.filterTable && window.filterTable()" />
              </th>
              <th>
                <input type="text" id="f5" class="filter-input" placeholder="🔍"
                  onkeyup="window.filterTable && window.filterTable()" />

          </thead>
          <tbody id="modalBody"></tbody>
        </table>
      </div>

      <div class="pagination-controls">
        <button id="prevBtn" class="btn-pagination" onclick="window.prevPage && window.prevPage()" disabled>⬅️
          السابق</button>
        <span id="pageInfo" class="page-info">الصفحة 1 من 1</span>
        <button id="nextBtn" class="btn-pagination" onclick="window.nextPage && window.nextPage()" disabled>التالي
          ➡️</button>
      </div>
    </div>
  </template>

  <script src="Ayat.js" type="module"></script>
  <script>
    // Set default enter_date to today on page load
    document.addEventListener("DOMContentLoaded", function () {
      const enterDateInput = document.getElementById("enter_date");
      if (enterDateInput && !enterDateInput.value) {
        enterDateInput.value = new Date().toISOString().split('T')[0];
      }
    });
  </script>
</body>

</html>
