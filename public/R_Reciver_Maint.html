<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>استعلام عن صيانة عدادات داخل الهندسة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="R_Reciver_Maint.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

</head>

<body>
    <div id="loader">
        <ion-icon name="sync-outline"
            style="font-size: 50px; animation: spin 2s linear infinite; color: var(--accent);"></ion-icon>
        <p>جاري تحميل البيانات من السيرفر...</p>
    </div>

    <div class="app" style="display:flex; width:100%;">
        <aside class="sidebar">
            <a href="Main_Dashboard.html" style="text-decoration: none;">
                <button class="secondary"
                    style="background: #0c63b9; color: #333; border: 1px solid #ddd; margin-bottom: 15px;">
                    🏠 الصفحة الرئيسية
                </button>
            </a>
            <h2><ion-icon name="options-outline"></ion-icon> فلاتر البحث</h2>

            <div class="filter-box">
                <label>تاريخ الرفع</label>
                <div class="date-row">
                    <input type="date" id="fUploadFrom" class="input-style" title="من">
                    <input type="date" id="fUploadTo" class="input-style" title="إلى">
                </div>
            </div>

            <div class="filter-box">
                <label>تاريخ دخول الصيانة</label>
                <div class="date-row">
                    <input type="date" id="fEnterFrom" class="input-style">
                    <input type="date" id="fEnterTo" class="input-style">
                </div>
            </div>

            <div class="filter-box">
                <label>تاريخ الصيانة/الفحص</label>
                <div class="date-row">
                    <input type="date" id="fMaintFrom" class="input-style">
                    <input type="date" id="fMaintTo" class="input-style">
                </div>
            </div>

            <div class="filter-box">
                <label>القطاع والهندسة</label>
                <select id="fKeta3" class="input-style dynamic-filter" style="margin-bottom: 5px;">
                    <option value="">كل القطاعات</option>
                    <option>دمياط</option>
                    <option>شمال-الدقهلية</option>
                    <option>جنوب-الدقهلية</option>
                    <option>كفر الشيخ</option>
                </select>
                <select id="fHandsa" class="input-style dynamic-filter">
                    <option value="">كل الهندسات</option>
                    <option>هندسة شمال دمياط</option>
                    <option>هندسة جنوب دمياط</option>
                    <option>هندسة عزبة البرج</option>
                    <option>هندسة كفر سعد</option>
                    <option>هندسة كفر البطيخ</option>
                    <option>هندسة راس البر</option>
                    <option>هندسة دمياط الجديدة</option>
                    <option>هندسة الزرقا</option>
                    <option>هندسة فارسكور</option>
                    <option>هندسة الروضة</option>
                    <option>هندسة الشعراء</option>
                    <option>هندسة مدينة شربين</option>
                    <option>هندسة قري شربين</option>
                    <option>هندسة دكرنس</option>
                    <option>هندسة جمصة</option>
                    <option>هندسة قري بلقاس</option>
                    <option>هندسة مدينة بلقاس</option>
                    <option>هندسة بني عبيد</option>
                    <option>هندسة منية النصر</option>
                    <option>هندسة ميت سلسيل</option>
                    <option>هندسة الجمالية</option>
                    <option>هندسة قري المنزلة</option>
                    <option>هندسة مدينة المنزلة</option>
                    <option>هندسة المطرية</option>
                    <option>هندسة شرق المنصورة</option>
                    <option>هندسة غرب المنصورة</option>
                    <option>هندسة طلخا</option>
                    <option>هندسة نبروه</option>
                    <option>هندسة قري المنصورة 1</option>
                    <option>هندسة قري المنصورة 2</option>
                    <option>هندسة اجا</option>
                    <option>هندسة مدينة السنبلاوين</option>
                    <option>هندسة قري السنبلاوين</option>
                    <option>هندسة تمي الامديد</option>
                    <option>هندسة مدينة ميت غمر</option>
                    <option>هندسة قري ميت غمر</option>
                    <option>هندسة كوم النور</option>
                    <option>هندسة مدينة كفر الشيخ</option>
                    <option>هندسة غرب كفر الشيخ</option>
                    <option>هندسة شرق كفر الشيخ</option>
                    <option>هندسة قلين</option>
                    <option>هندسة قرى سيدي سالم</option>
                    <option>هندسة مدينة سيدي سالم</option>
                    <option>هندسة الرياض</option>
                    <option>هندسة مدينة دسوق</option>
                    <option>هندسة قرى شمال دسوق</option>
                    <option>هندسة قرى جنوب دسوق</option>
                    <option>هندسة فوه</option>
                    <option>هندسة مطوبس</option>
                    <option>هندسة مدينة الحامول</option>
                    <option>هندسة قرى الحامول</option>
                    <option>هندسة بيلا</option>
                    <option>هندسة بلطيم</option>
                    <option>هندسة برج البرلس</option>
                </select>
            </div>

            <div class="filter-box">
                <label>بيانات العداد</label>
                <select id="fMType" class="input-style dynamic-filter" style="margin-bottom: 5px;">
                    <option value="">كل الأنواع</option>
                    <option>جلوبال-مسبق</option>
                    <option>سويدى-مسبق</option>
                    <option>المصرية-مسبق</option>
                    <option>اسكرا-مسبق</option>
                    <option>جيزة باور-مسبق</option>
                    <option>رقمى</option>
                    <option>عدادات-ذكية</option>
                    <option value="ADD_CUSTOM" style="color:red;">+ إضافة بحث مخصص...</option>
                </select>

                <select id="fConn" class="input-style dynamic-filter">
                    <option value="">كل التوصيلات</option>
                    <option>احادى</option>
                    <option>ثلاثى مباشر</option>
                    <option>ثلاثى غير مباشر</option>
                    <option value="ADD_CUSTOM" style="color:red;">+ إضافة بحث مخصص...</option>
                </select>
            </div>

            <div class="filter-box">
                <label>أسباب الرفع والفحص</label>
                <select id="fRemFor" class="input-style dynamic-filter" style="margin-bottom: 5px;">
                    <option value="">كل أسباب الرفع</option>
                    <option>الفحص</option>
                    <option>الصيانة</option>
                    <option>الهدم والبناء</option>
                    <option>تصفية مشترك</option>
                    <option>زيادة قدرة</option>
                    <option>احلال رباعي</option>
                    <option>تنازل</option>
                    <option>خطة احلال</option>
                    <option>احلال عدم سداد</option>
                    <option value="ADD_CUSTOM" style="color:red;">+ إضافة بحث مخصص...</option>
                </select>
                <select id="fMRemFor" class="input-style dynamic-filter">
                    <option value="">كل تقارير الفحص</option>
                    <option>عطل بالبطارية ارسالة للشركة الموردة للصيانة</option>
                    <option>
                        قارىء الكروت لا يعمل ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>
                        العداد لا يقبل الشحن ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>
                        العداد لا يقوم بالتوصيل ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>الشاشة عاطلة ارسالة للشركة الموردة للصيانة</option>
                    <option>
                        العداد يحتاج للتهيئة ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>تقرير فحص للعداد من قبل الشركة الموردة</option>
                    <option>
                        تلف بجسم/روزتة العداد ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>زيادة قدرة ارسالة للشركة الموردة للصيانة</option>
                    <option>بحث مديونية بالعداد ارسالة للشركة الموردة للصيانة</option>
                    <option>العداد محترق ارسالة للشركة الموردة للصيانة</option>
                    <option>العداد لا يعمل ارسالة للشركة الموردة للصيانة</option>
                    <option>
                        لمبة التلاعب تعمل باستمرار ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>
                        العداد يعمل بدون شحن ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>
                        العداد لا يسجل الاستهلاك ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>
                        العداد يسجل استهلاك بدون حمل ارسالة للشركة الموردة للصيانة
                    </option>
                    <option>blocking</option>
                    <option value="ADD_CUSTOM" style="color:red;">+ إضافة بحث مخصص...</option>
                </select>
                </select>
            </div>

            <div class="filter-box">
                <label>سنة الصنع وحالة الصيانة</label>
                <input type="number" id="fYear" class="input-style" placeholder="سنة الصنع" style="margin-bottom:5px;">
                <select id="fSource" class="input-style">
                    <option value="">الكل</option>
                    <option value="صيانة_جديدة">صيانة جديدة</option>
                    <option value="صيانة_متكررة">صيانة متكررة</option>
                    <option value="ADD_CUSTOM" style="color:red;">+ إضافة بحث مخصص...</option>
                </select>
            </div>

            <button class="btn-reset" id="resetBtn">
                <ion-icon name="refresh-circle-outline"></ion-icon> إعادة ضبط الفلاتر
            </button>
        </aside>

        <main class="main-content">
            <div class="top-stats">
                <div
                    style="background:var(--primary); color:white; padding:10px 25px; border-radius:10px; display:flex; align-items:center; gap:10px;">
                    <span>إجمالي السجلات:</span>
                    <span id="resCount">0</span>
                </div>

                <div class="search-bar">
                    <ion-icon name="search-outline"></ion-icon>
                    <input type="text" id="mainSearch" placeholder="بحث سريع برقم العداد أو اسم الهندسة...">
                </div>

                <button class="btn-excel" id="exportBtn">
                    <ion-icon name="document-text-outline"></ion-icon> تصدير Excel
                </button>
            </div>

            <div class="table-container">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>م</th>
                            <th>رقم العداد</th>
                            <th>تاريخ الرفع</th>
                            <th>دخول الصيانة</th>
                            <th>تاريخ الفحص</th>
                            <th>القطاع</th>
                            <th>الهندسة</th>
                            <th>النوع</th>
                            <th>التوصيل</th>
                            <th>سبب الرفع</th>
                            <th>تقرير الفحص</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnKRhT5xJTBvsQKpW7e9w-hGSbAQJWTSo",
            authDomain: "production1-ae85.firebaseapp.com",
            projectId: "production1-ae85",
            databaseURL: "https://production1-ae85-default-rtdb.firebaseio.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let masterData = [];

        // دالة مساعدة لاستقطاع التاريخ فقط (YYYY-MM-DD)
        function getDateOnly(dateTimeStr) {
            if (!dateTimeStr) return "";
            return dateTimeStr.split('T')[0].split(' ')[0];
        }

        async function loadData() {
            try {
                const snap = await get(ref(db, "Reciever_Maint"));
                if (snap.exists()) {
                    masterData = [];
                    snap.forEach(child => {
                        masterData.push({ ...child.val(), id: child.key });
                    });
                    applyFilters();
                }
            } catch (err) {
                console.error(err);
                Swal.fire("خطأ", "فشل في الاتصال بقاعدة البيانات", "error");
            } finally {
                document.getElementById("loader").style.display = "none";
            }
        }

        function applyFilters() {
            const f = {
                q: document.getElementById("mainSearch").value.trim().toLowerCase(),
                uF: document.getElementById("fUploadFrom").value,
                uT: document.getElementById("fUploadTo").value,
                eF: document.getElementById("fEnterFrom").value,
                eT: document.getElementById("fEnterTo").value,
                mF: document.getElementById("fMaintFrom").value,
                mT: document.getElementById("fMaintTo").value,
                k: document.getElementById("fKeta3").value,
                h: document.getElementById("fHandsa").value,
                t: document.getElementById("fMType").value,
                c: document.getElementById("fConn").value,
                r: document.getElementById("fRemFor").value,
                mr: document.getElementById("fMRemFor").value,
                y: document.getElementById("fYear").value,
                s: document.getElementById("fSource").value
            };

            const filtered = masterData.filter(d => {
                // استخراج التاريخ فقط من الحقول الموجودة في قاعدة البيانات للمقارنة السليمة
                const dUpload = getDateOnly(d.Uploaddate);
                const dEnter = getDateOnly(d.Enter_Maint_Date);
                const dMaint = getDateOnly(d.MaintDate || d.Timestamp);

                // مقارنة التواريخ (تم تعديل منطق الفحص ليتناسب مع الرفع)
                if ((f.uF && dUpload < f.uF) || (f.uT && dUpload > f.uT)) return false;
                if ((f.eF && dEnter < f.eF) || (f.eT && dEnter > f.eT)) return false;
                if ((f.mF && dMaint < f.mF) || (f.mT && dMaint > f.mT)) return false;

                // بقية الفلاتر (تم الحفاظ عليها بالكامل)
                if (f.k && d.Keta3 !== f.k) return false;
                if (f.h && d.Handsa !== f.h) return false;
                if (f.t && f.t !== 'ADD_CUSTOM' && d.Mtype !== f.t) return false;
                if (f.c && f.c !== 'ADD_CUSTOM' && d.ConnectionType !== f.c) return false;
                if (f.r && f.r !== 'ADD_CUSTOM' && d.Removingfor !== f.r) return false;
                if (f.mr && f.mr !== 'ADD_CUSTOM' && d.Mremovingfor !== f.mr) return false;
                if (f.y && String(d.YEAR) !== f.y) return false;
                if (f.s && (d.original_source || "صيانة_جديدة") !== f.s) return false;

                const searchStr = `${d.MNO} ${d.Handsa} ${d.Keta3} ${d.Mtype}`.toLowerCase();
                return searchStr.includes(f.q);
            });

            render(filtered);
        }

        function render(data) {
            document.getElementById("resCount").innerText = data.length.toLocaleString();
            const tbody = document.getElementById("tableBody");

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" style="text-align:center; padding:40px; color:#64748b;">لا توجد سجلات مطابقة</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map((d, i) => `
                <tr>
                    <td style="color:#94a3b8">${i + 1}</td>
                    <td style="font-weight:bold; color:var(--accent)">${d.MNO || "-"}</td>
                    <td>${getDateOnly(d.Uploaddate) || "-"}</td>
                    <td>${getDateOnly(d.Enter_Maint_Date) || "-"}</td>
                    <td>${getDateOnly(d.MaintDate || d.Timestamp) || "-"}</td>
                    <td>${d.Keta3 || "-"}</td>
                    <td>${d.Handsa || "-"}</td>
                    <td>${d.Mtype || "-"}</td>
                    <td>${d.ConnectionType || "-"}</td>
                    <td>${d.Removingfor || "-"}</td>
                    <td>${d.Mremovingfor || "-"}</td>
                    <td><span class="status-badge ${d.original_source === 'صيانة_متكررة' ? 'status-repeat' : 'status-new'}">
                        ${(d.original_source || 'صيانة_جديدة').replace('_', ' ')}
                    </span></td>
                </tr>
            `).join("");
        }

        // المستمعات وكافة وظائف "البحث المخصص" بقيت كما هي لضمان عمل البرنامج بالكامل
        const filterIds = ["mainSearch", "fUploadFrom", "fUploadTo", "fEnterFrom", "fEnterTo", "fMaintFrom", "fMaintTo", "fKeta3", "fHandsa", "fMType", "fConn", "fRemFor", "fMRemFor", "fYear", "fSource"];

        filterIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener("input", () => {
                    if (el.value === "ADD_CUSTOM") {
                        handleCustomOption(el);
                    }
                    applyFilters();
                });
            }
        });

        async function handleCustomOption(selectElement) {
            const { value: customVal } = await Swal.fire({
                title: 'بحث مخصص',
                input: 'text',
                inputLabel: 'أدخل القيمة التي تبحث عنها:',
                showCancelButton: true
            });
            if (customVal) {
                const newOpt = new Option(customVal, customVal, true, true);
                selectElement.add(newOpt, selectElement.firstChild);
            } else {
                selectElement.value = "";
            }
            applyFilters();
        }

        document.getElementById("resetBtn").onclick = () => {
            filterIds.forEach(id => {
                const el = document.getElementById(id);
                if (el.tagName === "SELECT") el.selectedIndex = 0;
                else el.value = "";
            });
            applyFilters();
        };

        document.getElementById("exportBtn").onclick = () => {
            const ws = XLSX.utils.table_to_sheet(document.getElementById("mainTable"));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, `Maintenance_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        loadData();
    </script>
</body>

</html>
