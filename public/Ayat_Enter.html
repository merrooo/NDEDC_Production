<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes" />
    <title>تسجيل دخول بيانات عداد المعمل الهندسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #e0e7ef 100%);
            padding: 20px;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
            color: #e2e8f0;
        }

        /* entry card redesign - modern form layout */
        .entry-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 28px 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            transition: all 0.3s;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        body.dark-mode .entry-card {
            background: #1e293b;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
            border-color: #334155;
        }

        .section-header {
            font-size: 1rem;
            font-weight: 500;
            color: #0f766e;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 3px solid #0d9488;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.3px;
        }

        body.dark-mode .section-header {
            color: #5ee0da;
            border-bottom-color: #2dd4bf;
        }

        /* modern form grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px 24px;
            margin-bottom: 30px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field label {
            font-weight: 700;
            font-size: 0.85rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        body.dark-mode .form-field label {
            color: #cbd5e1;
        }

        .form-field label i {
            color: #0d9488;
            width: 20px;
            font-size: 1rem;
        }

        .inline-input,
        .inline-select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            background: white;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        .inline-input:focus,
        .inline-select:focus {
            outline: none;
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
            transform: translateY(-1px);
        }

        body.dark-mode .inline-input,
        body.dark-mode .inline-select {
            background: #334155;
            border-color: #475569;
            color: #f8fafc;
        }

        .select-with-add {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .select-with-add select {
            flex: 1;
        }

        .btn-add-option {
            background: #0d9488;
            color: white;
            border: none;
            width: 42px;
            height: 46px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-add-option:hover {
            background: #0f766e;
            transform: scale(1.02);
        }

        .btn-save-row {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            width: 100%;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 14px rgba(16, 185, 129, 0.25);
        }

        .btn-save-row:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.35);
            background: linear-gradient(135deg, #059669, #047857);
        }

        /* read-only special style */
        .inline-input[readonly] {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #334155;
            font-weight: 600;
            cursor: default;
        }

        body.dark-mode .inline-input[readonly] {
            background: #2d3a4e;
            border-color: #5b6e8c;
            color: #a5f3fc;
        }

        /* table styling improved */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
        }

        body.dark-mode .table-wrapper {
            background: #0f172a;
            border-color: #334155;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 1200px;
        }

        th {
            background: #f1f5f9;
            padding: 14px 8px;
            font-weight: 700;
            color: #1e293b;
        }

        body.dark-mode th {
            background: #1e293b;
            color: #e2e8f0;
        }

        .search-input,
        .header-date,
        .search-select-notes {
            width: 100%;
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .stats-bar {
            background: #ccfbf1;
            border-radius: 60px;
            padding: 12px 20px;
            font-weight: 700;
            display: inline-block;
            width: auto;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        body.dark-mode .stats-bar {
            background: #134e4a;
            color: #99f6e4;
        }

        .action-buttons-container {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-icon-edit,
        .btn-icon-delete {
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 12px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-icon-edit {
            background: #f59e0b;
            color: white;
        }

        .btn-icon-delete {
            background: #ef4444;
            color: white;
        }

        .pagination-controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-pagination {
            background: #0f766e;
            padding: 8px 24px;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .page-info {
            background: #e2e8f0;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
        }

        @media (max-width: 780px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .entry-card {
                padding: 20px;
            }

            .btn-save-row {
                width: 100%;
            }
        }

        /* header modern - UPDATED with smaller title font */
        .header-actions {
            background: linear-gradient(135deg, #18c6b7c0, #16a799);
            border-radius: 32px;
            padding: 12px 24px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Header title style - adjusted to smaller size */
        .header-actions h1 {
            font-size: 1.1rem !important;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            letter-spacing: -0.2px;
        }

        .header-actions h1 i {
            font-size: 1.2rem;
        }

        .dark-mode-checkbox {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dark-mode-checkbox:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .dark-mode-checkbox input {
            display: none;
        }

        .dark-mode-checkbox span {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .btn-home {
            background: rgba(244, 235, 235, 0.2);
            border-radius: 40px;
            padding: 6px 18px;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Responsive header adjustments */
        @media (max-width: 768px) {
            .header-actions {
                flex-direction: column;
                text-align: center;
                padding: 12px 16px;
            }

            .header-actions h1 {
                font-size: 0.95rem !important;
            }

            .action-buttons {
                justify-content: center;
            }
        }

        /* Additional small screen optimization */
        @media (max-width: 480px) {
            .header-actions h1 {
                font-size: 0.85rem !important;
            }

            .btn-home,
            .dark-mode-checkbox span {
                font-size: 0.75rem;
            }
        }

        /* style for table controls buttons */
        .btn-refresh,
        .btn-excel {
            transition: all 0.2s ease;
        }

        .btn-refresh:hover,
        .btn-excel:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="header-actions">
            <h1><i class="fas fa-microchip"></i> تسجيل دخول بيانات عداد المعمل الهندسي</h1>
            <div class="action-buttons">
                <label class="dark-mode-checkbox">
                    <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                    <span><i class="fas fa-moon"></i> <i class="fas fa-sun" style="display: none;"></i> الوضع
                        المظلم</span>
                </label>
                <button class="btn-home" onclick="window.location.href='index.html'"><i class="fas fa-home"></i>
                    الرئيسية</button>
            </div>
        </div>

        <!-- improved form section with grid layout -->
        <div class="entry-card">
            <div class="section-header"><i class="fas fa-pen-ruler"></i> إدخال بيانات عداد جديد</div>
            <div class="form-grid">
                <div class="form-field">
                    <label><i class="fas fa-hashtag"></i> رقم العداد</label>
                    <input type="text" id="inputMno" class="inline-input" placeholder="مثال: 12345678">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-calendar-alt"></i> تاريخ الاستلام</label>
                    <input type="date" id="inputDate" class="inline-input">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-chart-line"></i> القطاع</label>
                    <select id="inputKeta3" class="inline-select">
                        <option value="">اختر القطاع</option>
                        <option>دمياط</option>
                        <option>شمال الدقهلية</option>
                        <option>جنوب الدقهلية</option>
                        <option>كفر الشيخ</option>
                    </select>
                </div>
                <div class="form-field">
                    <label><i class="fas fa-draw-polygon"></i> الهندسة</label>
                    <select id="inputHandsa" class="inline-select">
                        <option value="">اختر الهندسة</option>
                        <option>هندسة شمال دمياط</option>
                        <option>هندسة جنوب دمياط</option>
                        <option>هندسة عزبة البرج</option>
                        <option>هندسة كفر سعد</option>
                        <option>هندسة كفر البطيخ</option>
                        <option>هندسة راس البر</option>
                        <option>هندسة دمياط الجديدة</option>
                        <option>هندسة الزرقا</option>
                        <option>هندسة فارسكور</option>
                        <option>هندسة الروضة</option>
                        <option>هندسة الشعراء</option>
                        <option>هندسة مدينة شربين</option>
                        <option>هندسة قري شربين</option>
                        <option>هندسة دكرنس</option>
                        <option>هندسة جمصة</option>
                        <option>هندسة قري بلقاس</option>
                        <option>هندسة مدينة بلقاس</option>
                        <option>هندسة الستاموني</option>
                        <option>هندسة بني عبيد</option>
                        <option>هندسة منية النصر</option>
                        <option>هندسة ميت سلسيل</option>
                        <option>هندسة الجمالية</option>
                        <option>هندسة قري المنزلة</option>
                        <option>هندسة مدينة المنزلة</option>
                        <option>هندسة المطرية</option>
                        <option>هندسة شرق المنصورة</option>
                        <option>هندسة غرب المنصورة</option>
                        <option>هندسة طلخا</option>
                        <option>هندسة نبروه</option>
                        <option>هندسة قري المنصورة 1</option>
                        <option>هندسة قري المنصورة 2</option>
                        <option>هندسة اجا</option>
                        <option>هندسة مدينة السنبلاوين</option>
                        <option>هندسة قري السنبلاوين</option>
                        <option>هندسة تمي الامديد</option>
                        <option>هندسة مدينة ميت غمر</option>
                        <option>هندسة قري ميت غمر</option>
                        <option>هندسة كوم النور</option>
                        <option>هندسة مدينة كفر الشيخ</option>
                        <option>هندسة غرب كفر الشيخ</option>
                        <option>هندسة شرق كفر الشيخ</option>
                        <option>هندسة قلين</option>
                        <option>هندسة قرى سيدي سالم</option>
                        <option>هندسة مدينة سيدي سالم</option>
                        <option>هندسة الرياض</option>
                        <option>هندسة مدينة دسوق</option>
                        <option>هندسة قرى شمال دسوق</option>
                        <option>هندسة قرى جنوب دسوق</option>
                        <option>هندسة فوه</option>
                        <option>هندسة مطوبس</option>
                        <option>هندسة مدينة الحامول</option>
                        <option>هندسة قرى الحامول</option>
                        <option>هندسة بيلا</option>
                        <option>هندسة بلطيم</option>
                        <option>هندسة برج البرلس</option>
                    </select>
                </div>
                <div class="form-field">
                    <label><i class="fas fa-bolt"></i> النشاط</label>
                    <div class="select-with-add">
                        <select id="inputNashat" class="inline-select">
                            <option value="">اختر النشاط</option>
                            <option>منزلي</option>
                            <option>تجاري</option>
                            <option>قوى محركة</option>
                            <option>كودي مخالف</option>
                            <option>ري</option>
                            <option>مزارع</option>
                            <option>مساجد</option>
                            <option>استثمار صناعة</option>
                            <option>كبار</option>
                            <option>مصالح حكومية</option>
                            <option>مصالح حكوميه اخري</option>
                        </select>
                        <button type="button" class="btn-add-option" onclick="addNewOption('inputNashat', 'النشاط')"><i
                                class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div class="form-field">
                    <label><i class="fas fa-tachometer-alt"></i> نوع العداد</label>
                    <div class="select-with-add">
                        <select id="inputMtype" class="inline-select">
                            <option value="">اختر نوع العداد</option>
                            <option>سويدى ثلاثى مباشر</option>
                            <option>سويدي احادي</option>
                            <option>اسكرا احادي</option>
                            <option>المصريه احادي</option>
                            <option>جلوبال ثلاثى مباشر</option>
                            <option>جلوبال احادي</option>
                            <option>جلوبال ثلاثى غير مباشر</option>
                        </select>
                        <button type="button" class="btn-add-option"
                            onclick="addNewOption('inputMtype', 'نوع العداد')"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div class="form-field">
                    <label><i class="fas fa-clipboard-list"></i> حالة العداد</label>
                    <div class="select-with-add">
                        <select id="inputStatus" class="inline-select">
                            <option value="">اختر حالة العداد</option>
                            <option>الفحص</option>
                            <option>التكهين</option>
                            <option>فحص الشركة المصنعة</option>
                        </select>
                        <button type="button" class="btn-add-option"
                            onclick="addNewOption('inputStatus', 'حالة العداد')"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div class="form-field">
                    <label><i class="fas fa-sticky-note"></i> الغرض (تلقائي)</label>
                    <input type="text" id="inputNotes" class="inline-input" value="تم استلام عداد للفحص" readonly>
                </div>
                <div class="form-field">
                    <label><i class="fas fa-comment-dots"></i> ملاحظات أخرى</label>
                    <input type="text" id="inputaddNotes" class="inline-input" placeholder="تفاصيل إضافية ...">
                </div>
            </div>
            <button class="btn-save-row" onclick="saveDirectInput()"><i class="fas fa-save fa-lg"></i>حفظ بيانات
                العداد</button>
        </div>

        <!-- search and records section -->
        <div class="entry-card">
            <div class="section-header"><i class="fas fa-table-list"></i> البحث </div>
            <div class="stats-bar" id="totalSummary"><i class="fas fa-chart-simple"></i> إجمالي السجلات: 0 | نتائج
                البحث: 0</div>
            <div class="table-controls"
                style="display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 20px;">
                <button class="btn-refresh" onclick="refreshDatabase()"
                    style="background:#0284c7; border:none; padding:8px 18px; border-radius:40px; color:white;"><i
                        class="fas fa-sync-alt"></i> تحديث</button>
                <button class="btn-excel" onclick="exportExcel()"
                    style="background:#10b981; border:none; padding:8px 18px; border-radius:40px; color:white;"><i
                        class="fas fa-file-excel"></i> تصدير Excel</button>
            </div>
            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr class="search-header-row">
                            <th>
                                <div class="search-label">رقم العداد</div><input type="text" class="search-input"
                                    id="searchMno" onkeyup="filterTable()" placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">تاريخ الاستلام</div>
                                <div class="date-range"><input type="date" class="header-date" id="startDate"
                                        onchange="filterTable()"><input type="date" class="header-date" id="endDate"
                                        onchange="filterTable()"></div>
                            </th>
                            <th>
                                <div class="search-label">القطاع</div><input type="text" class="search-input"
                                    id="searchKeta3" onkeyup="filterTable()" placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">الهندسة</div><input type="text" class="search-input"
                                    id="searchHandsa" onkeyup="filterTable()" placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">النشاط</div><input type="text" class="search-input"
                                    id="searchNashat" onkeyup="filterTable()" placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">نوع العداد</div><input type="text" class="search-input"
                                    id="searchMtype" onkeyup="filterTable()" placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">حالة العداد</div><input type="text" class="search-input"
                                    id="searchStatus" onkeyup="filterTable()" placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">الغرض</div><select class="search-select-notes"
                                    id="searchNotes" onchange="filterTable()">
                                    <option value="">الكل</option>
                                    <option value="تم استلام عداد للفحص">تم استلام عداد للفحص</option>
                                    <option value="تم الفحص">تم الفحص</option>
                                    <option value="تم تسليم العداد-للهندسة">تم تسليم العداد-للهندسة</option>
                                </select>
                            </th>
                            <th>
                                <div class="search-label">ملاحظات أخرى</div><input type="text" class="search-input"
                                    id="searchaddNotes" onkeyup="filterTable()" placeholder="بحث...">
                            </th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="pagination-controls">
                <button id="prevBtn" class="btn-pagination" onclick="prevPage()"><i class="fas fa-chevron-right"></i>
                    السابق</button>
                <span id="pageInfo" class="page-info">الصفحة 1 من 1</span>
                <button id="nextBtn" class="btn-pagination" onclick="nextPage()">التالي <i
                        class="fas fa-chevron-left"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnKRhT5xJTBvsQKpW7e9w-hGSbAQJWTSo",
            authDomain: "production1-ae85.firebaseapp.com",
            projectId: "production1-ae85",
            storageBucket: "production1-ae85.firebasestorage.app",
            messagingSenderId: "490438031865",
            appId: "1:490438031865:web:a4a69335989f30cd13a528"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allData = [], filteredData = [], currentPage = 1;
        const itemsPerPage = 10;

        async function loadData() {
            const snapshot = await get(ref(db, 'Ayat_Enter'));
            allData = [];
            if (snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach(key => { allData.push({ ...data[key], id: key }); });
                allData.sort((a, b) => (b.enter_date || '').localeCompare(a.enter_date || ''));
            }
            filteredData = [...allData];
            currentPage = 1;
            renderTable();
            updateStats();
        }

        window.saveDirectInput = async function () {
            const mno = document.getElementById('inputMno').value.trim();
            if (!mno) { Swal.fire("خطأ", "رقم العداد مطلوب", "error"); return; }
            if (allData.some(item => item.mno === mno)) { Swal.fire("تنبيه", "رقم العداد موجود بالفعل", "warning"); return; }
            const newRecord = {
                mno: mno,
                enter_date: document.getElementById('inputDate').value,
                keta3: document.getElementById('inputKeta3').value,
                handsa: document.getElementById('inputHandsa').value,
                nashattype: document.getElementById('inputNashat').value,
                mtype: document.getElementById('inputMtype').value,
                status: document.getElementById('inputStatus').value,
                notes: document.getElementById('inputNotes').value,
                addnotes: document.getElementById('inputaddNotes').value
            };
            try {
                await set(ref(db, `Ayat_Enter/${mno}`), newRecord);
                Swal.fire("تم", "تم إضافة العداد بنجاح", "success");
                document.getElementById('inputMno').value = '';
                document.getElementById('inputKeta3').value = '';
                document.getElementById('inputHandsa').value = '';
                document.getElementById('inputNashat').value = '';
                document.getElementById('inputMtype').value = '';
                document.getElementById('inputStatus').value = '';
                document.getElementById('inputaddNotes').value = '';
                document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);
                await loadData();
            } catch (e) { Swal.fire("خطأ", "فشل الحفظ", "error"); }
        };

        window.addNewOption = async function (selectId, optionName) {
            const { value: newValue } = await Swal.fire({ title: `إضافة ${optionName}`, input: 'text', inputPlaceholder: `أدخل ${optionName}`, showCancelButton: true });
            if (newValue) {
                const select = document.getElementById(selectId);
                const option = document.createElement('option');
                option.value = newValue; option.textContent = newValue;
                select.appendChild(option);
                select.value = newValue;
                Swal.fire('تم', `تمت الإضافة`, 'success');
            }
        };

        window.editRecord = async function (mno) {
            const record = allData.find(r => r.mno === mno);
            if (!record) return;
            const notesOpts = ["تم استلام عداد للفحص", "تم الفحص", "تم تسليم العداد-للهندسة"];
            const { value: form } = await Swal.fire({
                title: 'تعديل البيانات',
                html: `
                <input id="edit-mno" class="swal2-input" value="${record.mno}" readonly style="background:#e9ecef">
                <input id="edit-date" type="date" class="swal2-input" value="${record.enter_date || ''}">
                <select id="edit-keta3" class="swal2-select">${['دمياط', 'شمال الدقهلية', 'جنوب الدقهلية', 'كفر الشيخ'].map(o => `<option ${record.keta3 === o ? 'selected' : ''}>${o}</option>`).join('')}</select>
                <select id="edit-handsa" class="swal2-select">${Array.from(document.getElementById('inputHandsa').options).slice(1).map(opt => `<option ${record.handsa === opt.value ? 'selected' : ''}>${opt.value}</option>`).join('')}</select>
                <select id="edit-nashat" class="swal2-select">${Array.from(document.getElementById('inputNashat').options).slice(1).map(opt => `<option ${record.nashattype === opt.value ? 'selected' : ''}>${opt.value}</option>`).join('')}</select>
                <select id="edit-mtype" class="swal2-select">${Array.from(document.getElementById('inputMtype').options).slice(1).map(opt => `<option ${record.mtype === opt.value ? 'selected' : ''}>${opt.value}</option>`).join('')}</select>
                <select id="edit-status" class="swal2-select">${Array.from(document.getElementById('inputStatus').options).slice(1).map(opt => `<option ${record.status === opt.value ? 'selected' : ''}>${opt.value}</option>`).join('')}</select>
                <select id="edit-notes" class="swal2-select">${notesOpts.map(n => `<option ${record.notes === n ? 'selected' : ''}>${n}</option>`).join('')}</select>
                <input id="edit-addnotes" class="swal2-input" value="${record.addnotes || ''}" placeholder="ملاحظات أخرى">
            `,
                focusConfirm: false, showCancelButton: true, confirmButtonText: 'حفظ',
                preConfirm: () => ({
                    mno: record.mno, enter_date: document.getElementById('edit-date').value,
                    keta3: document.getElementById('edit-keta3').value, handsa: document.getElementById('edit-handsa').value,
                    nashattype: document.getElementById('edit-nashat').value, mtype: document.getElementById('edit-mtype').value,
                    status: document.getElementById('edit-status').value, notes: document.getElementById('edit-notes').value,
                    addnotes: document.getElementById('edit-addnotes').value
                })
            });
            if (form) { await set(ref(db, `Ayat_Enter/${mno}`), form); Swal.fire('تم التحديث'); await loadData(); }
        };

        window.deleteRecord = async function (mno) {
            const confirm = await Swal.fire({ title: 'حذف', text: `حذف العداد ${mno}؟`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if (confirm.isConfirmed) { await remove(ref(db, `Ayat_Enter/${mno}`)); Swal.fire('تم الحذف'); await loadData(); }
        };

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage;
            const pageItems = filteredData.slice(start, start + itemsPerPage);
            pageItems.forEach(item => {
                const row = tbody.insertRow();
                ['mno', 'enter_date', 'keta3', 'handsa', 'nashattype', 'mtype', 'status', 'notes', 'addnotes'].forEach(f => {
                    const cell = row.insertCell();
                    if (f === 'enter_date') cell.textContent = item[f] ? item[f].split('-').reverse().join('/') : '—';
                    else cell.textContent = item[f] || '—';
                });
                const act = row.insertCell();
                act.className = 'action-buttons-container';
                act.innerHTML = `<button class="btn-icon-edit" onclick="editRecord('${item.mno}')"><i class="fas fa-edit"></i></button><button class="btn-icon-delete" onclick="deleteRecord('${item.mno}')"><i class="fas fa-trash"></i></button>`;
            });
            updatePagination();
        }

        window.filterTable = function () {
            const mno = document.getElementById('searchMno')?.value.toLowerCase() || '';
            const start = document.getElementById('startDate')?.value || '';
            const end = document.getElementById('endDate')?.value || '';
            const k3 = document.getElementById('searchKeta3')?.value.toLowerCase() || '';
            const hs = document.getElementById('searchHandsa')?.value.toLowerCase() || '';
            const ns = document.getElementById('searchNashat')?.value.toLowerCase() || '';
            const mt = document.getElementById('searchMtype')?.value.toLowerCase() || '';
            const st = document.getElementById('searchStatus')?.value.toLowerCase() || '';
            const noteF = document.getElementById('searchNotes')?.value || '';
            const addN = document.getElementById('searchaddNotes')?.value.toLowerCase() || '';
            filteredData = allData.filter(item => {
                if (mno && !item.mno?.toLowerCase().includes(mno)) return false;
                if (k3 && !item.keta3?.toLowerCase().includes(k3)) return false;
                if (hs && !item.handsa?.toLowerCase().includes(hs)) return false;
                if (ns && !item.nashattype?.toLowerCase().includes(ns)) return false;
                if (mt && !item.mtype?.toLowerCase().includes(mt)) return false;
                if (st && !item.status?.toLowerCase().includes(st)) return false;
                if (noteF && item.notes !== noteF) return false;
                if (addN && !item.addnotes?.toLowerCase().includes(addN)) return false;
                const dt = item.enter_date || '';
                if (start && dt < start) return false;
                if (end && dt > end) return false;
                return true;
            });
            currentPage = 1;
            renderTable();
            updateStats();
        };

        function updateStats() { document.getElementById('totalSummary').innerHTML = `<i class="fas fa-database"></i> إجمالي السجلات: ${allData.length} | <i class="fas fa-search"></i> نتائج البحث: ${filteredData.length}`; }
        function updatePagination() { const total = Math.ceil(filteredData.length / itemsPerPage) || 1; document.getElementById('pageInfo').innerText = `الصفحة ${currentPage} من ${total}`; document.getElementById('prevBtn').disabled = currentPage === 1; document.getElementById('nextBtn').disabled = currentPage >= total; }
        window.prevPage = () => { if (currentPage > 1) { currentPage--; renderTable(); } };
        window.nextPage = () => { const total = Math.ceil(filteredData.length / itemsPerPage); if (currentPage < total) { currentPage++; renderTable(); } };
        window.refreshDatabase = async () => { await loadData(); Swal.fire('تم التحديث'); };
        window.exportExcel = () => {
            const data = filteredData.map(i => ({ 'رقم العداد': i.mno, 'تاريخ الاستلام': i.enter_date?.split('-').reverse().join('/'), 'القطاع': i.keta3, 'الهندسة': i.handsa, 'النشاط': i.nashattype, 'نوع العداد': i.mtype, 'حالة العداد': i.status, 'ملاحظات': i.notes, 'ملاحظات أخرى': i.addnotes }));
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "العدادات"); XLSX.writeFile(wb, `تقرير_عدادات_${new Date().toLocaleDateString()}.xlsx`);
        };
        window.toggleDarkMode = function () { const cb = document.getElementById('darkModeToggle'); if (cb.checked) { document.body.classList.add('dark-mode'); localStorage.setItem('darkMode', 'enabled'); } else { document.body.classList.remove('dark-mode'); localStorage.setItem('darkMode', 'disabled'); } };
        function checkDark() { if (localStorage.getItem('darkMode') === 'enabled') { document.body.classList.add('dark-mode'); document.getElementById('darkModeToggle').checked = true; } }
        window.onload = async () => { checkDark(); document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10); await loadData(); };
    </script>
</body>

</html>
