<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes" />
    <title>نظام تسجيل العدادات - Smart Qabda</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="Ayat_Enter.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="app-container">
        <div class="header-actions">
            <h1><i class="fas fa-tachometer-alt"></i> نظام تسجيل بيانات العدادات</h1>
            <div class="action-buttons">
                <label class="dark-mode-checkbox">
                    <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                    <span class="checkbox-label">
                        <i class="fas fa-moon"></i> الوضع المظلم
                        <i class="fas fa-sun"></i>
                    </span>
                </label>
                <button class="btn-home" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> الرئيسية
                </button>
            </div>
        </div>

        <div class="entry-card">
            <div class="stats-bar" id="totalSummary">
                إجمالي السجلات: 0 | نتائج البحث: 0
            </div>

            <div class="table-controls">
                <button class="btn-refresh" onclick="refreshDatabase()">
                    <i class="fas fa-sync-alt"></i> تحديث البيانات
                </button>
                <button class="btn-excel" onclick="exportExcel()">
                    <i class="fas fa-file-excel"></i> تصدير Excel
                </button>
            </div>

            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr class="search-header-row">
                            <th>
                                <div class="search-label">رقم العداد</div>
                                <input type="text" class="search-input" id="searchMno" onkeyup="filterTable()"
                                    placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">تاريخ الفحص</div>
                                <div class="date-range">
                                    <input type="date" class="header-date start-date" id="startDate"
                                        onchange="filterTable()" placeholder="من">
                                    <input type="date" class="header-date end-date" id="endDate"
                                        onchange="filterTable()" placeholder="إلى">
                                </div>
                            </th>
                            <th>
                                <div class="search-label">القطاع</div>
                                <input type="text" class="search-input" id="searchKeta3" onkeyup="filterTable()"
                                    placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">الهندسة</div>
                                <input type="text" class="search-input" id="searchHandsa" onkeyup="filterTable()"
                                    placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">النشاط</div>
                                <input type="text" class="search-input" id="searchNashat" onkeyup="filterTable()"
                                    placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">نوع العداد</div>
                                <input type="text" class="search-input" id="searchMtype" onkeyup="filterTable()"
                                    placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">حالة العداد</div>
                                <input type="text" class="search-input" id="searchStatus" onkeyup="filterTable()"
                                    placeholder="بحث...">
                            </th>
                            <th>
                                <div class="search-label">ملاحظات</div>
                                <select class="search-select-notes" id="searchNotes" onchange="filterTable()">
                                    <option value="">الكل</option>
                                    <option value="تم استلام العداد">تم استلام العداد</option>
                                    <option value="تم الفحص">تم الفحص</option>
                                </select>
                            </th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr id="inputRow" class="input-row">
                            <td><input type="text" id="inputMno" class="inline-input" placeholder="رقم العداد"></td>
                            <td><input type="date" id="inputDate" class="inline-input"></td>
                            <td>
                                <select id="inputKeta3" class="inline-select">
                                    <option value="">اختر القطاع</option>
                                    <option>دمياط</option>
                                    <option>شمال الدقهلية</option>
                                    <option>جنوب الدقهلية</option>
                                    <option>كفر الشيخ</option>
                                </select>
                            </td>
                            <td>
                                <select id="inputHandsa" class="inline-select">
                                    <option value="">اختر الهندسة</option>
                                    <option>هندسة شمال دمياط</option>
                                    <option>هندسة جنوب دمياط</option>
                                    <option>هندسة عزبة البرج</option>
                                    <option>هندسة كفر سعد</option>
                                    <option>هندسة كفر البطيخ</option>
                                    <option>هندسة راس البر</option>
                                    <option>هندسة دمياط الجديدة</option>
                                    <option>هندسة الزرقا</option>
                                    <option>هندسة فارسكور</option>
                                    <option>هندسة الروضة</option>
                                    <option>هندسة الشعراء</option>
                                    <option>هندسة مدينة شربين</option>
                                    <option>هندسة قري شربين</option>
                                    <option>هندسة دكرنس</option>
                                    <option>هندسة جمصة</option>
                                    <option>هندسة قري بلقاس</option>
                                    <option>هندسة مدينة بلقاس</option>
                                    <option>هندسة الستاموني</option>
                                    <option>هندسة بني عبيد</option>
                                    <option>هندسة منية النصر</option>
                                    <option>هندسة ميت سلسيل</option>
                                    <option>هندسة الجمالية</option>
                                    <option>هندسة قري المنزلة</option>
                                    <option>هندسة مدينة المنزلة</option>
                                    <option>هندسة المطرية</option>
                                    <option>هندسة شرق المنصورة</option>
                                    <option>هندسة غرب المنصورة</option>
                                    <option>هندسة طلخا</option>
                                    <option>هندسة نبروه</option>
                                    <option>هندسة قري المنصورة 1</option>
                                    <option>هندسة قري المنصورة 2</option>
                                    <option>هندسة اجا</option>
                                    <option>هندسة مدينة السنبلاوين</option>
                                    <option>هندسة قري السنبلاوين</option>
                                    <option>هندسة تمي الامديد</option>
                                    <option>هندسة مدينة ميت غمر</option>
                                    <option>هندسة قري ميت غمر</option>
                                    <option>هندسة كوم النور</option>
                                    <option>هندسة مدينة كفر الشيخ</option>
                                    <option>هندسة غرب كفر الشيخ</option>
                                    <option>هندسة شرق كفر الشيخ</option>
                                    <option>هندسة قلين</option>
                                    <option>هندسة قرى سيدي سالم</option>
                                    <option>هندسة مدينة سيدي سالم</option>
                                    <option>هندسة الرياض</option>
                                    <option>هندسة مدينة دسوق</option>
                                    <option>هندسة قرى شمال دسوق</option>
                                    <option>هندسة قرى جنوب دسوق</option>
                                    <option>هندسة فوه</option>
                                    <option>هندسة مطوبس</option>
                                    <option>هندسة مدينة الحامول</option>
                                    <option>هندسة قرى الحامول</option>
                                    <option>هندسة بيلا</option>
                                    <option>هندسة بلطيم</option>
                                    <option>هندسة برج البرلس</option>
                                </select>
                            </td>
                            <td>
                                <div class="select-with-add">
                                    <select id="inputNashat" class="inline-select">
                                        <option value="">اختر النشاط</option>
                                        <option>منزلي</option>
                                        <option>تجاري</option>
                                        <option>قوى محركة</option>
                                        <option>كودي مخالف</option>
                                        <option>ري</option>
                                        <option>مزارع</option>
                                        <option>مساجد</option>
                                        <option>استثمار صناعة</option>
                                        <option>كبار</option>
                                        <option>مصالح حكومية</option>
                                        <option>مصالح حكوميه اخري</option>
                                    </select>
                                    <button type="button" class="btn-add-option"
                                        onclick="addNewOption('inputNashat', 'النشاط')"
                                        title="إضافة نشاط جديد">+</button>
                                </div>
                            </td>
                            <td>
                                <div class="select-with-add">
                                    <select id="inputMtype" class="inline-select">
                                        <option value="">اختر نوع العداد</option>
                                        <option>سويدى ثلاثى مباشر</option>
                                        <option>سويدي احادي</option>
                                        <option>اسكرا احادي</option>
                                        <option>المصريه احادي</option>
                                        <option>جلوبال ثلاثى مباشر</option>
                                        <option>جلوبال احادي</option>
                                        <option>جلوبال ثلاثى غير مباشر</option>
                                    </select>
                                    <button type="button" class="btn-add-option"
                                        onclick="addNewOption('inputMtype', 'نوع العداد')"
                                        title="إضافة نوع جديد">+</button>
                                </div>
                            </td>
                            <td>
                                <div class="select-with-add">
                                    <select id="inputStatus" class="inline-select">
                                        <option value="">اختر حالة العداد</option>
                                        <option>الفحص</option>
                                        <option>التكهين</option>
                                        <option>فحص الشركة المصنعة</option>
                                    </select>
                                    <button type="button" class="btn-add-option"
                                        onclick="addNewOption('inputStatus', 'حالة العداد')"
                                        title="إضافة حالة جديدة">+</button>
                                </div>
                            </td>
                            <td>
                                <div class="select-with-add">
                                    <select id="inputNotes" class="inline-select">
                                        <option value="">اختر ملاحظة</option>
                                        <option>تم استلام العداد</option>
                                        <option>تم الفحص</option>
                                    </select>
                                    <button type="button" class="btn-add-option"
                                        onclick="addNewOption('inputNotes', 'الملاحظة')"
                                        title="إضافة ملاحظة جديدة">+</button>
                                </div>
                            </td>
                            <td><button class="btn-save-row" onclick="saveDirectInput()"><i class="fas fa-save"></i>
                                    حفظ</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-controls">
                <button id="prevBtn" class="btn-pagination" onclick="prevPage()" disabled><i
                        class="fas fa-chevron-right"></i> السابق</button>
                <span id="pageInfo" class="page-info">الصفحة 1 من 1</span>
                <button id="nextBtn" class="btn-pagination" onclick="nextPage()" disabled>التالي <i
                        class="fas fa-chevron-left"></i></button>
            </div>
        </div>
    </div>

    <script type="module" src="Ayat_Enter.js"></script>
</body>

</html>
