<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes" />
    <title>قياس الأحمال الكهربائية - نظام إدارة ومراقبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="Munipilation_Report.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app">
        <div class="logo-section">
            <h2><i class="fas fa-bolt"></i>قياس الأحمال- ضبطية</h2>
            <div class="header-actions">
                <button class="btn-save" id="btnSave"><i class="fas fa-save"></i> حفظ جميع البيانات</button>
                <button class="btn-report" id="reportMainBtn"><i class="fas fa-chart-line"></i> عرض التقرير-التعديل</button>
                <button class="btn-home" id="resetBtn"><i class="fas fa-home"></i>الصفحة الرئيسية</button>
            </div>
        </div>
        <div class="main-content">
            <div class="main-form-grid">
                <input type="text" id="mname" placeholder="اسم المشترك" autocomplete="on">
                <input type="text" id="mno" placeholder="رقم العداد" autocomplete="on">
                <input type="text" id="mco" placeholder="كود المشترك" autocomplete="on">
                <input type="text" id="notes" placeholder="ملاحظات" autocomplete="on" class="notes-input">
            </div>

            <div class="section-title"><i class="fas fa-microchip"></i> إضافة أحمـــال</div>

            <div class="add-load-row">
                <select id="phase_mode">
                    <option value="3">Three Phase</option>
                    <option value="1">Single Phase</option>
                </select>
                <input type="number" id="count" placeholder="العدد" value="1" min="1" class="small-input">
                <input type="number" id="newItemPF" placeholder="P.F" value="0.92" step="0.01" class="small-input">
                <input type="number" id="newItemA" placeholder="أمبير" class="small-input">
                <input type="number" id="newItemW" placeholder="وات" class="small-input">
                <input type="number" id="newItemHP" placeholder="حصان" class="small-input">
                <input type="text" id="newItemName" placeholder="وصف الحمل" class="wide-input" autocomplete="on">
                <button class="btn-add-small" id="btnAddLoad"><i class="fas fa-plus-circle"></i> إضافة</button>
            </div>

            <div class="section-title"><i class="fas fa-list"></i> قائمة الأحمال</div>
            <div class="table-wrapper">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>وصف الحمل</th>
                            <th>العدد</th>
                            <th>وات</th>
                            <th>حصان</th>
                            <th>أمبير</th>
                            <th>الإجمالي (ك.وات)</th>
                            <th>الإجمالي (حصان)</th>
                            <th>مرفق صورة</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot id="tableFooter">
                        <tr style="background-color: #eef2f5; font-weight: bold;">
                            <td colspan="4" style="text-align: left;">الإجمالي الكلي:</td>
                            <td id="totalAmps">0.00</td>
                            <td id="totalKW">0.00</td>
                            <td id="totalHP">0.00</td>
                            <td colspan="2"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="Munipilation_Report.js"></script>
</body>
</html>
