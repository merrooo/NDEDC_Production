<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>اضافة قياس احمال- تسجيل ضبطية  </title>
    <link rel="stylesheet" href="Munipilation_Report.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>
    <div class="app">
        <div class="logo-section">
            <h2><i class="fas fa-bolt"></i>قياس احمال</h2>
            <div class="header-actions">
                <button class="btn-save" id="btnSave"><i class="fas fa-save"></i> حفظ البيانات</button>
                <button class="btn-search" id="searchMainBtn"><i class="fas fa-edit"></i> تعديل البيانات</button>
                <button class="btn-report" id="reportMainBtn"><i class="fas fa-chart-line"></i> تقرير البيانات</button>
                <button class="btn-home" onclick="window.location.href='index.html'"><i class="fas fa-home"></i>
                    الرئيسية</button>
            </div>
        </div>
        <div class="main-content">
            <div class="main-form-grid">
                <input type="text" id="mname" placeholder="اسم المشترك" autocomplete="off">
                <input type="text" id="mno" placeholder="رقم العداد">
                <input type="number" id="mco" placeholder="كود المشترك (ID)">
                <input type="text" id="notes" placeholder="ملاحظات إضافية">
            </div>

            <div class="section-title"><i class="fas fa-microchip"></i> تصنيف الأحمال الكهربائية</div>

            <div class="add-load-row">
                <select id="phase_mode">
                    <option value="3">Three Phase (380V)</option>
                    <option value="1">Single Phase (220V)</option>
                </select>
                <input type="number" id="newItemPF" placeholder="P.F (0.8)" value="0.8" step="0.01">
                <input type="number" id="newItemA" placeholder="Amp (A)">
                <input type="number" id="newItemW" placeholder="Watts (W)">
                <input type="number" id="newItemHP" placeholder="HP (حصان)">
                <input type="text" id="newItemName" placeholder="وصف الحمل (مكيف، محرك..)">
                <button class="btn-search" id="btnAddLoad"><i class="fas fa-plus-circle"></i> إضافة</button>
            </div>

            <div class="table-wrapper">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>وصف الحمل</th>
                            <th>Watts (W)</th>
                            <th>HP (حصان)</th>
                            <th>Amp (A)</th>
                            <th>حذف</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <!-- Photo Section - Moved under loads -->
            <div class="photo-section">
                <button class="btn-photo-select" id="photoTriggerBtn"><i class="fas fa-camera"></i> رفع المرفقات
                    (صور)</button>
                <input type="file" id="photoInput" multiple accept="image/*" class="hidden">
                <div id="frontPhotoGrid" class="photo-grid"></div>
            </div>
        </div>
    </div>

    <script type="module" src="Munipilation_Report.js"></script>
</body>

</html>
