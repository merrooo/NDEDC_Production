<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>معامل القدرة - النظام المتكامل للحسابات الكهربائية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

  <style>
    :root {
      --primary-color: #004a99;
      --secondary-color: #0099ff;
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-light: #7f8c8d;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      --border-radius: 12px;
      --danger: #e74c3c;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Cairo", sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .app-wrapper {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      padding: 20px;
      width: 100%;
    }

    .top-nav {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 1rem 2rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .home-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: "Cairo", sans-serif;
    }

    .home-btn:hover {
      background: white;
      color: var(--primary-color);
    }

    .section-container {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 25px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title ion-icon {
      font-size: 1.4rem;
    }

    .subsection {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .subsection:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .subsection h4 {
      color: var(--text-main);
      margin-bottom: 15px;
      font-size: 1rem;
      font-weight: 600;
    }

    .pf-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .pf-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      margin-bottom: 20px;
    }

    .input-dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-light);
    }

    .input-group input,
    .input-group select {
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: #f8fafc;
      transition: all 0.3s ease;
      width: 100%;
      font-family: "Cairo", sans-serif;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.1);
    }

    .pf-results {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-mini {
      background: #f7f9fb;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .result-mini span {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .result-mini input {
      border: none;
      background: transparent;
      font-weight: 700;
      width: 80px;
      text-align: left;
      font-family: monospace;
    }

    .result-mini.highlight {
      background: #eef6ff;
      border-color: var(--secondary-color);
    }

    .penalty-border {
      border: 2px solid var(--danger) !important;
    }

    .active-power-border {
      border: 2px solid #27ae60 !important;
    }

    .text-accent {
      color: var(--danger);
    }

    .plot-container {
      background: #fafafa;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
    }

    .plot-container svg {
      width: 100%;
      height: auto;
    }

    .svg-text-bold {
      font-weight: bold;
      font-size: 14px;
    }

    .svg-text-small {
      font-size: 12px;
    }

    .result-item {
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid transparent;
      background: #f8fafc;
    }

    .result-item h3 {
      font-size: 0.9rem;
      color: var(--text-main);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .val-large {
      font-size: 1.5rem;
      font-weight: 700;
      border: none;
      background: transparent;
      text-align: center;
      width: 100%;
      font-family: monospace;
    }

    .split-input {
      display: flex;
      gap: 8px;
    }

    .split-input input {
      flex: 1;
      min-width: 0;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      font-family: "Cairo", sans-serif;
    }

    .btn-equations {
      background: #3498db;
      color: white;
    }

    .btn-reset {
      background: #ff4757;
      color: white;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .scroll-buttons {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }

    .scroll-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: var(--primary-color);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }

    .scroll-btn:hover {
      transform: scale(1.1);
      background: var(--secondary-color);
    }

    @media (max-width: 1024px) {
      .pf-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app-wrapper">
    <div class="main-content">
      <nav class="top-nav">
        <div class="nav-brand">معامل القدرة (Power Factor)</div>
        <button class="home-btn" onclick="window.location.href='Control_Calc.html'">
          <ion-icon name="arrow-up-outline"></ion-icon>
          <span>الصفحة الرئيسية</span>
        </button>
      </nav>

      <div class="section-container">
        <div class="section-header">
          <h3 class="section-title">
            <ion-icon name="flash-outline"></ion-icon> معامل القدرة
          </h3>
          <button class="btn-reset" onclick="resetPF()">Reset All</button>
        </div>

        <!-- PF Correction -->
        <div class="subsection">
          <div class="pf-header">
            <h4>⚙️ P.F Correction & Visualization</h4>
          </div>
          <div class="pf-grid">
            <div class="pf-controls">
              <div class="input-dashboard">
                <div class="input-group">
                  <label>System Mode:</label>
                  <select id="phase_mode_pf" onchange="calculateCorrection()">
                    <option value="1">Single Phase (1Φ)</option>
                    <option value="3" selected>Three Phase (3Φ)</option>
                  </select>
                </div>
                <div class="input-group">
                  <label>MD.KW (Load)</label>
                  <input type="number" id="kwh_in" placeholder="100" oninput="calculateCorrection()" />
                </div>
                <div class="input-group">
                  <label>Eff %</label>
                  <input type="number" id="eff_in" value="90" oninput="calculateCorrection()" />
                </div>
                <div class="input-group">
                  <label>Voltage (V)</label>
                  <input type="number" id="v_in" value="400" oninput="calculateCorrection()" />
                </div>
                <div class="input-group">
                  <label>Freq (Hz)</label>
                  <input type="number" id="hz_in" value="50" oninput="calculateCorrection()" />
                </div>
                <div class="input-group">
                  <label>COS(φ) Current</label>
                  <input type="number" step="0.01" id="cos_old_in" placeholder="0.75"
                    oninput="calculateCorrection()" />
                </div>
                <div class="input-group">
                  <label>COS(φ) Target</label>
                  <input type="number" step="0.01" id="cos_new_in" value="0.95" oninput="calculateCorrection()" />
                </div>
              </div>
            </div>

            <div class="pf-results">
              <div class="result-mini">
                <span>kVA (Old)</span>
                <input type="text" id="s_old_res" readonly />
              </div>
              <div class="result-mini highlight">
                <span>kVA (New)</span>
                <input type="text" id="s_new_res" readonly />
              </div>
              <div class="result-mini">
                <span>Amps (Old)</span>
                <input type="text" id="amp_old_res" readonly />
              </div>
              <div class="result-mini highlight">
                <span>Amps (New)</span>
                <input type="text" id="amp_new_res" readonly />
              </div>
              <div class="result-mini penalty-border">
                <span>Qcomp (kVAR)</span>
                <input type="text" id="q_cap_res" readonly />
              </div>
              <div class="result-mini active-power-border">
                <span>µF / Phase</span>
                <input type="text" id="farad_ph_res" readonly />
              </div>
            </div>
          </div>

          <!-- Power Triangle -->
          <div class="plot-container">
            <svg id="powerTriangle" viewBox="0 0 500 400">
              <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                  <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1" />
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#grid)" />
              <line x1="60" y1="340" x2="460" y2="340" stroke="#95a5a6" stroke-width="2" />
              <line x1="60" y1="40" x2="60" y2="340" stroke="#95a5a6" stroke-width="2" />
              <polygon id="polyOld" points="60,340 60,340 60,340" fill="rgba(44,62,80,0.08)" stroke="#2c3e50"
                stroke-width="2" />
              <polygon id="polyNew" points="60,340 60,340 60,340" fill="rgba(52,152,219,0.15)" stroke="#3498db"
                stroke-width="2" stroke-dasharray="5" />
              <line id="qCapLine" x1="0" y1="0" x2="0" y2="0" stroke="#e74c3c" stroke-width="5" />
              <text id="txtKW" class="svg-text-bold" fill="#2c3e50" text-anchor="middle"></text>
              <text id="txtKVAOld" class="svg-text-small" fill="#2c3e50"></text>
              <text id="txtKVANew" class="svg-text-small" fill="#3498db"></text>
              <text id="txtQC" class="svg-text-bold" fill="#e74c3c"></text>
              <text x="460" y="360" class="svg-text-small" text-anchor="end">
                Active Power (P)
              </text>
              <text x="50" y="40" class="svg-text-small" transform="rotate(-90 50,40)">
                Reactive Power (Q)
              </text>
            </svg>
          </div>
        </div>

        <!-- PF Penalty -->
        <div class="subsection">
          <h4>📟 P.F Penalty</h4>
          <div class="input-dashboard">
            <div class="input-group">
              <label>Active Energy (kWh)</label>
              <div class="split-input">
                <input type="number" id="kwh_curr" placeholder="الحالى" oninput="calculatePenalty()" />
                <input type="number" id="kwh_prev" placeholder="السابق" oninput="calculatePenalty()" />
              </div>
            </div>
            <div class="input-group">
              <label>Reactive Energy (kVARh)</label>
              <div class="split-input">
                <input type="number" id="kvarh_curr" placeholder="الحالى" oninput="calculatePenalty()" />
                <input type="number" id="kvarh_prev" placeholder="السابق" oninput="calculatePenalty()" />
              </div>
            </div>
            <div class="input-group">
              <label>Tariff (EGP/kWh)</label>
              <select id="tariffpf" onchange="calculatePenalty()">
                <option value="2.34">قوى محركة (2.34)</option>
                <option value="2.0">ري (2.0)</option>
                <option value="1.5">كبار مشتركين (1.5)</option>
              </select>
            </div>
          </div>
          <div class="input-dashboard">
            <div class="result-item">
              <h3>متوسط معامل القدرة</h3>
              <input type="text" id="pf_penalty" class="val-large" readonly />
            </div>
            <div class="result-item penalty-border">
              <h3 class="text-accent">غرامة معامل القدرة</h3>
              <input type="text" id="pf_charge" class="val-large text-accent" readonly />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="scroll-buttons">
    <button class="scroll-btn" onclick="scrollToTop()">▲</button>
    <button class="scroll-btn" onclick="scrollToBottom()">▼</button>
  </div>

  <script>
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function calculateCorrection() {
      const kwLoad = parseFloat(document.getElementById("kwh_in").value) || 0;
      const eff =
        (parseFloat(document.getElementById("eff_in").value) || 100) / 100;
      const v = parseFloat(document.getElementById("v_in").value) || 0;
      const hz = parseFloat(document.getElementById("hz_in").value) || 50;
      const cos1 = parseFloat(document.getElementById("cos_old_in").value) || 0;
      const cos2 = parseFloat(document.getElementById("cos_new_in").value) || 0;
      const mode = document.getElementById("phase_mode_pf").value;

      if (kwLoad > 0 && cos1 > 0 && cos2 > 0 && cos1 < 1) {
        const P = kwLoad / eff;
        const Q1 = P * Math.tan(Math.acos(cos1));
        const Q2 = P * Math.tan(Math.acos(cos2));
        const Qc = Math.max(0, Q1 - Q2);

        const s1 = P / cos1;
        const s2 = P / cos2;

        document.getElementById("s_old_res").value = s1.toFixed(1);
        document.getElementById("s_new_res").value = s2.toFixed(1);
        document.getElementById("q_cap_res").value = Qc.toFixed(1);

        let a1 =
          mode === "3"
            ? (P * 1000) / (Math.sqrt(3) * v * cos1)
            : (P * 1000) / (v * cos1);
        let a2 =
          mode === "3"
            ? (P * 1000) / (Math.sqrt(3) * v * cos2)
            : (P * 1000) / (v * cos2);
        document.getElementById("amp_old_res").value = a1.toFixed(1);
        document.getElementById("amp_new_res").value = a2.toFixed(1);

        const C = ((Qc * 1000) / (2 * Math.PI * hz * v * v)) * 1000000;
        document.getElementById("farad_ph_res").value = C.toFixed(1);

        updatePlot(P, Q1, Q2, s1, s2, Qc);
      }
    }

    function updatePlot(P, Q1, Q2, s1, s2, Qc) {
      const margin = 60;
      const chartW = 400;
      const chartH = 300;

      const scale = P === 0 ? 1 : Math.min(chartW / P, chartH / (Q1 || 1));

      const x0 = margin,
        y0 = 340;
      const xP = x0 + P * scale;
      const y1 = y0 - Q1 * scale;
      const y2 = y0 - Q2 * scale;

      document
        .getElementById("polyOld")
        .setAttribute("points", `${x0},${y0} ${xP},${y0} ${xP},${y1}`);
      document
        .getElementById("polyNew")
        .setAttribute("points", `${x0},${y0} ${xP},${y0} ${xP},${y2}`);

      const qLine = document.getElementById("qCapLine");
      qLine.setAttribute("x1", xP);
      qLine.setAttribute("y1", y1);
      qLine.setAttribute("x2", xP);
      qLine.setAttribute("y2", y2);

      const tKW = document.getElementById("txtKW");
      tKW.setAttribute("x", (x0 + xP) / 2);
      tKW.setAttribute("y", y0 + 15);
      tKW.textContent = P > 0 ? P.toFixed(1) + " kW" : "";

      const tS1 = document.getElementById("txtKVAOld");
      tS1.setAttribute("x", (x0 + xP) / 2 - 20);
      tS1.setAttribute("y", (y0 + y1) / 2 - 10);
      tS1.textContent = s1 > 0 ? s1.toFixed(1) + " kVA" : "";

      const tS2 = document.getElementById("txtKVANew");
      tS2.setAttribute("x", (x0 + xP) / 2 - 10);
      tS2.setAttribute("y", (y0 + y2) / 2 + 15);
      tS2.textContent = s2 > 0 ? s2.toFixed(1) + " kVA" : "";

      const tQC = document.getElementById("txtQC");
      tQC.setAttribute("x", xP + 10);
      tQC.setAttribute("y", (y1 + y2) / 2);
      tQC.textContent = Qc > 0 ? Qc.toFixed(1) + " kVAR" : "";
    }

    function calculatePenalty() {
      let kwh =
        (parseFloat(document.getElementById("kwh_curr").value) || 0) -
        (parseFloat(document.getElementById("kwh_prev").value) || 0);
      let kvarh =
        (parseFloat(document.getElementById("kvarh_curr").value) || 0) -
        (parseFloat(document.getElementById("kvarh_prev").value) || 0);
      let t = parseFloat(document.getElementById("tariffpf").value);

      if (kwh > 0) {
        let pf = kwh / Math.sqrt(kwh * kwh + kvarh * kvarh);
        document.getElementById("pf_penalty").value = pf.toFixed(3);
        let penalty = 0;
        if (pf < 0.92) {
          let factor = pf < 0.72 ? (0.72 - pf) * 1 + 0.1 : (0.92 - pf) * 0.5;
          penalty = factor * kwh * t;
        }
        document.getElementById("pf_charge").value = penalty.toFixed(2);
      }
    }

    function resetPF() {
      document.getElementById("kwh_in").value = "";
      document.getElementById("eff_in").value = "90";
      document.getElementById("v_in").value = "400";
      document.getElementById("hz_in").value = "50";
      document.getElementById("cos_old_in").value = "";
      document.getElementById("cos_new_in").value = "0.95";
      calculateCorrection();
    }

    window.onload = function () {
      calculateCorrection();
      calculatePenalty();
    };
  </script>
</body>

</html>
