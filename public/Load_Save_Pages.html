<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Code Vault Loader - Load and Preview Websites</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="Load_Save_Pages.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header with search bar integrated beside title -->
      <div class="header-row">
        <header>
          <h1><i class="fas fa-folder-open"></i> Code Vault Loader</h1>
        

          <button id="DBRemoval" class="btn-load" onclick="window.location.href='Firebase_Removal.html'">
            <i class="fas fa-chevron-left"></i> DB-Removal
          </button>

          <button id="CodesElements" class="btn-load" onclick="window.location.href='Creating_Elements.html'">
            <i class="fas fa-chevron-left"></i> Codes-Elements
          </button>
</header>
        <div class="search-area">
          <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Search saved websites by key..."
              autocomplete="off"
            />
          </div>
        </div>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <span
          ><i class="fas fa-database"></i>
          <span id="totalCount">0</span> websites total</span
        >
        <span
          ><i class="fas fa-eye"></i>
          <span id="displayCount">0</span> displayed</span
        >
      </div>

      <!-- Compact websites list with pagination -->
      <div class="websites-compact">
        <div id="websitesList" class="websites-scroll">
          <!-- dynamic websites appear here -->
        </div>

        <!-- Pagination Controls -->
        <div
          id="paginationControls"
          class="pagination-controls"
          style="display: none"
        >
          <button id="prevPageBtn" class="page-btn" disabled>
            <i class="fas fa-chevron-left"></i> Previous
          </button>
          <span id="pageInfo" class="page-info">Page 1 of 1</span>
          <button id="nextPageBtn" class="page-btn" disabled>
            Next <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </div>

      <!-- Selected Website Info -->
      <div id="selectedInfo" class="selected-info" style="display: none">
        <div class="info-card">
          <i class="fas fa-info-circle"></i>
          <span id="selectedKey"></span>
          <div style="display: flex; gap: 10px">
            <button id="loadSelectedBtn" class="btn-load">
              <i class="fas fa-play"></i> Load This Website
            </button>
            <button id="editSelectedBtn" class="btn-edit">
              <i class="fas fa-edit"></i> Save Changes
            </button>
          </div>
        </div>
      </div>

      <!-- Code Display Section - Dynamic textareas based on database structure -->
      <div
        id="codeDisplaySection"
        class="code-display-section"
        style="display: none"
      >
        <div class="section-header">
          <i class="fas fa-code"></i>
          <h3>Website Code</h3>
        </div>
        <div id="dynamicTextareas" class="dynamic-textareas">
          <!-- Textareas will be dynamically created based on what's stored in database -->
        </div>
      </div>

      <!-- Preview Section - ENLARGED for complete page preview -->
      <div class="preview-section">
        <div class="preview-header">
          <i class="fas fa-eye"></i>
          <h3>Live Preview</h3>
          <span id="previewStatus" class="preview-status"
            >No website loaded</span
          >
        </div>
        <div class="preview-container">
          <iframe
            id="previewFrame"
            class="preview-frame"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"
          ></iframe>
        </div>
      </div>

      <div class="action-buttons">
        <button id="backToBuilderBtn" class="btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Builder
        </button>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"
        }
      }
    </script>
    <script type="module" src="Load_Save_Pages.js"></script>
  </body>
</html>
