<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
        }

        div {
            margin: 10px 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        input,
        select {
            padding: 5px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div>
        <h1>JavaScript - Meter Management</h1>
        <span>Hi</span>
        <p id="demo"></p>
    </div>

    <div>
        <button type="button" id="btn">Submit</button>
        <button type="button" id="clearBtn">Clear All</button>
    </div>

    <div>
        <label>Meter Number</label>
        <input type="number" id="nmbr1" name="m_number">
    </div>

    <div>
        <label>Meter Code</label>
        <input type="number" id="nmbr2" name="m_code">
    </div>

    <div>
        <label>Customer Name</label>
        <input type="text" id="txt" name="m_name">
    </div>

    <div>
        <label>Meter Entrance</label>
        <input type="date" id="dt" name="m_date">
    </div>

    <div>
        <label>Meter Calib</label>
        <input type="date" id="dte" name="m_date">
    </div>

    <div>
        <label>Meter Type</label>
        <select id="drop" name="m_type">
            <option value="">choose</option>
            <option value="جلوبال">جلوبال</option>
            <option value="سويدي">سويدي</option>
            <option value="اسكرا">اسكرا</option>
        </select>
    </div>

    <div style="margin-top:20px;">
        <table id="tablebody" border="1" cellpadding="7">
            <tr>
                <th>م</th>
                <th>رقم العداد</th>
                <th>كود العداد</th>
                <th>اسم المشترك</th>
                <th>تاريخ الدخول</th>
                <th>تاريخ الفحص</th>
                <th>نوع العداد</th>
            </tr>
        </table>
    </div>

    <script>
        // ✅ Function to get today's date
        function gettoday() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');

            const inputdate = `${year}-${month}-${day}`;
            document.getElementById("dt").value = inputdate;
            document.getElementById("dte").value = inputdate;
        }

        // ✅ Function to check meter number using switch
        function checkMeterNumber(meterNumber) {
            let result = "";

            switch (parseInt(meterNumber)) {  // Convert to number
                case 0:
                case 1:
                case 2:
                    result = "🔵 Low range meter (0-2)";
                    break;
                case 3:
                case 4:
                case 5:
                    result = "🟢 Medium range meter (3-5)";
                    break;
                case 6:
                case 7:
                case 8:
                    result = "🟡 High range meter (6-8)";
                    break;
                case 9:
                case 10:
                    result = "🔴 Critical range meter (9-10)";
                    break;
                default:
                    if (meterNumber > 10) {
                        result = "⚠️ Meter number exceeds normal range!";
                    } else if (meterNumber < 0) {
                        result = "❌ Invalid meter number (negative)!";
                    } else {
                        result = "ℹ️ Meter number: " + meterNumber;
                    }
                    break;
            }

            return result;
        }

        // ✅ Page load
        window.onload = gettoday;

        // ✅ Submit button
        document.getElementById("btn").onclick = function () {
            let mnumb = document.getElementById("nmbr1").value;
            let mcode = document.getElementById("nmbr2").value;
            let mname = document.getElementById("txt").value;
            let enter_date = document.getElementById("dt").value;
            let calib_date = document.getElementById("dte").value;
            let mtype = document.getElementById("drop");
            let table = document.getElementById("tablebody");

            // ✅ Validate
            if (mnumb === "" || mcode === "" || mname === "" || enter_date === "" || mtype.value === "") {
                window.alert("Please fill in all fields!");
                return;
            }

            // ✅ Check meter number using switch function
            let meterStatus = checkMeterNumber(parseInt(mnumb));
            document.getElementById("demo").innerHTML = meterStatus;

            // ✅ Add row to table
            let newrow = table.insertRow();
            let rowcount = table.rows.length - 1;

            let cell1 = newrow.insertCell(0);
            let cell2 = newrow.insertCell(1);
            let cell3 = newrow.insertCell(2);
            let cell4 = newrow.insertCell(3);
            let cell5 = newrow.insertCell(4);
            let cell6 = newrow.insertCell(5);
            let cell7 = newrow.insertCell(6);

            cell1.innerHTML = rowcount;
            cell2.innerHTML = mnumb;
            cell3.innerHTML = mcode;
            cell4.innerHTML = mname;

            // ✅ Format enter_date
            if (enter_date) {
                const parts = enter_date.split('-');
                cell5.innerHTML = `${parts[2]}/${parts[1]}/${parts[0]}`;
            } else {
                cell5.innerHTML = enter_date;
            }

            // ✅ Format calib_date استني احمد البلعوطي هاعمل commit
            if (calib_date) {
                const parts = calib_date.split('-');
                cell6.innerHTML = `${parts[2]}/${parts[1]}/${parts[0]}`;
            } else {
                cell6.innerHTML = calib_date;
            }

            cell7.innerHTML = mtype.options[mtype.selectedIndex].text;

            // ✅ Clear all inputs
            document.getElementById("txt").value = "";
            document.getElementById("nmbr1").value = "";
            document.getElementById("nmbr2").value = "";
            document.getElementById("drop").value = "";

            // ✅ Reset dates to today
            gettoday();

            // ✅ Also show success in console
            console.log("✅ Data added: " + mname + " - " + meterStatus);
        };

    </script>

</body>

</html>
