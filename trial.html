<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Add/Delete List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 8px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        button {
            cursor: pointer;
        }

        .delete-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <h2>My Item List</h2>

    <form action="#" method="POST" class="form-group">
        <input type="text" name="newItem" placeholder="Enter new item..." required>
        <button type="submit"
            style="background-color: #4CAF50; color: white; border: none; padding: 8px 12px; border-radius: 4px;">Add</button>
    </form>

    <ul>
        <li>
            <span>Buy groceries</span>
            <form action="#" method="POST" style="margin: 0;">
                <input type="hidden" name="itemId" value="1">
                <button type="submit" class="delete-btn">Delete</button>
            </form>
        </li>

        <li>
            <span>Walk the dog</span>
            <form action="#" method="POST" style="margin: 0;">
                <input type="hidden" name="itemId" value="2">
                <button type="submit" class="delete-btn">Delete</button>
            </form>
        </li>
    </ul>

</body>

</html>
